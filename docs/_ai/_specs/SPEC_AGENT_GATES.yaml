---
description: Especificação de gates (guard, parity, requirements) - exit codes, validations, e safety checks.
version: "1.0"
gates:
  guard_gate:
    purpose: "Detectar drift do baseline (.hb_guard/baseline.json)"
    sources:
      - "agent_guard.py"
    safety_checks:
      - "Baseline must exist before running"
      - "Only compare with current session baseline"
      - "Never auto-snapshot without explicit approval"
    exit_codes:
      0: "No drift"
      3: "Guard violation (baseline drift detected)"
    
  parity_gate:
    purpose: "Comparar estrutura DB (schema.sql) vs models estrutural"
    sources:
      - "parity_gate.ps1"
    validations:
      - "Table must exist in both schema.sql and models/"
      - "Columns must match exactly"
      - "Constraints must align (PK/FK/UNIQUE/CHECK)"
    exit_codes:
      0: "Perfect parity"
      2: "Parity violation (structural diff)"

  requirements_gate:
    purpose: "Validar requirements de negócio (validação, profiles, regras)"
    sources:
      - "model_requirements.py"
    profiles:
      - strict: "All validations required, no warnings"
      - fk: "Allow FK cycles with -AllowCycleWarning"
      - lenient: "Minimal validation, warnings only"
    exit_codes:
      0: "All requirements met"
      4: "Requirements violation (validation failed)"

