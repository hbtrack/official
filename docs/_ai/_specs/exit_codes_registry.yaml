# =============================================================================
# EXIT CODES REGISTRY — Single Source of Truth
# =============================================================================
# Authority : This file is the SSOT for all exit codes in HB Track scripts.
# Consumers : gen_sync_exit_codes.py → troubleshooting-map.json, exit_codes.md
# Governance: BCP 14 (RFC 2119) normative language.
# Schema    : docs/_ai/_schemas/exit_codes_registry.schema.json
# Version   : 1.0.0
# Updated   : 2026-02-15
# =============================================================================

version: "1.0.0"

# ---------------------------------------------------------------------------
# NORMATIVE CONVENTION (scripts.policy.yaml alignment)
# ---------------------------------------------------------------------------
# Category defaults (from scripts/_policy/scripts.policy.yaml):
#   checks/fixes/generate/migrate/reset/seeds/ops/diagnostics:
#     pass=0, fail=2, error=3
#
# Gate-specific overrides:
#   guard   → 0 | 3
#   parity  → 0 | 2
#   requirements → 0 | 4
#   invariants   → 0 | 1 | 3
# ---------------------------------------------------------------------------

exit_codes:

  # =========================================================================
  # 0 — SUCCESS
  # =========================================================================
  "0":
    title: "Success"
    severity: info
    normative: "Scripts MUST return 0 when the operation completes without violations."
    description: >-
      Operação completada com sucesso, sem erros ou violations.
    emitters:
      # --- Gate scripts ---
      - path: scripts/checks/models/check_models_requirements.py
        context: "Model está 100% conforme com schema.sql"
      - path: scripts/checks/db/check_agent_guard.py
        context: "Nenhum arquivo protegido foi modificado vs baseline"
      - path: scripts/ops/infra/ops_parity_gate.ps1
        context: "Estrutura DB ↔ Model está sincronizada"
      - path: scripts/ops/infra/ops_models_autogen_gate.ps1
        context: "Todos os gates (guard → parity → autogen → requirements) passam"
      # --- CI / Policy ---
      - path: scripts/checks/check_ci_gates_local.ps1
        context: "Todos os 5 gates CI passam"
      - path: scripts/checks/policy/check_scripts_policy.ps1
        context: "Scripts policy validation OK"
      - path: scripts/checks/policy/check_policy_manifest.ps1
        context: "Manifest hashes match"
      - path: scripts/checks/policy/check_policy_md_is_derived.ps1
        context: "Derived MD in sync with SSOT YAML"
      - path: scripts/checks/lint/check_python_layout.ps1
        context: "Python layout check OK"
      # --- Generate ---
      - path: scripts/generate/docs/gen_docs_soot.py
        context: "Todos artefatos canônicos gerados (schema.sql, openapi.json, alembic_state.txt, manifest.json)"
      - path: scripts/generate/docs/gen_sync_exit_codes.py
        context: "Sync completo, sem drift"
      # --- Run ---
      - path: scripts/run/run_invariant_gate.ps1
        context: "Gate individual passou"
      - path: scripts/run/run_invariant_gate_all.ps1
        context: "Todos invariant gates passaram"
      # --- Ops ---
      - path: scripts/ops/ops_inv.ps1
        context: "Wrapper dispatch concluído com sucesso"
      - path: scripts/ops/infra/ops_models_batch.ps1
        context: "Batch completo, todas tabelas PASS"
      # --- Reset ---
      - path: scripts/reset/db/reset_db_e2e.ps1
        context: "DB reset e seed concluídos"
      - path: scripts/reset/services/reset_and_start.ps1
        context: "Serviços reiniciados"
    symptoms: []
    causes: []
    troubleshooting: []

  # =========================================================================
  # 1 — INTERNAL ERROR / CRASH
  # =========================================================================
  "1":
    title: "Internal Error"
    severity: error
    normative: >-
      Scripts MUST return 1 only for unrecoverable internal errors
      (crashes, unhandled exceptions, missing dependencies).
      Scripts MUST NOT use exit 1 for expected validation failures.
    description: >-
      Erro interno do script (crash, exception não tratada, dependência faltando).
    emitters:
      - path: scripts/run/run_invariant_gate.ps1
        context: "Crash durante execução do gate individual"
      - path: scripts/run/run_invariant_gate_all.ps1
        context: "Crash durante execução bulk"
      - path: scripts/ops/ops_inv.ps1
        context: "Script filho retornou crash"
      - path: scripts/generate/docs/gen_docs_soot.py
        context: "Backend dir não encontrado ou DB inacessível"
      - path: scripts/reset/db/reset_db_e2e.ps1
        context: "Falha em step de reset (DB, migration, seed)"
      - path: scripts/reset/services/reset_and_start.ps1
        context: "Serviço falhou ao iniciar"
    symptoms:
      - "Traceback Python visível no output"
      - "PowerShell termination error"
      - "Mensagem 'FATAL' ou 'ERROR' sem violation code"
    causes:
      - "Dependência Python faltando (import error)"
      - "Permissão de arquivo negada"
      - "Arquivo obrigatório não encontrado (schema.sql, model.py, .env)"
      - "Erro de sintaxe no script"
      - "DB inacessível (connection refused)"
    troubleshooting:
      - step: "Verificar Python e dependências"
        command: "python --version; pip list | Select-String sqlalchemy,alembic,dotenv"
      - step: "Verificar venv ativo"
        command: "Get-Command python | Select-Object Source"
      - step: "Verificar .env existe"
        command: 'Test-Path "Hb Track - Backend/.env"'
      - step: "Verificar DB acessível"
        command: 'python -c "from dotenv import load_dotenv; load_dotenv(); import os; print(os.getenv(''DATABASE_URL'',''NOT SET''))"'
      - step: "Re-executar com verbose"
        command: "# Adicionar --verbose ou -Verbose ao script original"

  # =========================================================================
  # 2 — PARITY / STRUCTURAL DIFF / POLICY FAIL
  # =========================================================================
  "2":
    title: "Parity Structural Diffs"
    severity: warning
    normative: >-
      Scripts MUST return 2 when a structural diff or policy violation is detected
      but the script itself executed correctly. This is a deterministic validation
      failure, not a crash.
    description: >-
      A estrutura do model SQLAlchemy difere do banco de dados PostgreSQL,
      ou uma policy check detectou drift/violação.
    emitters:
      # --- Gate ---
      - path: scripts/ops/infra/ops_parity_gate.ps1
        context: "Alembic detectou diff estrutural (add_column, modify_type, etc.)"
      # --- Policy checks ---
      - path: scripts/checks/policy/check_scripts_policy.ps1
        context: "Script viola policy (header faltando, side_effects incorreto)"
      - path: scripts/checks/policy/check_policy_manifest.ps1
        context: "Manifest hash mismatch"
      - path: scripts/checks/policy/check_policy_md_is_derived.ps1
        context: "Derived MD out of sync com SSOT YAML"
      - path: scripts/checks/lint/check_python_layout.ps1
        context: "Python layout violations"
      - path: scripts/checks/docs/check_policy_determinism.ps1
        context: "Determinism check failed"
      # --- Other ---
      - path: scripts/_policy/check_python_layout.py
        context: "EXIT_VIOLATION — layout violation detectada"
      - path: scripts/generate/docs/gen_sync_exit_codes.py
        context: "Drift detectado entre fontes (--check mode)"
      - path: scripts/generate/docs/gen_scripts_policy_md.py
        context: "EXIT_FAIL — geração falhou por inconsistência"
      - path: scripts/run/run_new_script.ps1
        context: "Validação de novo script falhou"
      - path: scripts/diagnostics/db/diag_check_alembic_version.py
        context: "Alembic version mismatch"
    symptoms:
      - "Output contém 'DIFF', 'VIOLATION', 'MISMATCH', ou 'DRIFT'"
      - "Alembic autogenerate mostra operações pendentes"
      - "Policy check reporta headers faltando"
    causes:
      - "Model alterado sem migration correspondente"
      - "Schema PostgreSQL alterado manualmente (fora de Alembic)"
      - "Migration pendente não aplicada"
      - "Drift entre branches (merge incorreto)"
      - "Script header incompleto ou incorreto"
      - "YAML SSOT atualizado mas MD derivado não regenerado"
    troubleshooting:
      - step: "Identificar o diff exato"
        command: "python scripts/checks/db/check_parity_scan.py --table <tabela>"
      - step: "Se mudança intencional → criar migration"
        command: 'cd "Hb Track - Backend"; alembic revision --autogenerate -m "fix <tabela>"'
      - step: "Se mudança acidental → reverter model"
        command: "git restore app/models/<tabela>.py"
      - step: "Revalidar parity"
        command: "powershell -File scripts/ops/infra/ops_parity_gate.ps1 -Table <tabela>"

  # =========================================================================
  # 3 — GUARD VIOLATION / GATE ERROR
  # =========================================================================
  "3":
    title: "Guard Violations"
    severity: error
    normative: >-
      Scripts MUST return 3 when a guard or safety violation is detected
      (protected file modified, baseline drift, CI gate failure).
      This exit code indicates a potentially dangerous change that requires
      explicit approval.
    description: >-
      Arquivo protegido foi modificado sem autorização explícita,
      ou CI gate falhou com erro.
    emitters:
      # --- Guard ---
      - path: scripts/checks/db/check_agent_guard.py
        context: "Arquivo protegido modificado vs baseline (.hb_guard/baseline.json)"
      - path: scripts/ops/infra/ops_models_autogen_gate.ps1
        context: "Guard step falhou no pipeline (PRE → guard check)"
      # --- CI ---
      - path: scripts/checks/check_ci_gates_local.ps1
        context: "Um ou mais CI gates falharam com erro"
      # --- Policy ---
      - path: scripts/_policy/check_python_layout.py
        context: "EXIT_ERROR — erro interno no checker"
      - path: scripts/generate/docs/gen_scripts_policy_md.py
        context: "EXIT_ERROR — erro interno no generator"
      - path: scripts/generate/docs/gen_sync_exit_codes.py
        context: "Erro de validação (arquivo não encontrado, parse error)"
      # --- Invariants ---
      - path: scripts/run/run_invariant_gate.ps1
        context: "Gate individual falhou (test failure ou missing evidence)"
      - path: scripts/run/run_invariant_gate_all.ps1
        context: "Bulk gate com falhas"
    symptoms:
      - "Output contém 'GUARD', 'PROTECTED', ou 'VIOLATION'"
      - "Baseline mismatch detectado"
      - "CI gate reporta [ERROR] ou [FAIL]"
    causes:
      - "Arquivo de test/route/task modificado durante operação de model"
      - "Baseline desatualizado (.hb_guard/baseline.json)"
      - "Operação autogen tocou arquivos fora do escopo permitido"
      - "Script auxiliar modificado sem estar na allowlist"
    troubleshooting:
      - step: "Verificar qual arquivo foi modificado"
        command: "python scripts/checks/db/check_agent_guard.py check"
      - step: "Se modificação legítima → usar -Allow"
        command: 'powershell -File scripts/ops/infra/ops_models_autogen_gate.ps1 -Table <tabela> -Allow "path/to/file.py"'
      - step: "Se acidental → reverter"
        command: "git restore <path/to/file>"
      - step: "Se baseline desatualizado → atualizar (com aprovação)"
        command: "python scripts/checks/db/check_agent_guard.py snapshot"

  # =========================================================================
  # 4 — REQUIREMENTS VIOLATION
  # =========================================================================
  "4":
    title: "Requirements Violation"
    severity: warning
    normative: >-
      Scripts MUST return 4 when the SQLAlchemy model violates structural
      expectations defined in schema.sql (the SSOT). This is a deterministic
      validation failure specific to model_requirements.py.
    description: >-
      O model SQLAlchemy viola expectativas estruturais de schema.sql (SSOT).
    emitters:
      - path: scripts/checks/models/check_models_requirements.py
        context: "EXIT_REQUIREMENTS_VIOLATION=4 — model falha em profile strict/fk/lenient"
      - path: scripts/ops/infra/ops_models_autogen_gate.ps1
        context: "Requirements step falhou no pipeline (POST → requirements check)"
    symptoms:
      - "Output contém violation codes como A1_EXTRA_COLUMN, B1_TYPE_MISMATCH, etc."
      - "Mensagem '[FAIL] model_requirements ... violations'"
    causes:
      - "A1_EXTRA_COLUMN — Coluna no model que não existe em schema.sql"
      - "A2_MISSING_COLUMN — Coluna em schema.sql que falta no model"
      - "B1_TYPE_MISMATCH — Tipo PG ↔ SA incompatível (ex: Date vs String)"
      - "C1_NULLABLE_MISMATCH — NOT NULL no DB mas nullable=True no model"
      - "D4_MISSING_USE_ALTER — FK de ciclo sem use_alter=True"
      - "E1_MISSING_CHECK — CHECK constraint faltando no model"
      - "F1_MISSING_INDEX — INDEX explícito faltando"
      - "G1_EXTRA_UNIQUE — UNIQUE constraint duplicado com Index"
      - "H1_MISSING_SERVER_DEFAULT — Server default faltando"
    troubleshooting:
      - step: "Ver violations detalhadas"
        command: "python scripts/checks/models/check_models_requirements.py --table <tabela> --profile strict"
      - step: "Corrigir model conforme fix suggestions no output"
        command: "# Editar app/models/<tabela>.py conforme sugestões"
      - step: "Revalidar após correção"
        command: "powershell -File scripts/ops/infra/ops_models_autogen_gate.ps1 -Table <tabela>"
      - step: "Referência completa de violation types"
        command: "# Ver docs/references/exit_codes.md seção Exit Code 4"

  # =========================================================================
  # 100 — SKIP_NO_MODEL
  # =========================================================================
  "100":
    title: "SKIP_NO_MODEL"
    severity: info
    normative: >-
      Scripts MAY return 100 to indicate that a table exists in schema.sql
      but has no corresponding Python model. This is NOT an error condition
      and batch scripts MUST continue processing remaining tables.
    description: >-
      Tabela existe no schema.sql mas não possui model Python correspondente.
    emitters:
      - path: scripts/ops/infra/ops_models_batch.ps1
        context: "Tabela sem model detectada durante scan batch"
      - path: scripts/checks/models/check_models_requirements.py
        context: "Model file não encontrado para tabela solicitada"
    symptoms:
      - "Output contém 'SKIP_NO_MODEL' ou 'SKIP'"
      - "Tabela não conta como FAIL na contagem final do batch"
    causes:
      - "Tabela de sistema (ex: alembic_version)"
      - "Tabela legada não migrada para ORM"
      - "View materializada (mv_*)"
      - "Model planejado mas ainda não implementado"
    troubleshooting:
      - step: "Verificar se tabela deve ter model"
        command: "# Se sim → criar via autogen"
      - step: "Criar model via autogen"
        command: "python scripts/generate/schema/gen_autogen_model_from_db.py preview --tables <tabela>"
      - step: "Se tabela de sistema → ignorar"
        command: "# Comportamento esperado, nenhuma ação necessária"

# =============================================================================
# SPECIAL CODES (non-gate, Windows/OS)
# =============================================================================
special_codes:

  "-1073741510":
    title: "KeyboardInterrupt (0xC000013A)"
    severity: info
    normative: >-
      This is a Windows OS signal, not a script exit code. Agents MUST NOT
      treat this as a validation failure.
    description: >-
      Processo terminado por Ctrl+C (KeyboardInterrupt).
    causes:
      - "Usuário cancelou execução manualmente"
      - "Timeout de processo"
    troubleshooting:
      - step: "Nenhuma ação necessária"
        command: "# Comportamento esperado quando cancelando scripts longos"
