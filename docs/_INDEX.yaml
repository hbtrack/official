version: 1
authority:
  precedence_order:
    - ssot_factual
    - runtime_evidence
    - canon_docs
    - derived_docs
    - narrative

entrypoints:
  - id: product_core
    path: docs/product/SYSTEM_OVERVIEW.md
    mode: required
  - id: architecture
    path: docs/product/ARCHITECTURE.md
    mode: required
  - id: domain_model
    path: docs/product/DOMAIN_MODEL.md
    mode: required
  - id: runtime_index
    path: docs/product/runtime/_INDEX.yaml
    mode: required
  - id: project_profile
    path: docs/_canon/HB_TRACK_PROFILE.yaml
    mode: required
  - id: uds_spec
    path: docs/_canon/UDS_SPEC.md
    mode: required
  - id: hb_track_contract
    path: docs/_canon/contratos/HB_TRACK_CONTRACT.md
    mode: required
  - id: hb_track_spec
    path: docs/_canon/specs/HB_TRACK_SPEC.md
    mode: required
  - id: hb_track_kanban
    path: docs/hbtrack/Hb Track Kanban.md
    mode: required
  - id: determinism_manual
    path: docs/hbtrack/manuais/Manual Deterministico.md
    mode: required
  # --- Módulo TRAINING ---
  - id: training_done_gate
    path: docs/hbtrack/modulos/treinos/DONE_GATE_TRAINING.md
    mode: required
  - id: training_ar_backlog
    path: docs/hbtrack/modulos/treinos/AR_BACKLOG_TRAINING.md
    mode: required
  - id: training_roadmap
    path: docs/hbtrack/modulos/treinos/TRAINING_ROADMAP.md
    mode: recommended
  - id: training_index
    path: docs/hbtrack/modulos/treinos/_INDEX.md
    mode: recommended

rules:
  append_only_indexes:
    - docs/product/runtime/_INDEX.yaml
  derived_read_only_roots:
    - docs/_generated/
    - docs/ssot/
