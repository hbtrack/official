module: playbook
version: "0.1.0"
status: "draft_normativo"

aggregate_root:
  type: "play"
  id_type: "uuid"

event_store:
  required_fields:
    - event_id
    - event_type
    - event_version
    - aggregate_type
    - aggregate_id
    - occurred_at
    - actor_user_id
    - payload

events:
  - name: "play_created"
    event_version: 1
    aggregate_type: "play"
    trigger: "create_play"
    description: "Nova jogada criada no playbook."
    emission_mode: "sync"
    transactional: true
    payload:
      required:
        play_id: "uuid"
        playbook_id: "uuid"
        team_id: "uuid"
        title: "string"
        version: "int"
        is_published: "bool"
      optional:
        description: "string|null"
    relations:
      contracts:
        - "POST /plays"
      flows:
        - "PLB-02"
      invariants: []
    consumers:
      - "play_catalog_projection"

  - name: "play_published"
    event_version: 1
    aggregate_type: "play"
    trigger: "publish_play"
    description: "Jogada publicada para estudo."
    emission_mode: "sync"
    transactional: true
    payload:
      required:
        play_id: "uuid"
        team_id: "uuid"
        version: "int"
        published_at: "datetime"
      optional: {}
    relations:
      contracts:
        - "POST /plays/{play_id}/publish"
      flows:
        - "PLB-06"
      invariants: []
    consumers:
      - "play_catalog_projection"

  - name: "play_copied"
    event_version: 1
    aggregate_type: "play"
    trigger: "copy_play"
    description: "Jogada copiada para outro time via deep copy."
    emission_mode: "sync"
    transactional: true
    payload:
      required:
        source_play_id: "uuid"
        source_team_id: "uuid"
        target_play_id: "uuid"
        target_team_id: "uuid"
        version: "int"
        is_published: "bool"
      optional:
        target_playbook_id: "uuid|null"
    relations:
      contracts:
        - "POST /plays/{play_id}/copy"
      flows:
        - "PLB-08"
      invariants:
        - "INV-PLB-COPY-001"
    consumers:
      - "play_catalog_projection"
      - "play_lineage_projection"
