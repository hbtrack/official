# ---------------------------------------------------------------------------
# STATE MODELS
# ---------------------------------------------------------------------------
state_models:
  - entity_ref: training.training_session
    unique_governance_id: STM-TRAINING-001
    states:
      - DRAFT
      - PLANNED
      - SCHEDULED
      - IN_PROGRESS
      - COMPLETED
      - CANCELLED
      - ARCHIVED
    initial_state: DRAFT
    allowed_transitions:
      - from: DRAFT
        to: PLANNED
      - from: DRAFT
        to: SCHEDULED
      - from: PLANNED
        to: SCHEDULED
      - from: SCHEDULED
        to: IN_PROGRESS
      - from: IN_PROGRESS
        to: COMPLETED
      - from: DRAFT
        to: CANCELLED
      - from: PLANNED
        to: CANCELLED
      - from: SCHEDULED
        to: CANCELLED
      - from: IN_PROGRESS
        to: CANCELLED
      - from: COMPLETED
        to: ARCHIVED
    forbidden_transitions:
      - from: DRAFT
        to: COMPLETED
      - from: DRAFT
        to: IN_PROGRESS
      - from: COMPLETED
        to: DRAFT
      - from: CANCELLED
        to: DRAFT
      - from: CANCELLED
        to: PLANNED
      - from: CANCELLED
        to: SCHEDULED
      - from: ARCHIVED
        to: any
    transition_guards:
      - transition: PLANNED->SCHEDULED
        rule_ref: training.rule.publication_preconditions_met
      - transition: DRAFT->SCHEDULED
        rule_ref: training.rule.publication_preconditions_met
      - transition: IN_PROGRESS->COMPLETED
        rule_ref: training.rule.completion_evidence_required

  - entity_ref: training.training_intervention_cycle
    unique_governance_id: STM-TRAINING-002
    states:
      - OPEN
      - IN_PROGRESS
      - REVIEW
      - ADJUSTED
      - COMPLETED
      - ARCHIVED
    initial_state: OPEN
    allowed_transitions:
      - from: OPEN
        to: IN_PROGRESS
      - from: IN_PROGRESS
        to: REVIEW
      - from: REVIEW
        to: ADJUSTED
      - from: REVIEW
        to: COMPLETED
      - from: ADJUSTED
        to: COMPLETED
      - from: COMPLETED
        to: ARCHIVED
    forbidden_transitions: []
    transition_guards:
      - transition: IN_PROGRESS->REVIEW
        rule_ref: training.rule.cycle_review_requires_evidence

  - entity_ref: training.need_detected
    unique_governance_id: STM-TRAINING-003
    states:
      - OPEN
      - LINKED_TO_OBJECTIVE
      - DISMISSED
    initial_state: OPEN
    allowed_transitions:
      - from: OPEN
        to: LINKED_TO_OBJECTIVE
      - from: OPEN
        to: DISMISSED
    forbidden_transitions:
      - from: DISMISSED
        to: OPEN
      - from: LINKED_TO_OBJECTIVE
        to: DISMISSED
    transition_guards: []

  - entity_ref: training.recommendation
    unique_governance_id: STM-TRAINING-004
    states:
      - PENDING_COACH_REVIEW
      - ACCEPTED
      - DISMISSED
    initial_state: PENDING_COACH_REVIEW
    allowed_transitions:
      - from: PENDING_COACH_REVIEW
        to: ACCEPTED
      - from: PENDING_COACH_REVIEW
        to: DISMISSED
    forbidden_transitions:
      - from: ACCEPTED
        to: DISMISSED
      - from: DISMISSED
        to: ACCEPTED
    transition_guards:
      - transition: PENDING_COACH_REVIEW->ACCEPTED
        rule_ref: training.rule.coach_explicit_decision_required
      - transition: PENDING_COACH_REVIEW->DISMISSED
        rule_ref: training.rule.coach_explicit_decision_required

  - entity_ref: training.feedback_thread
    unique_governance_id: STM-TRAINING-005
    states:
      - OPEN
      - CLOSED
    initial_state: OPEN
    allowed_transitions:
      - from: OPEN
        to: CLOSED
    forbidden_transitions:
      - from: CLOSED
        to: OPEN
    transition_guards:
      - transition: OPEN->CLOSED
        rule_ref: training.rule.feedback_closure_requires_outcome

  - entity_ref: training.attention_queue_item
    unique_governance_id: STM-TRAINING-006
    states:
      - OPEN
      - RESOLVED
    initial_state: OPEN
    allowed_transitions:
      - from: OPEN
        to: RESOLVED
    forbidden_transitions: []
    transition_guards: []

# ---------------------------------------------------------------------------
# RULES  (INV-TRAIN-* → RUL-TRAINING-*)
# ---------------------------------------------------------------------------
rules:
  - id: training.rule.session_requires_objective
    unique_governance_id: RUL-TRAINING-001
    type: invariant
    inv_ref: INV-TRAIN-001
    subject_ref: training.training_session
    statement: every training_session must reference at least one valid session_objective
    formal_check_hint: sessionObjectiveIds min_items=1 enforced at creation and publish; returns 422 when absent
    blocking: true

  - id: training.rule.objective_requires_traceable_origin
    unique_governance_id: RUL-TRAINING-002
    type: invariant
    inv_ref: INV-TRAIN-002
    subject_ref: training.session_objective
    statement: every session_objective must have at least one of (needDetectedRef | competitiveFocusRef | developmentGoalRef | manualCoachRationale)
    formal_check_hint: one_of constraint enforced at creation; returns 422 when all are null
    blocking: true

  - id: training.rule.need_does_not_auto_create_session
    unique_governance_id: RUL-TRAINING-003
    type: boundary
    inv_ref: INV-TRAIN-003
    subject_ref: training.need_detected
    statement: need_detected must not automatically trigger session creation without explicit coach action
    formal_check_hint: no API path allows need_detected to create training_session directly
    blocking: true

  - id: training.rule.ai_only_recommends_coach_decides
    unique_governance_id: RUL-TRAINING-004
    type: boundary
    inv_ref: INV-TRAIN-004
    subject_ref: training.recommendation
    statement: AI and analytics can only generate recommendations; coach must explicitly accept or dismiss before any training action
    formal_check_hint: recommendation.status must transition via PENDING_COACH_REVIEW with explicit coach actor
    blocking: true

  - id: training.rule.publication_preconditions_met
    unique_governance_id: RUL-TRAINING-005
    type: lifecycle
    inv_ref: INV-TRAIN-005
    subject_ref: training.training_session
    statement: >
      session cannot publish without minimum trainable content:
      sessionObjectiveIds (min 1), team_scope or athlete_scope_refs (min 1),
      responsibleStaffRef, scheduledEndAt, session_blocks (min 1)
    formal_check_hint: POST /training-sessions/{id}/publish returns 422 when any minimum field absent
    blocking: true
    precondition_refs:
      - sessionObjectiveIds min_items=1
      - responsibleStaffRef non-null
      - scheduledEndAt non-null
      - session_blocks min_items=1

  - id: training.rule.execution_requires_prescription_context
    unique_governance_id: RUL-TRAINING-006
    type: invariant
    inv_ref: INV-TRAIN-006
    subject_ref: training.execution_record
    statement: every execution_record must reference a training_session and at least one of (sessionBlockRef | prescriptionLineRef | improvisedRationale)
    formal_check_hint: one_of constraint enforced; POST /training-sessions/{id}/execution returns 422 without context
    blocking: true

  - id: training.rule.planned_actual_must_not_merge
    unique_governance_id: RUL-TRAINING-007
    type: invariant
    inv_ref: INV-TRAIN-007
    subject_ref: training.training_session
    statement: planned fields must never be overwritten by actual fields; plannedContentSnapshot is immutable after PUBLISHED
    formal_check_hint: distinct planned_* and actual_* field groups; plannedContentSnapshot immutability test returns 409 on mutation
    blocking: true

  - id: training.rule.adjustment_requires_structured_reason
    unique_governance_id: RUL-TRAINING-008
    type: invariant
    inv_ref: INV-TRAIN-008
    subject_ref: training.session_adjustment
    statement: every session_adjustment must have adjustmentType, reasonCode and reasonText
    formal_check_hint: POST /training-sessions/{id}/adjustments returns 422 without reasonCode
    blocking: true

  - id: training.rule.completion_evidence_required
    unique_governance_id: RUL-TRAINING-009
    type: lifecycle
    inv_ref: INV-TRAIN-009
    subject_ref: training.training_session
    statement: session cannot transition to COMPLETED without at least one of (attendance_record | post_session_note | athlete_rpe | coach_session_note | execution_record)
    formal_check_hint: POST /training-sessions/{id}/complete returns 422 without minimum evidence
    blocking: true

  - id: training.rule.feedback_requires_anchor
    unique_governance_id: RUL-TRAINING-010
    type: invariant
    inv_ref: INV-TRAIN-010
    subject_ref: training.feedback_thread
    statement: feedback_thread must be anchored to at least one of (trainingSessionRef | sessionBlockRef | sessionObjectiveRef | evidenceRef)
    formal_check_hint: POST /training-sessions/{id}/feedback returns 422 without anchor_ref
    blocking: true

  - id: training.rule.cycle_review_requires_evidence
    unique_governance_id: RUL-TRAINING-011
    type: audit
    inv_ref: INV-TRAIN-011
    subject_ref: training.training_intervention_cycle
    statement: review_outcome must reference at least one execution_record or equivalent evidence
    formal_check_hint: review_outcome with evidence_ref present and valid
    blocking: false

  - id: training.rule.restriction_profile_read_only_in_training
    unique_governance_id: RUL-TRAINING-014
    type: boundary
    inv_ref: INV-TRAIN-014
    subject_ref: training.training_session
    statement: restriction_profile is owned by medical module; training can only read, never write or create
    formal_check_hint: no POST/PATCH/DELETE for restriction_profile in training module paths
    blocking: true

  - id: training.rule.analytics_cannot_mutate_training_state
    unique_governance_id: RUL-TRAINING-015
    type: boundary
    inv_ref: INV-TRAIN-015
    subject_ref: training.training_session
    statement: analytics module cannot directly alter any sovereign state in training module
    formal_check_hint: no API endpoint in training accepts analytics as mutating actor
    blocking: true

  - id: training.rule.status_lifecycle_closed
    unique_governance_id: RUL-TRAINING-017
    type: lifecycle
    inv_ref: INV-TRAIN-017
    subject_ref: training.training_session
    statement: training_session status transitions are closed; no arbitrary state mutation is allowed
    formal_check_hint: state machine tests with forbidden transitions returning 422
    blocking: true

  - id: training.rule.completed_immutable_no_destructive_edit
    unique_governance_id: RUL-TRAINING-020
    type: audit
    inv_ref: INV-TRAIN-020
    subject_ref: training.training_session
    statement: COMPLETED sessions are immutable by destructive edit; corrections require audit_correction_record with original_snapshot
    formal_check_hint: PATCH on COMPLETED session fields returns 409; correction requires elevated authorization
    blocking: true

  - id: training.rule.ineligible_athlete_blocked
    unique_governance_id: RUL-TRAINING-021
    type: authorization
    inv_ref: INV-TRAIN-021
    subject_ref: training.training_session
    statement: athlete with active restriction_profile must be blocked from executable prescriptions without audited override
    formal_check_hint: prescription for restricted athlete returns 422 without override; override generates audit_event
    blocking: true

  - id: training.rule.attention_queue_requires_severity_and_reason
    unique_governance_id: RUL-TRAINING-027
    type: integrity
    inv_ref: INV-TRAIN-027
    subject_ref: training.attention_queue_item
    statement: every attention_queue_item must have severityLevel, reasonCode and targetEntityRef
    formal_check_hint: creation validation enforces all three fields; alert without reason_code rejected
    blocking: false

  - id: training.rule.feedback_closure_requires_outcome
    unique_governance_id: RUL-TRAINING-028
    type: invariant
    inv_ref: INV-TRAIN-028
    subject_ref: training.feedback_thread
    statement: feedback_thread cannot close without a conversationOutcome enum value
    formal_check_hint: PATCH /feedback-threads/{id}/close returns 422 without conversationOutcome
    blocking: true

  - id: training.rule.relevant_decisions_audited
    unique_governance_id: RUL-TRAINING-029
    type: audit
    inv_ref: INV-TRAIN-029
    subject_ref: training.training_session
    statement: all relevant training actions (publish, adjust, cancel, complete, override, correction) must generate audit_event
    formal_check_hint: audit_event generated with required fields for each relevant action; no audit gap
    blocking: true

  - id: training.rule.rationale_survives_staff_change
    unique_governance_id: RUL-TRAINING-030
    type: audit
    inv_ref: INV-TRAIN-030
    subject_ref: training.continuity_snapshot
    statement: decision_rationale and continuity_snapshot must not be deleted on staff role change
    formal_check_hint: non-deletion test of decision_rationale on staff_handoff event
    blocking: false

  - id: training.rule.derived_signals_do_not_replace_raw_facts
    unique_governance_id: RUL-TRAINING-036
    type: integrity
    inv_ref: INV-TRAIN-036
    subject_ref: training.derived_signal
    statement: derived_signal must reference raw_data via rawDataRef (immutable); derived must not overwrite raw
    formal_check_hint: rawDataRef present and non-null; raw_data immutability test after creation
    blocking: true

  - id: training.rule.notifications_via_intents_only
    unique_governance_id: RUL-TRAINING-039
    type: boundary
    inv_ref: INV-TRAIN-039
    subject_ref: training.training_session
    statement: training module must never directly deliver notifications; only emit notification_intent events
    formal_check_hint: no direct push/sms/email paths in training OpenAPI spec
    blocking: true

  - id: training.rule.audit_via_transversal_module
    unique_governance_id: RUL-TRAINING-040
    type: audit
    inv_ref: INV-TRAIN-040
    subject_ref: training.training_session
    statement: training module must not maintain internal audit log; all audit via structured events to audit module
    formal_check_hint: no internal audit storage in training paths; audit_event emitted for each relevant action
    blocking: true

  - id: training.rule.identity_access_governs_permissions
    unique_governance_id: RUL-TRAINING-041
    type: authorization
    inv_ref: INV-TRAIN-041
    subject_ref: training.training_session
    statement: training module must not define permissions independently; all permission checks reference identity_access
    formal_check_hint: no hardcoded permission in training paths; all checks via identity_access reference
    blocking: true

  - id: training.rule.coach_explicit_decision_required
    unique_governance_id: RUL-TRAINING-004B
    type: authorization
    subject_ref: training.recommendation
    statement: recommendation cannot transition from PENDING_COACH_REVIEW without explicit coach actor action
    formal_check_hint: no automated state change from PENDING_COACH_REVIEW; requires actor with coach role
    blocking: true

# ---------------------------------------------------------------------------
# API USE CASES
# ---------------------------------------------------------------------------
api_use_cases:
  - id: training.session.create
    unique_governance_id: API-TRAINING-001
    resource_ref: training_session
    operation: create
    purpose: create draft training session with at least one session objective
    request_entity_refs:
      - training.training_session
      - training.session_objective
    response_entity_refs:
      - training.training_session
    requires_state_model: true
    decision_refs: [TRAIN-DEC-006]
    forbidden_inference:
      - auto_publish_on_create
      - session_without_objective

  - id: training.session.publish
    unique_governance_id: API-TRAINING-002
    resource_ref: training_session
    operation: publish
    purpose: publish session with minimum trainable content guard
    request_entity_refs:
      - training.training_session
    response_entity_refs:
      - training.training_session
    requires_state_model: true
    decision_refs: [TRAIN-DEC-007]
    forbidden_inference:
      - auto_publish_without_content_guard

  - id: training.session.change_state
    unique_governance_id: API-TRAINING-003
    resource_ref: training_session
    operation: state_transition
    purpose: transition session state (start, complete, cancel, archive) via valid transitions only
    request_entity_refs:
      - training.training_session
    response_entity_refs:
      - training.training_session
    requires_state_model: true
    decision_refs: [TRAIN-DEC-008]
    forbidden_inference:
      - arbitrary_state_mutation

  - id: training.execution.record
    unique_governance_id: API-TRAINING-004
    resource_ref: execution_record
    operation: create
    purpose: record what was actually executed in a session with prescription context
    request_entity_refs:
      - training.execution_record
    response_entity_refs:
      - training.execution_record
    requires_state_model: true
    decision_refs: [TRAIN-DEC-009]
    forbidden_inference:
      - execution_without_session_context

  - id: training.session.complete
    unique_governance_id: API-TRAINING-005
    resource_ref: training_session
    operation: complete
    purpose: mark session COMPLETED with minimum response evidence guard
    request_entity_refs:
      - training.training_session
    response_entity_refs:
      - training.training_session
    requires_state_model: true
    decision_refs: [TRAIN-DEC-012]
    forbidden_inference:
      - complete_without_evidence

  - id: training.adjustment.create
    unique_governance_id: API-TRAINING-006
    resource_ref: session_adjustment
    operation: create
    purpose: record structured live adjustment during session execution
    request_entity_refs:
      - training.session_adjustment
    response_entity_refs:
      - training.session_adjustment
    requires_state_model: false
    decision_refs: [TRAIN-DEC-011]
    forbidden_inference:
      - adjustment_without_reason

  - id: training.feedback.post
    unique_governance_id: API-TRAINING-007
    resource_ref: feedback_thread
    operation: create
    purpose: create contextual feedback thread anchored to operational entity
    request_entity_refs:
      - training.feedback_thread
    response_entity_refs:
      - training.feedback_thread
    requires_state_model: true
    decision_refs: [TRAIN-DEC-013]
    forbidden_inference:
      - feedback_without_anchor

  - id: training.feedback.close
    unique_governance_id: API-TRAINING-008
    resource_ref: feedback_thread
    operation: close
    purpose: close feedback thread requiring conversation_outcome
    request_entity_refs:
      - training.feedback_thread
    response_entity_refs:
      - training.feedback_thread
    requires_state_model: true
    decision_refs: [TRAIN-DEC-014]
    forbidden_inference:
      - close_without_conversation_outcome

  - id: training.need.create
    unique_governance_id: API-TRAINING-009
    resource_ref: need_detected
    operation: create
    purpose: register a training need with traceable origin evidence or coach rationale
    request_entity_refs:
      - training.need_detected
    response_entity_refs:
      - training.need_detected
    requires_state_model: true
    decision_refs: [TRAIN-DEC-003]
    forbidden_inference:
      - need_without_evidence_or_rationale

  - id: training.objective.create
    unique_governance_id: API-TRAINING-010
    resource_ref: session_objective
    operation: create
    purpose: create session objective linked to need or explicit coach rationale
    request_entity_refs:
      - training.session_objective
    response_entity_refs:
      - training.session_objective
    requires_state_model: false
    decision_refs: [TRAIN-DEC-004]
    forbidden_inference:
      - objective_without_origin

  - id: training.prescription.check_eligibility
    unique_governance_id: API-TRAINING-011
    resource_ref: prescription_line
    operation: eligibility_check
    purpose: verify athlete eligibility before creating executable prescription
    request_entity_refs:
      - training.training_session
    response_entity_refs:
      - training.attention_queue_item
    requires_state_model: false
    decision_refs: [TRAIN-DEC-022]
    forbidden_inference:
      - prescription_without_eligibility_check

# ---------------------------------------------------------------------------
# UI FLOWS
# ---------------------------------------------------------------------------
ui_flows:
  - id: training.coach.manage_session
    unique_governance_id: UIF-TRAINING-001
    actor: identity_access.role.coach_head
    goal: create, edit, publish and complete training session
    required: true
    depends_on_use_cases:
      - training.session.create
      - training.session.publish
      - training.session.complete
    states:
      - loading
      - success
      - error
      - empty
    decision_refs: [TRAIN-DEC-006, TRAIN-DEC-007, TRAIN-DEC-008]

  - id: training.coach.manage_attention_queue
    unique_governance_id: UIF-TRAINING-002
    actor: identity_access.role.coach_head
    goal: review and resolve prioritized attention queue items
    required: true
    depends_on_use_cases: []
    states:
      - loading
      - success
      - empty
    decision_refs: [TRAIN-DEC-024]

  - id: training.athlete.checkin
    unique_governance_id: UIF-TRAINING-003
    actor: identity_access.role.athlete
    goal: submit adaptive check-in before training session with minimal friction
    required: true
    depends_on_use_cases: []
    states:
      - minimal
      - extended
