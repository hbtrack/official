# ---------------------------------------------------------------------------
# OPEN DECISIONS
# ---------------------------------------------------------------------------
open_decisions:
  - id: OD-TRAINING-001
    topic: canonical_type_refs_for_training_specific_semantics
    description: >
      Definir quais campos de entidades training-específicas (ex.: exercise.intensityZone,
      session_block.blockType, execution_record.effortIndex) requerem $ref para tipos
      canônicos em contracts/schemas/shared/ versus inline-enum local. Até esta decisão
      ser tomada não é possível garantir consistência cross-surface nos schemas de treinamento.
      Responsável: tech lead do módulo training. Critério de resolução: PR com mapeamento
      completo de campo→$ref aceito e schemas atualizados.
    affects_surface:
      - contracts/schemas/training/*.schema.json
    blocking: false
    resolved: true
    resolved_at: "2026-03-14"
    resolution: >
      DECISÃO: todos os campos training-específicos listados usam inline-enum local —
      nenhum requer $ref para contracts/schemas/shared/ na fase atual.
      Mapeamento campo→tipo canônico: (1) session_block.blockType → inline enum
      [WARMUP, TECHNICAL, TACTICAL, PHYSICAL, TACTICAL_PHYSICAL, COOLDOWN, FREE];
      (2) execution_record.effortIndex → integer 1–10 (escala RPE; training é módulo
      soberano deste dado); (3) exercise.intensityZone → inline enum
      [ZONE_1_RECOVERY, ZONE_2_AEROBIC_BASE, ZONE_3_AEROBIC_THRESHOLD,
      ZONE_4_ANAEROBIC_THRESHOLD, ZONE_5_MAX].
      Política geral: promoção para contracts/schemas/shared/ exige consumidor
      cross-module explícito confirmado no IR desse módulo + PR com evidência de
      $ref bidirecional aceito. Sem consumidor confirmado → inline-enum local.

  - id: OD-TRAINING-002
    topic: conversation_outcome_enum_values
    description: define enum values for feedback_thread.conversationOutcome (reflection|commitment|pending_action|followup|decision)
    affects_surface:
      - contracts/schemas/training/feedback_thread.schema.json
    blocking: false

  - id: OD-TRAINING-003
    topic: adjustment_type_and_reason_code_enum_values
    description: define enum values for session_adjustment.adjustmentType and reasonCode
    affects_surface:
      - contracts/schemas/training/session_adjustment.schema.json
    blocking: false

  - id: OD-TRAINING-004
    topic: need_source_type_enum_values
    description: define enum values for need_detected.sourceType
    affects_surface:
      - contracts/schemas/training/need_detected.schema.json
    blocking: false

