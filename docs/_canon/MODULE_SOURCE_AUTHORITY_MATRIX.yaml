        - source_id: "CLOUDEVENTS"
        - source_id: "OPENAPI"
        - source_id: "ARAZZO"
        - source_id: "JSON_SCHEMA"
    required_contract_artifacts:
      - "MODULE_PROFILE"
      - "OPENAPI"
      - "ASYNCAPI"
      - "ARAZZO"
      - "DB_CONTRACT"
      - "INVARIANTS"
      - "DELIVERY_CONTRACT"
      - "TRACEABILITY"
    inference:
      may_infer: ["event_envelope", "channel", "recipient", "preference", "delivery_status", "retries", "templates_referenced"]
      must_not_infer: ["undefined_domain_content", "access_policy", "origin_module_business_states"]

derived_gates:
  matrix_integrity_gate:
    gate_id: "MODULE_SOURCE_AUTHORITY_MATRIX_GATE"
    schema_path: "contracts/schemas/shared/module_source_authority_matrix.schema.json"

  boundary_users_identity_access:
    gate_id: "BOUNDARY_USERS_IDENTITY_ACCESS_GATE"
    users_forbidden:
      fields:
        - "password_hash"
        - "refresh_token"
        - "mfa_secret"
        - "last_login_ip"
        - "jwt"
        - "access_token"
        - "oauth"
      path_markers:
        - "/login"
        - "/logout"
        - "/token"
        - "/refresh"
        - "/mfa"
        - "/authorize"
    identity_access_forbidden:
      fields:
        - "birth_date"
        - "height"
        - "dominant_hand"
        - "position"
        - "injury_history_summary"

  wellness_medical_boundary:
    gate_id: "WELLNESS_MEDICAL_BOUNDARY_GATE"
    wellness_forbidden:
      fields:
        - "diagnosis"
        - "treatment"
        - "prescription"
        - "procedure"
        - "medical_record"
        - "clinical_note"

  scout_taxonomy:
    gate_id: "SCOUT_TAXONOMY_GATE"
    trigger_fields: ["eventType", "event_type", "tagType", "tag_type"]
    required_taxonomy_artifact:
      path: "docs/hbtrack/modulos/scout/CANONICAL_EVENT_TAXONOMY_SCOUT.yaml"

  async_required_module:
    gate_id: "ASYNC_REQUIRED_MODULE_GATE"
    rules:
      - module: "training"
        require_arazzo_when_openapi_has_paths: true
        require_asyncapi_when_openapi_has_paths: false
      - module: "reports"
        require_arazzo_when_openapi_has_paths: true
        require_asyncapi_when_openapi_has_paths: false
      - module: "identity_access"
        require_arazzo_when_openapi_has_paths: true
        require_asyncapi_when_openapi_has_paths: false
      - module: "notifications"
        require_arazzo_when_openapi_has_paths: true
        require_asyncapi_when_openapi_has_paths: true
      - module: "ai_ingestion"
        require_arazzo_when_openapi_has_paths: false
        require_asyncapi_when_openapi_has_paths: true

  external_source_authority:
    gate_id: "EXTERNAL_SOURCE_AUTHORITY_GATE"
    forbidden_ssot_markers:
      - "SSOT: XPS"
      - "SSOT: Teamworks"
      - "SSOT: ACSM"
      - "SSOT: Aspetar"
      - "SSOT: EHF"
      - "XPS é SSOT"
      - "Teamworks é SSOT"
      - "ACSM é SSOT"
      - "Aspetar é SSOT"
      - "EHF é SSOT"
