      - "SPORT_SCIENCE_RULES"
      - "INVARIANTS"
      - "TEST_SCENARIOS"
      - "TRACEABILITY"
    inference:
      may_infer: ["session", "schedule", "publication", "attendance", "objectives", "microcycle", "planned_vs_actual_load"]
      must_not_infer: ["clinical_diagnosis", "official_competition_rules", "authentication_logic"]

  wellness:
