      - "OPENAPI"
      - "DB_CONTRACT"
      - "INVARIANTS"
      - "TRACEABILITY"
      - "TEST_SCENARIOS"
    inference:
      may_infer: ["competition", "stage", "phase", "table", "registration", "calendar"]
      must_not_infer: ["scout_detailed_events_without_own_contract", "ui_heuristics_as_domain_rule"]

  matches:
    sources_allowed:
      domain_authority:
        - source_id: "IHF"
          allowed_for: ["game_rules"]
      benchmark:
        - source_id: "EXTERNAL_MATCH_BENCHMARK"
