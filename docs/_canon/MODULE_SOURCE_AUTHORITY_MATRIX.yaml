        - source_id: "OAUTH2"
        - source_id: "OPENAPI"
        - source_id: "ARAZZO"
        - source_id: "JSON_SCHEMA"
    required_contract_artifacts:
      - "MODULE_PROFILE"
      - "OPENAPI"
      - "ARAZZO"
      - "DB_CONTRACT"
      - "INVARIANTS"
      - "SECURITY_CONTRACT"
      - "AUDIT_BINDINGS"
      - "TRACEABILITY"
    inference:
      may_infer: ["login", "logout", "session", "mfa", "jwt", "refresh", "technical_role_binding", "consent_flows"]
      must_not_infer:
