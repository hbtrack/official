      - "DB_CONTRACT"
      - "INVARIANTS"
      - "AUDIT_BINDINGS"
      - "TRACEABILITY"
      - "PRIVACY_RULES_LOCAL"
      - "SPORT_SCIENCE_RULES"
    inference:
      may_infer: ["injury", "illness", "assessment", "restriction", "return_to_play_or_training", "clinical_authorization"]
      must_not_infer: ["generic_wellness_as_medical", "authentication_policies", "diagnosis_without_explicit_contract"]

  competitions:
    sources_allowed:
      domain_authority:
        - source_id: "IHF"
          allowed_for: ["game_rules", "competition_regulations"]
      benchmark: []
      technical_standard:
        - source_id: "OPENAPI"
        - source_id: "JSON_SCHEMA"
    required_contract_artifacts:
