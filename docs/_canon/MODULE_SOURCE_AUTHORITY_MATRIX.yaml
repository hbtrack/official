version: "1.0.0"
artifact: "MODULE_SOURCE_AUTHORITY_MATRIX"
status: "active"
scope: "global"

policy:
  objective: >
    Definir, por módulo, (1) fontes permitidas por papel (autoridade de domínio, benchmark funcional,
    padrão técnico), (2) artefatos contratuais obrigatórios, e (3) limites explícitos de inferência
    para agentes. Este artefato NÃO promove fontes externas a SSOT; ele define uso permitido e
    onde bloquear inferência.

  global_principles:
    - principle_id: "P-001-domain-authority"
      statement: "IHF é autoridade de semântica esportiva (jogo/competição/elegibilidade)."
    - principle_id: "P-002-benchmark-not-norm"
      statement: "XPS e Teamworks AMS são benchmark funcional; não viram norma sozinhos."
    - principle_id: "P-003-technical-contract-language"
      statement: "OpenAPI/JSON Schema/AsyncAPI/Arazzo são linguagem técnica de contrato, não norma de domínio."
    - principle_id: "P-004-oidc-boundary"
      statement: "`identity_access` cobre authn/authz/credenciais/sessão/MFA/JWT/RBAC; não modela athlete profile."
    - principle_id: "P-005-async-artifacts"
      statement: "Workflow/evento exige artefato próprio: OpenAPI (HTTP), Arazzo (sequência), AsyncAPI (mensagens)."
    - principle_id: "P-006-sport-science-sources"
      statement: "ACSM/Aspetar/EHF podem sustentar regras técnico-científicas em SPORT_SCIENCE_RULES; não originam axiomas estruturais nem regras oficiais do handebol (IHF)."

  agent_inference_policy:
    allowed_low_risk_examples:
      - "training_session pertence ao módulo training."
      - "attendance liga training e users."
      - "session_publication pode exigir workflow multi-step."
    forbidden_examples:
      - "mover credenciais para users."
      - "tratar wellness como prontuário clínico."
      - "criar KPI sem definição canônica."
      - "deduzir taxonomia tática de scout sem glossário/taxonomia."

modules:
  users:
    sources_allowed:
      domain_authority:
        - source_id: "IHF"
          allowed_for: ["eligibility", "sports_roles"]
      benchmark:
        - source_id: "TEAMWORKS_AMS"
          allowed_for: ["sports_profile_benchmark"]
      technical_standard:
        - source_id: "OPENAPI"
        - source_id: "JSON_SCHEMA"
    required_contract_artifacts:
      - "MODULE_PROFILE"
      - "OPENAPI"
      - "DB_CONTRACT"
      - "CANONICAL_TYPE_REGISTRY_LOCAL"
      - "INVARIANTS"
      - "TRACEABILITY"
    inference:
      may_infer:
        - "profile"
        - "sports_links"
        - "preferences"
        - "person_data"
        - "team_season_relationships"
      must_not_infer:
        - "auth"
        - "credentials"
        - "session"
        - "mfa"
        - "jwt"
        - "refresh_token"
        - "password_policy"
        - "technical_rbac"

  seasons:
    sources_allowed:
      domain_authority:
        - source_id: "IHF"
          allowed_for: ["competition_regulations"]
      benchmark: []
      technical_standard:
        - source_id: "OPENAPI"
        - source_id: "JSON_SCHEMA"
    required_contract_artifacts:
      - "MODULE_PROFILE"
      - "OPENAPI"
      - "DB_CONTRACT"
      - "INVARIANTS"
      - "TRACEABILITY"
    inference:
      may_infer: ["sport_cycle", "periods", "phases", "competition_team_relationships"]
      must_not_infer: ["authentication_rules", "match_scorekeeping_details", "medical_semantics"]

  teams:
    sources_allowed:
      domain_authority:
        - source_id: "IHF"
          allowed_for: ["competition_regulations"]
      benchmark:
        - source_id: "XPS"
          allowed_for: ["planning", "communication", "video_analysis_benchmark"]
        - source_id: "TEAMWORKS_AMS"
