      - "OPENAPI"
      - "ASYNCAPI_WHEN_STREAM"
      - "DB_CONTRACT"
      - "INVARIANTS"
      - "RETENTION_POLICY"
      - "TRACEABILITY"
    inference:
      may_infer: ["actor", "action", "target", "timestamp", "correlation_id", "outcome", "origin", "before_after_when_contracted"]
      must_not_infer:
        - "full_sensitive_payloads"
        - "copy_pii_phi_unnecessarily"
        - "replace_domain_logs"

  notifications:
    sources_allowed:
      domain_authority: []
      benchmark: []
      technical_standard:
