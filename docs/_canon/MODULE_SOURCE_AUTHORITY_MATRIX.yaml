        - "clinical_data"
        - "business_attributes_of_users_or_teams_or_medical"

  audit:
    sources_allowed:
      domain_authority: []
      benchmark:
        - source_id: "OWASP"
          allowed_for: ["logging_audit_benchmark"]
      technical_standard:
        - source_id: "OPENAPI"
        - source_id: "ASYNCAPI"
        - source_id: "JSON_SCHEMA"
