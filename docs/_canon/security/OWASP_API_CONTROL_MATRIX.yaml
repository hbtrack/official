      - "resource_by_id_update"
      - "upload_operation"
    declaration:
      openapi:
        required: true
        fields:
          - "requestBody.content.application/json.schema.additionalProperties=false"
      human_contract:
        required: true
        fields:
          - "write_allowlist_policy"
          - "server_side_enforcement_note"
    evidence:
      contractual_minimum:
        - "request schemas are closed (no additionalProperties on objects that represent writes)"
      behavioral_required: true
      behavioral_minimum:
        - "unexpected property is rejected or ignored per policy"
    gates:
      declaration_gate: "INPUT_CONSTRAINTS_GATE"
      behavior_gate: "INPUT_CONSTRAINTS_BEHAVIOR_GATE"
