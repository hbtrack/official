agent_rules:
  - "Não inferir controles de segurança apenas pelo nome do endpoint."
  - "Não marcar controle como atendido se faltar declaração normativa exigida."
  - "Não marcar controle como atendido se a declaração OpenAPI existir mas a política humana obrigatória estiver ausente."
  - "Quando behavioral_required=true, evidência contratual sem evidência comportamental não é suficiente para VERIFIED."
