version: "1.0.0"
artifact: "OWASP_API_CONTROL_MATRIX"
status: "active"
scope: "global"

applies_to:
  - users
  - seasons
  - teams
  - training
  - wellness
  - medical
  - competitions
  - matches
  - scout
  - exercises
  - analytics
  - reports
  - ai_ingestion
  - identity_access
  - audit
  - notifications

policy:
  objective: >
    Converter OWASP API Security Top 10 (2023) em requisitos contratuais do HB Track:
    declaração mínima (contrato de máquina + contrato humano), evidência exigida e gates automatizáveis.

  interpretation_rules:
    - "Cada controle declara onde vive: OpenAPI, contrato humano normativo, ou ambos."
    - "Cada controle define evidência contratual mínima verificável por automação."
    - "Quando behavioral_required=true, declaração-only não é suficiente para status VERIFIED."
    - "Ausência de declaração normativa aplicável é falha de contrato, antes da implementação."
    - "Nem todo gate prova comportamento runtime; gates podem validar presença, consistência e cobertura."

control_matrix:
  - control_id: "SEC-OWASP-001"
    title: "Authentication declared for protected operations"
    owasp_refs:
      - "API2:2023 Broken Authentication"
    category: "authentication"
    severity: "critical"
    applies_to_operation_types:
      - "protected_read"
      - "protected_write"
      - "admin_operation"
    declaration:
      openapi:
        required: true
        fields:
          - "components.securitySchemes"
          - "security"
      human_contract:
        required: true
        fields:
          - "auth_scheme"
          - "required_scopes_or_roles"
          - "authentication_exceptions"
    evidence:
      contractual_minimum:
        - "operation declares security requirement"
        - "referenced security scheme exists"
        - "required scopes or roles are listed"
      behavioral_required: true
      behavioral_minimum:
        - "unauthenticated request is rejected"
        - "invalid token is rejected"
    gates:
      declaration_gate: "AUTH_DECLARATION_GATE"
      behavior_gate: "AUTH_BEHAVIOR_GATE"
    exit_codes:
      missing_declaration: 2
      inconsistent_declaration: 2
      missing_behavioral_evidence: 2
      infra_error: 3

  - control_id: "SEC-OWASP-002"
    title: "Object-level authorization declared for resource access"
    owasp_refs:
      - "API1:2023 Broken Object Level Authorization"
    category: "authorization_object"
    severity: "critical"
    applies_to_operation_types:
      - "resource_by_id_read"
      - "resource_by_id_update"
      - "resource_by_id_delete"
      - "nested_resource_access"
    declaration:
      openapi:
        required: false
        recommended_extensions:
          - "x-authorization-object"
          - "x-tenant-scope"
      human_contract:
        required: true
        fields:
          - "protected_resource"
          - "ownership_or_scope_rule"
          - "cross_tenant_rule"
          - "access_denial_policy"
    evidence:
      contractual_minimum:
        - "protected resource is identified"
        - "ownership or scope rule is declared"
        - "cross-tenant/cross-owner access rule is declared"
      behavioral_required: true
      behavioral_minimum:
        - "access to foreign resource is denied"
        - "denial response code matches policy"
    gates:
      declaration_gate: "OBJECT_AUTHZ_GATE"
      behavior_gate: "OBJECT_AUTHZ_BEHAVIOR_GATE"
    exit_codes:
      missing_declaration: 2
      inconsistent_declaration: 2
      missing_behavioral_evidence: 2
      infra_error: 3

  - control_id: "SEC-OWASP-003"
    title: "Function-level authorization declared for sensitive actions"
    owasp_refs:
      - "API5:2023 Broken Function Level Authorization"
    category: "authorization_function"
    severity: "critical"
    applies_to_operation_types:
      - "protected_write"
      - "admin_operation"
      - "sensitive_business_flow"
    declaration:
      openapi:
        required: false
        recommended_extensions:
          - "x-required-roles"
          - "x-required-scopes"
      human_contract:
        required: true
        fields:
          - "rbac_policy"
          - "least_privilege_rule"
          - "elevation_policy"
    evidence:
      contractual_minimum:
        - "required roles or scopes are declared"
        - "admin-only operations are explicitly tagged"
      behavioral_required: true
      behavioral_minimum:
        - "insufficient privilege is denied"
    gates:
      declaration_gate: "FUNCTION_AUTHZ_GATE"
      behavior_gate: "FUNCTION_AUTHZ_BEHAVIOR_GATE"
    exit_codes:
      missing_declaration: 2
      inconsistent_declaration: 2
      missing_behavioral_evidence: 2
      infra_error: 3

  - control_id: "SEC-OWASP-004"
