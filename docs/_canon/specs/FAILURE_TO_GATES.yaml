meta:
  document: FAILURE_TO_GATES.yaml
  version: "2.0"
  status: SSOT
  rule:
  - "Case MUST declare: failure_type_primary + capability."
  - "required_gates = [BUILD_LOCK_INTEGRITY] + mapping[failure_type_primary][capability]."
  - "If any required gate is lifecycle=MISSING => BLOCKED_INPUT (4)."

failure_types:

  FT_AUTH_CONTRACT:
    by_capability:
      AUTH: [AUTH_E2E_LOGIN, AUTH_CONTRACT_OPENAPI, AUTH_SMOKE_RUNTIME]

  FT_API_CONTRACT:
    by_capability:
      AUTH: [AUTH_CONTRACT_OPENAPI, AUTH_SMOKE_RUNTIME]
      RBAC: [RBAC_CONTRACT_OPENAPI, RBAC_SMOKE_PROTECTED]

  FT_E2E_UI:
    by_capability:
      AUTH: [AUTH_E2E_LOGIN, AUTH_SMOKE_RUNTIME]
      TRAINING: [TRAINING_E2E_FLOW, TRAINING_SMOKE_RUNTIME]

  FT_INTEGRATION_TEST:
    by_capability:
      RBAC: [RBAC_PYTEST_PERMISSIONS, RBAC_SMOKE_PROTECTED]
      ATHLETES: [ATHLETES_PYTEST, ATHLETES_SMOKE_RUNTIME]
      TEAMS: [TEAMS_PYTEST, TEAMS_SMOKE_RUNTIME]
      TRAINING: [TRAINING_E2E_FLOW, TRAINING_SMOKE_RUNTIME]

  FT_DB_MIGRATION:
    by_capability:
      DB_MIGRATIONS: [DB_MIGRATIONS_UPGRADE_HEAD, DB_MIGRATIONS_HASH_CHECK]
      ATHLETES: [DB_MIGRATIONS_ATHLETES, DB_MIGRATIONS_HASH_CHECK]
      TEAMS: [DB_MIGRATIONS_TEAMS, DB_MIGRATIONS_HASH_CHECK]
      TRAINING: [DB_MIGRATIONS_UPGRADE_HEAD, DB_MIGRATIONS_HASH_CHECK]

  FT_DB_PARITY:
    by_capability:
      DB_MIGRATIONS: [DB_PARITY_SCAN]

  FT_DB_CONNECTIVITY:
    by_capability:
      DB_MIGRATIONS: [DB_MIGRATIONS_UPGRADE_HEAD]

  FT_DOCS_INDEX:
    by_capability:
      DB_MIGRATIONS: [DOCS_INDEX_CHECK]

  FT_DOCS_CANON:
    by_capability:
      DB_MIGRATIONS: [DOCS_CANON_CHECK]

  FT_BUILD_DEPS:
    by_capability:
      DB_MIGRATIONS: [BUILD_LOCK_INTEGRITY]

  FT_SECURITY_POLICY:
    by_capability:
      DB_MIGRATIONS: [SECURITY_POLICY_CHECK]

  FT_TOOLING_GATES:
    by_capability:
      DB_MIGRATIONS: [AUDIT_PACK_INTEGRITY]
