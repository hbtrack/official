---
contract:
  name: DIAGNOSTIC_CONNECTIVITY_CONTRACT
  version: "1.1.0"
  status: repo_ready
  objective: >
    Diagnosticar de forma determinística a causa raiz de falhas de conectividade
    entre frontend local e backend remoto na VPS, com classificação por camada,
    evidências reproduzíveis, exit codes estáveis e handoff operacional claro
    para implementação e validação no repositório.
  scope:
    includes:
      - frontend_local_configuration
      - dns_resolution
      - tcp_connectivity
      - http_reachability
      - tls_validation
      - cors_validation
      - backend_health_validation
      - backend_readiness_validation
      - root_cause_classification
      - json_report_generation
      - markdown_report_generation
      - executor_handoff
      - evidence_contract
    excludes:
      - browser_dom_inspection
      - business_endpoint_semantics
      - production_observability_full_stack
      - redis_and_queue_health_until_exposed_by_backend

metadata:
  module: platform_diagnostics
  domain: connectivity
  repo_area:
    - tools/diagnostics
    - _reports
    - backend health endpoints
    - frontend env integration
  priority: high
  severity_if_missing: >
    Sem este contrato, falhas de conectividade entre frontend local e backend
    remoto continuam dependendo de investigação manual e não determinística.
  canonical_language: python
  script_policy:
    python_only: true
    shell_banned: true
    powershell_banned: true
  determinism_requirements:
    - "Mesmas entradas devem gerar a mesma classificação de causa raiz."
    - "Primeira falha estrutural bloqueante domina a causa raiz."
    - "Não inferir dependências não expostas canonicamente."
    - "Não mascarar exceções sem evidência."

owners:
  product_owner: user
  technical_owner: backend_platform
  implementation_owner: executor_agent
  validation_owner: auditor_agent
  approval_owner: user
  consulted_roles:
    - frontend_owner
    - backend_owner
    - infra_owner

context_real:
  frontend:
    framework: nextjs
    local_origin: "http://localhost:3000"
    env_var_canonical: "NEXT_PUBLIC_API_URL"
    env_var_names:
      - "NEXT_PUBLIC_API_URL"
    env_file_reference:
      file: ".env.local"
      line: 3
      value: "http://localhost:8000/api/v1"
    api_url_consumers:
      - file: "client.ts"
        line: 9
      - file: "WelcomeFlow.tsx"
        line: 13
      - file: "useDashboard.tsx"
        line: 12

  backend:
    public_base_url: "http://191.252.185.34/api/v1"
    bind:
      host: "127.0.0.1"
      port: 8000
    reverse_proxy:
      enabled: true
      server: nginx
      listen_port: 80
      proxy_pass: "http://127.0.0.1:8000"
    public_exposure:
      direct_uvicorn_exposed: false
      ufw_exposes_8000: false

  health_endpoints:
    health_path: "/api/v1/health"
    readiness_path: "/api/v1/health/readiness"
    ready_alias_exists: false
    notes:
      - "Nao existe /ready; readiness real usa /api/v1/health/readiness."
      - "Alias /ready pode ser criado depois sem mudar a fonte de verdade atual."

  health_coverage:
    database: true
    redis: false
    queue: false
    current_health_payload_shape:
      top_level_fields:
        - status
        - version
        - environment
        - database
    limitations:
      - "Redis existe no docker-compose, mas nao e monitorado no health."
      - "Nao ha worker/celery health exposto."
      - "Diagnostico de dependencias internas hoje so consegue provar status do banco."

  cors:
    allowed_origins_current:
      - "http://191.252.185.34"
      - "https://hbtracking.com"
    localhost_3000_allowed: false
    confirmed_gap: "CORS_BLOCKING_ORIGIN for local frontend against VPS API"

problem_statement:
  description: >
    Quando o frontend roda localmente e consome a API na VPS, falhas de conexão
    não devem exigir investigação manual ad hoc. O sistema deve identificar,
    classificar e reportar a primeira falha estrutural bloqueante da cadeia:
    navegador -> frontend local -> API remota -> dependências do backend.
  primary_goal: >
    Produzir um script Python de diagnóstico determinístico que aponte a causa
    raiz provável e gere evidências estruturadas.
  non_goals:
    - "Garantir zero erro no produto real."
    - "Substituir observabilidade completa de produção."
    - "Inferir saúde de Redis/fila sem endpoint canonicamente exposto."

artifacts:
  script:
    path: "tools/diagnostics/diagnose_connectivity.py"
    language: python
    required: true
  checks_package:
    path: "tools/diagnostics/checks/"
    required: true
  models_package:
    path: "tools/diagnostics/models/"
    required: true
  reporters_package:
    path: "tools/diagnostics/reporters/"
    required: true
  config:
    path: "config.py"
    required: true
  report_json:
    path: "_reports/connectivity_diagnostic_report.json"
    required: true
  report_md:
    path: "_reports/connectivity_diagnostic_report.md"
    optional: true
  test_file:
    path: "tests/tools/diagnostics/test_diagnose_connectivity.py"
    required: true

dependencies:
  runtime:
    python:
      required: true
    python_packages:
      - requests
  internal_contracts:
    - "config.py"
  external_services:
    - nginx
    - backend_api
  backend_prerequisites:
    - "GET /api/v1/health"
    - "GET /api/v1/health/readiness"
  optional_future_dependencies:
    - redis_health_endpoint
    - queue_health_endpoint

inputs:
  required:
    api_base_url:
      value: "http://191.252.185.34/api/v1"
    frontend_origin:
      value: "http://localhost:3000"
    frontend_env_var_names:
      value:
        - "NEXT_PUBLIC_API_URL"
    health_path:
      value: "/api/v1/health"
    readiness_path:
      value: "/api/v1/health/readiness"
    timeout_seconds:
      value: 8
    verify_tls:
      value: false
  optional:
    expected_env_file:
      value: ".env.local"
    allow_private_debug_overrides:
      value: false
    report_markdown:
      value: true

preconditions:
  required_for_full_diagnosis:
    - "Frontend possui variável canônica definida para a URL da API."
    - "API pública é acessível via URL base remota."
    - "Endpoint /api/v1/health existe."
    - "Endpoint /api/v1/health/readiness existe."
  currently_true:
    - "NEXT_PUBLIC_API_URL existe e é usada pelo frontend."
    - "GET /api/v1/health existe."
    - "GET /api/v1/health/readiness existe."
    - "API pública passa por Nginx."
  currently_false_or_partial:
    - "Health de Redis não existe."
    - "Health de fila/worker não existe."
    - "CORS não permite http://localhost:3000."
    - "Valor atual de .env.local aponta para localhost:8000, inadequado para backend remoto consumido pelo browser."

diagnostic_execution_order:
  - id: 1
    name: frontend_api_url_discovery
    objective: "Descobrir a URL real da API usada pelo frontend."
    validations:
      - "Variável canônica existe."
      - "URL é sintaticamente válida."
      - "URL não está vazia."
    fail_codes:
      - FRONTEND_API_URL_MISSING
      - FRONTEND_API_URL_INVALID

  - id: 2
    name: frontend_api_url_topology_check
    objective: >
      Verificar se a URL configurada faz sentido para a topologia atual
      frontend local -> browser -> API remota.
    validations:
      - "Não usar localhost se o backend pretendido está remoto e o acesso é via browser."
      - "Detectar uso indevido de http://localhost:8000/api/v1 para browser local."
    fail_codes:
      - FRONTEND_API_URL_LOCALHOST_MISUSE

  - id: 3
    name: api_url_parse
    objective: "Extrair scheme, host, port e base path da URL alvo."
    fail_codes:
      - API_URL_PARSE_ERROR

  - id: 4
    name: dns_resolution
    objective: "Resolver o host público da API."
    applies_when:
      - "host is not localhost"
    fail_codes:
      - API_HOST_UNRESOLVED

  - id: 5
    name: tcp_connectivity
    objective: "Testar alcance TCP da porta pública da API."
    fail_codes:
      - API_PORT_CLOSED
      - API_TCP_TIMEOUT

  - id: 6
    name: tls_validation
    objective: "Validar handshake TLS e certificado quando scheme=https."
    applies_when:
      - "scheme is https"
    fail_codes:
      - TLS_CERT_INVALID
      - TLS_HOSTNAME_MISMATCH
      - TLS_HANDSHAKE_FAILED

  - id: 7
    name: http_health_reachability
    objective: "Testar resposta HTTP do endpoint de health."
    request:
      method: GET
      path: "/api/v1/health"
    fail_codes:
      - API_HTTP_UNREACHABLE
      - API_HTTP_TIMEOUT
      - API_HEALTH_ENDPOINT_MISSING
      - API_UNEXPECTED_REDIRECT

  - id: 8
    name: protocol_coherence
    objective: "Detectar risco de mixed content entre origem do frontend e URL da API."
    fail_codes:
      - MIXED_CONTENT_RISK

  - id: 9
    name: cors_preflight
    objective: "Simular preflight do browser para a origem local."
    request:
      method: OPTIONS
      target_path: "/api/v1/health"
      headers:
        Origin: "http://localhost:3000"
        Access-Control-Request-Method: "GET"
    validations:
      - "Access-Control-Allow-Origin permite http://localhost:3000"
      - "Métodos necessários estão liberados"
    fail_codes:
      - CORS_BLOCKING_ORIGIN
      - CORS_METHOD_NOT_ALLOWED
      - CORS_HEADERS_NOT_ALLOWED

  - id: 10
    name: backend_health_schema
    objective: "Validar schema e semântica do /api/v1/health."
    expected_minimum_schema:
      type: object
      required:
        - status
        - database
    fail_codes:
      - HEALTH_RESPONSE_INVALID
      - HEALTH_SCHEMA_INVALID

  - id: 11
    name: backend_readiness
    objective: "Validar readiness em /api/v1/health/readiness."
    request:
      method: GET
      path: "/api/v1/health/readiness"
    readiness_rules:
      - "200 indica pronto"
      - "503 indica não pronto"
    fail_codes:
      - BACKEND_NOT_READY

  - id: 12
    name: backend_dependency_inference
    objective: >
      Identificar falha de dependência interna somente a partir do que o health
      realmente expuser de forma canônica.
    rules:
      - "Hoje só é permitido inferir status do banco."
      - "Não inferir Redis ou fila sem exposição explícita no health."
    fail_codes:
      - DATABASE_DOWN
      - DATABASE_DEGRADED

  - id: 13
    name: root_cause_classification
    objective: "Selecionar a primeira falha estrutural bloqueante da cadeia."
    precedence:
      - FRONTEND_API_URL_MISSING
      - FRONTEND_API_URL_INVALID
      - FRONTEND_API_URL_LOCALHOST_MISUSE
      - API_URL_PARSE_ERROR
      - API_HOST_UNRESOLVED
      - API_PORT_CLOSED
      - API_TCP_TIMEOUT
      - TLS_CERT_INVALID
      - TLS_HOSTNAME_MISMATCH
      - TLS_HANDSHAKE_FAILED
      - API_HTTP_UNREACHABLE
      - API_HTTP_TIMEOUT
      - API_HEALTH_ENDPOINT_MISSING
      - API_UNEXPECTED_REDIRECT
      - MIXED_CONTENT_RISK
      - CORS_BLOCKING_ORIGIN
      - CORS_METHOD_NOT_ALLOWED
      - CORS_HEADERS_NOT_ALLOWED
      - HEALTH_RESPONSE_INVALID
      - HEALTH_SCHEMA_INVALID
      - BACKEND_NOT_READY
      - DATABASE_DOWN
      - DATABASE_DEGRADED
      - API_RETURNED_500
      - UNKNOWN_FAILURE

health_contract:
  path: "/api/v1/health"
  method: GET
  current_state:
    implemented: true
    coverage:
      database: true
      redis: false
      queue: false
  required_behavior_now:
    - "Retornar JSON."
    - "Declarar status global."
    - "Declarar estado do banco."
  current_minimum_schema:
    type: object
    required:
      - status
      - version
      - environment
      - database
  accepted_status_values:
    - healthy
    - unhealthy

readiness_contract:
  path: "/api/v1/health/readiness"
  method: GET
  current_state:
    implemented: true
  required_behavior:
    success_http_status: 200
    failure_http_status: 503

root_cause_taxonomy:
  configuration:
    - FRONTEND_API_URL_MISSING
    - FRONTEND_API_URL_INVALID
    - FRONTEND_API_URL_LOCALHOST_MISUSE
    - API_URL_PARSE_ERROR
  network:
    - API_HOST_UNRESOLVED
    - API_PORT_CLOSED
    - API_TCP_TIMEOUT
  tls_protocol:
    - TLS_CERT_INVALID
    - TLS_HOSTNAME_MISMATCH
    - TLS_HANDSHAKE_FAILED
    - MIXED_CONTENT_RISK
  http:
    - API_HTTP_UNREACHABLE
    - API_HTTP_TIMEOUT
    - API_HEALTH_ENDPOINT_MISSING
    - API_UNEXPECTED_REDIRECT
    - API_RETURNED_500
  cors:
    - CORS_BLOCKING_ORIGIN
    - CORS_METHOD_NOT_ALLOWED
    - CORS_HEADERS_NOT_ALLOWED
  backend:
    - HEALTH_RESPONSE_INVALID
    - HEALTH_SCHEMA_INVALID
    - BACKEND_NOT_READY
  dependencies:
    - DATABASE_DOWN
    - DATABASE_DEGRADED
  control:
    - PASS
    - BLOCKED_INPUT
    - ERROR_INFRA
    - UNKNOWN_FAILURE

exit_codes:
  PASS: 0
  FAIL_ACTIONABLE: 2
  ERROR_INFRA: 3
  BLOCKED_INPUT: 4

report_contract:
  json:
    required_fields:
      - contract
      - version
      - status
      - exit_code
      - root_cause_code
      - root_cause_summary
      - inputs
      - checks
      - recommended_action
  markdown:
    optional: true
    sections:
      - context
      - inputs
      - final_result
      - root_cause
      - checks
      - evidence
      - recommended_action

check_result_schema:
  type: object
  required:
    - name
    - status
    - evidence
  properties:
    name:
      type: string
    status:
      type: string
      allowed:
        - pass
        - fail
        - skip
        - warn
    evidence:
      type:
        - string
        - object
        - array
    root_cause_candidate:
      type: boolean
      optional: true

commands:
  local_execution:
    - "python tools/diagnostics/diagnose_connectivity.py"
  local_execution_with_report_only:
    - "python tools/diagnostics/diagnose_connectivity.py --json-only"
  tests:
    - "python -m pytest tests/tools/diagnostics/test_diagnose_connectivity.py -q"
  optional_manual_validation:
    - "curl -i http://191.252.185.34/api/v1/health"
    - "curl -i http://191.252.185.34/api/v1/health/readiness"
    - "curl -i -X OPTIONS http://191.252.185.34/api/v1/health -H 'Origin: http://localhost:3000' -H 'Access-Control-Request-Method: GET'"

implementation_rules:
  - "Implementação somente em Python."
  - "Não usar scripts .sh ou .ps1."
  - "Cada check deve ficar isolado em função própria."
  - "Não inferir saúde de Redis/fila sem endpoint explícito."
  - "Não mascarar exceções sem registrar evidência."
  - "Classificação final deve ser reproduzível."
  - "O script deve respeitar a ordem obrigatória dos checks."
  - "Primeira falha estrutural bloqueante domina a causa raiz."
  - "Se NEXT_PUBLIC_API_URL apontar para localhost em cenário browser->VPS, classificar como misuse antes de outras etapas."

expected_current_primary_failures:
  - code: FRONTEND_API_URL_LOCALHOST_MISUSE
    why: >
      O frontend local está configurado com NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1,
      o que no browser aponta para a máquina local, não para a VPS pública.
  - code: CORS_BLOCKING_ORIGIN
    why: >
      Mesmo corrigindo a URL para a API pública, a configuração CORS atual não inclui
      http://localhost:3000 entre as origens permitidas.

recommended_actions_now:
  immediate:
    - "Trocar NEXT_PUBLIC_API_URL local para a URL pública da API durante desenvolvimento contra a VPS."
    - "Adicionar http://localhost:3000 na whitelist CORS do backend da VPS."
  next:
    - "Padronizar relatório do health para facilitar parsing determinístico."
    - "Expor Redis health quando isso for requisito operacional."
    - "Expor queue/worker health quando houver dependência crítica de fila."
  avoid:
    - "Não abrir a porta 8000 externamente se Nginx já é o proxy canonicamente adotado."
    - "Não inferir problema de banco se o bloqueio já ocorreu antes em URL/CORS."

evidence_expected:
  required:
    - path: "_reports/connectivity_diagnostic_report.json"
      description: "Relatório principal com causa raiz, checks, inputs e ação recomendada."
    - path: "test results"
      description: "Resultado dos testes unitários do diagnóstico."
  optional:
    - path: "_reports/connectivity_diagnostic_report.md"
      description: "Resumo legível para handoff e auditoria."
  must_prove:
    - "Detecção de NEXT_PUBLIC_API_URL ausente."
    - "Detecção de NEXT_PUBLIC_API_URL inválida."
    - "Detecção de uso indevido de localhost."
    - "Detecção de CORS bloqueando localhost:3000."
    - "Consumo de /api/v1/health."
    - "Consumo de /api/v1/health/readiness."
    - "Geração de relatório JSON."
    - "Mapeamento correto de exit code."

definition_of_done:
  - "Script detecta FRONTEND_API_URL_LOCALHOST_MISUSE."
  - "Script detecta CORS_BLOCKING_ORIGIN para http://localhost:3000."
  - "Script consome /api/v1/health."
  - "Script consome /api/v1/health/readiness."
  - "Script gera _reports/connectivity_diagnostic_report.json."
  - "Script retorna exit code conforme mapeamento canônico."
  - "Script não depende de navegador para classificar a falha principal."
  - "Script não reporta Redis/fila como fail sem cobertura real no health."
  - "Testes automatizados mínimos passam."

test_matrix_minimum:
  - id: TC01
    scenario: "NEXT_PUBLIC_API_URL ausente"
    expected_root_cause: FRONTEND_API_URL_MISSING
  - id: TC02
    scenario: "NEXT_PUBLIC_API_URL inválida"
    expected_root_cause: FRONTEND_API_URL_INVALID
  - id: TC03
    scenario: "NEXT_PUBLIC_API_URL aponta para localhost em cenário VPS"
    expected_root_cause: FRONTEND_API_URL_LOCALHOST_MISUSE
  - id: TC04
    scenario: "Host público não resolve"
    expected_root_cause: API_HOST_UNRESOLVED
  - id: TC05
    scenario: "Porta pública indisponível"
    expected_root_cause: API_PORT_CLOSED
  - id: TC06
    scenario: "API pública responde mas CORS não permite localhost:3000"
    expected_root_cause: CORS_BLOCKING_ORIGIN
  - id: TC07
    scenario: "/api/v1/health ausente ou inválido"
    expected_root_cause: API_HEALTH_ENDPOINT_MISSING
  - id: TC08
    scenario: "/api/v1/health/readiness retorna 503"
    expected_root_cause: BACKEND_NOT_READY
  - id: TC09
    scenario: "/api/v1/health informa database unhealthy"
    expected_root_cause: DATABASE_DOWN
  - id: TC10
    scenario: "Tudo saudável e configurado corretamente"
    expected_root_cause: PASS

executor_handoff:
  objective: >
    Implementar o pacote de diagnóstico sem alterar indevidamente a arquitetura
    atual, respeitando Nginx como borda canônica e os endpoints reais já existentes.
  executor_must_do:
    - "Criar tools/diagnostics/diagnose_connectivity.py."
    - "Criar submódulos de checks, models e reporters."
    - "Ler NEXT_PUBLIC_API_URL do contexto configurado."
    - "Executar os checks na ordem canônica definida."
    - "Persistir _reports/connectivity_diagnostic_report.json."
    - "Criar testes automatizados mínimos cobrindo a matriz TC01-TC10."
  executor_must_not_do:
    - "Não trocar /api/v1/health/readiness por /ready como fonte de verdade."
    - "Não abrir porta 8000 externamente."
    - "Não inferir Redis/fila como unhealthy sem endpoint canônico."
    - "Não alterar o fluxo Nginx -> 127.0.0.1:8000 sem evidência arquitetural."
    - "Não mascarar FRONTEND_API_URL_LOCALHOST_MISUSE com erro genérico de conexão."
  expected_files:
    - "tools/diagnostics/diagnose_connectivity.py"
    - "tools/diagnostics/checks/*.py"
    - "tools/diagnostics/models/*.py"
    - "tools/diagnostics/reporters/*.py"
    - "tests/tools/diagnostics/test_diagnose_connectivity.py"

auditor_handoff:
  auditor_must_verify:
    - "A implementação segue Python-only."
    - "Os checks obedecem a ordem canônica."
    - "A classificação escolhe a primeira falha estrutural bloqueante."
    - "O JSON final contém os campos obrigatórios."
    - "O script distingue FAIL_ACTIONABLE, ERROR_INFRA e BLOCKED_INPUT."
    - "O contrato real de /health/readiness foi respeitado."
  auditor_evidence:
    - "_reports/connectivity_diagnostic_report.json"
    - "resultado dos testes"
    - "diff dos arquivos criados/alterados"

risks:
  - id: R1
    name: false_positive_due_to_env_mismatch
    mitigation: "Priorizar descoberta da URL real do frontend antes de qualquer teste remoto."
  - id: R2
    name: overclaiming_dependency_health
    mitigation: "Restringir inferência ao banco até que Redis/fila sejam expostos canonicamente."
  - id: R3
    name: architectural_drift
    mitigation: "Preservar Nginx como borda e readiness em /api/v1/health/readiness."
  - id: R4
    name: vague_error_reporting
    mitigation: "Usar taxonomy fixa de root_cause_code."

limitations:
  - "Não detecta problemas internos de Redis/fila nesta versão."
  - "Não executa script no browser; simula preflight e checks HTTP."
  - "Depende do health real para provar falha de dependência interna."
  - "Sem alias /ready nesta versão; readiness canônico é /api/v1/health/readiness."

future_evolution:
  - "Adicionar alias /ready sem quebrar compatibilidade."
  - "Padronizar health com status ok/degraded/fail."
  - "Adicionar health de Redis."
  - "Adicionar health de queue/worker."
  - "Adicionar validação opcional de endpoint de negócio além de /health."

approval:
  ready_for_executor: true
  ready_for_auditor: true
  blocked_by:
    - "Nenhum bloqueio estrutural para implementação do diagnóstico."

