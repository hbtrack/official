spec/modules/playbook/projections.yaml

module: playbook
version: "0.1.0"
status: "draft_normativo"

projections:
  - name: "play_catalog_projection"
    description: "Catálogo de jogadas visíveis e publicadas por time."
    source_events:
      - "play_created"
      - "play_published"
      - "play_copied"
    grain: "one_row_per_play"
    fields:
      - name: "play_id"
        type: "uuid"
      - name: "playbook_id"
        type: "uuid"
      - name: "team_id"
        type: "uuid"
      - name: "title"
        type: "string"
      - name: "version"
        type: "int"
      - name: "is_published"
        type: "bool"
      - name: "source_play_id"
        type: "uuid|null"
      - name: "source_team_id"
        type: "uuid|null"
    refresh_mode: "async"
    consistency_model: "eventual"
    storage_target: "table"
    rebuild_strategy:
      full_rebuild: true
      incremental: true
    consumers:
      endpoints:
        - "GET /plays/{play_id}"
      screens:
        - "catalog_playbook"
      analytics:
        - "published_plays_per_team"

  - name: "play_lineage_projection"
    description: "Relações de cópia entre plays de origem e destino."
    source_events:
      - "play_copied"
    grain: "one_row_per_copy_relation"
    fields:
      - name: "source_play_id"
        type: "uuid"
      - name: "source_team_id"
        type: "uuid"
      - name: "target_play_id"
        type: "uuid"
      - name: "target_team_id"
        type: "uuid"
      - name: "copied_at"
        type: "datetime"
      - name: "copied_by"
        type: "uuid|null"
    refresh_mode: "async"
    consistency_model: "eventual"
    storage_target: "table"
    rebuild_strategy:
      full_rebuild: true
      incremental: true
    consumers:
      endpoints: []
      screens:
        - "play_lineage_info"
      analytics:
        - "cross_team_play_reuse"
