openapi: 3.1.0
info:
  title: HB Track - Athletes Module API
  version: 1.0.0
  summary: Contract API for ATHLETES module
  description: >
    Public HTTP contract for athlete management in HB Track.
  contact:
    name: HB Track Support

jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

servers:
  - url: https://api.hbtrack.local

tags:
  - name: ATHLETES
    description: Athlete management operations

security:
  - bearerAuth: []

paths:
  /api/v1/athletes:
    post:
      tags: [ATHLETES]
      operationId: athletes__athlete__create
      summary: Create athlete
      description: Creates a new athlete record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AthleteCreateRequest'
            examples:
              validMinimal:
                $ref: '#/components/examples/AthleteCreateRequestValidMinimal'
              invalidDuplicateFederationId:
                $ref: '#/components/examples/AthleteCreateRequestDuplicateFederationId'
      responses:
        '201':
          description: Athlete created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteResponse'
              examples:
                success:
                  $ref: '#/components/examples/AthleteResponseCreated'
        '409':
          $ref: '#/components/responses/AthleteFederationIdConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    get:
      tags: [ATHLETES]
      operationId: athletes__athlete__list
      summary: List athletes
      description: Returns athletes according to the provided filters.
      parameters:
        - $ref: '#/components/parameters/TeamIdQuery'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Paginated athlete list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/athletes/{athlete_id}:
    get:
      tags: [ATHLETES]
      operationId: athletes__athlete__get
      summary: Get athlete by id
      description: Returns a specific athlete by their ID.
      parameters:
        - $ref: '#/components/parameters/AthleteIdPath'
      responses:
        '200':
          description: Athlete found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteResponse'
        '404':
          $ref: '#/components/responses/AthleteNotFound'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    patch:
      tags: [ATHLETES]
      operationId: athletes__athlete__update
      summary: Update athlete
      description: Partially updates an existing athlete record.
      parameters:
        - $ref: '#/components/parameters/AthleteIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AthleteUpdateRequest'
      responses:
        '200':
          description: Athlete updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteResponse'
        '404':
          $ref: '#/components/responses/AthleteNotFound'
        '409':
          $ref: '#/components/responses/AthleteFederationIdConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AthleteIdPath:
      name: athlete_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TeamIdQuery:
      name: team_id
      in: query
      required: false
      schema:
        type: string
        format: uuid

    CategoryIdQuery:
      name: category_id
      in: query
      required: false
      schema:
        type: string
        format: uuid

    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    AthleteCreateRequest:
      type: object
      additionalProperties: false
      required:
        - full_name
        - birth_date
        - category_id
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 120
        birth_date:
          type: string
          format: date
        category_id:
          type: string
          format: uuid
        team_id:
          type: [string, 'null']
          format: uuid
        federation_id:
          type: [string, 'null']
          maxLength: 50
        dominant_hand:
          $ref: '#/components/schemas/DominantHand'

    AthleteUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: >-
        PATCH payload for athlete update. At least one field must be provided.
        competition_year is NOT accepted — it is injected by the application service
        from HBTRACK_COMPETITION_YEAR system config.
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 120
        birth_date:
          type: string
          format: date
        category_id:
          type: string
          format: uuid
        team_id:
          type: [string, 'null']
          format: uuid
        federation_id:
          type: [string, 'null']
          maxLength: 50
        dominant_hand:
          $ref: '#/components/schemas/DominantHand'

    AthleteResponse:
      type: object
      additionalProperties: false
      required:
        - athlete_id
        - full_name
        - birth_date
        - category_id
        - status
        - created_at
      properties:
        athlete_id:
          type: string
          format: uuid
        full_name:
          type: string
        birth_date:
          type: string
          format: date
        category_id:
          type: string
          format: uuid
        team_id:
          type: [string, 'null']
          format: uuid
        federation_id:
          type: [string, 'null']
        dominant_hand:
          $ref: '#/components/schemas/DominantHand'
        status:
          $ref: '#/components/schemas/AthleteStatus'
        created_at:
          type: string
          format: date-time

    AthleteListItem:
      allOf:
        - $ref: '#/components/schemas/AthleteResponse'

    AthleteListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - page_size
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AthleteListItem'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    DominantHand:
      type: string
      enum: [RIGHT, LEFT, AMBIDEXTROUS]

    AthleteStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

  responses:
    AthleteNotFound:
      description: Athlete not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error_code: ATHLETE_NOT_FOUND
                message: Athlete not found

    AthleteFederationIdConflict:
      description: Federation id already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error_code: ATHLETE_FEDERATION_ID_CONFLICT
                message: Federation id already exists

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  examples:
    AthleteCreateRequestValidMinimal:
      value:
        full_name: Ana Souza
        birth_date: 2010-05-13
        category_id: 4d8d3d80-1f6f-4db4-a245-e8db97f6d111
        team_id: null
        federation_id: FB-2026-0001
        dominant_hand: RIGHT

    AthleteCreateRequestDuplicateFederationId:
      value:
        full_name: Ana Souza
        birth_date: 2010-05-13
        category_id: 4d8d3d80-1f6f-4db4-a245-e8db97f6d111
        federation_id: FB-2026-0001

    AthleteResponseCreated:
      value:
        athlete_id: 8b25688c-2ea9-48ad-9b8a-7ff5df6d0101
        full_name: Ana Souza
        birth_date: 2010-05-13
        category_id: 4d8d3d80-1f6f-4db4-a245-e8db97f6d111
        team_id: null
        federation_id: FB-2026-0001
        dominant_hand: RIGHT
        status: ACTIVE
        created_at: 2026-03-07T12:00:00Z
