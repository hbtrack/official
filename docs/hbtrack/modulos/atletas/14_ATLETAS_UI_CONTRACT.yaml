meta:
  document_id: UI-ATHLETES
  module_id: ATHLETES
  module_version: 1.0.0
  status: DRAFT
  authority_level: EXECUTIONAL_SSOT

selector_strategy:
  primary: data-testid
  playwright_api: getByTestId

screens:
  - screen_id: athletes.create
    bound_operation_ids:
      - athletes__athlete__create
    states:
      - state: idle
      - state: submitting
        submit_button_policy: disabled
        double_click_blocked: true
      - state: success
        feedback_selector: athletes.create.feedback.success
      - state: validation_error
        feedback_selector: athletes.create.feedback.error

  - screen_id: athletes.list
    bound_operation_ids:
      - athletes__athlete__list
    states:
      - state: loading
      - state: loaded
      - state: error
        feedback_selector: athletes.list.feedback.error

selectors:
  - selector_id: athletes.create.form
    screen: athletes.create
    element_type: form
    data_testid: "athletes.create.form"
    required: true

  - selector_id: athletes.create.submit
    screen: athletes.create
    element_type: button
    data_testid: "athletes.create.submit"
    required: true

  - selector_id: athletes.create.name
    screen: athletes.create
    element_type: input
    data_testid: "athletes.create.name"
    required: true
    bound_openapi_property: full_name

  - selector_id: athletes.create.birth_date
    screen: athletes.create
    element_type: input
    data_testid: "athletes.create.birth_date"
    required: true
    bound_openapi_property: birth_date

  - selector_id: athletes.create.federation_id
    screen: athletes.create
    element_type: input
    data_testid: "athletes.create.federation_id"
    required: false
    bound_openapi_property: federation_id

  - selector_id: athletes.create.feedback.success
    screen: athletes.create
    element_type: feedback
    data_testid: "athletes.create.feedback.success"
    required: true

  - selector_id: athletes.create.feedback.error
    screen: athletes.create
    element_type: feedback
    data_testid: "athletes.create.feedback.error"
    required: true

  - selector_id: athletes.list.table
    screen: athletes.list
    element_type: table
    data_testid: "athletes.list.table"
    required: true

  - selector_id: athletes.list.row
    screen: athletes.list
    element_type: row
    data_testid: "athletes.list.row"
    required: true

  - selector_id: athletes.list.filter.team_id
    screen: athletes.list
    element_type: input
    data_testid: "athletes.list.filter.team_id"
    required: false
    bound_openapi_property: team_id

input_fields:
  - field_id: athletes.create.full_name
    screen: athletes.create
    bound_openapi_property: full_name
    input_type: text
    required_in_contract: true

  - field_id: athletes.create.birth_date
    screen: athletes.create
    bound_openapi_property: birth_date
    input_type: date
    required_in_contract: true

  - field_id: athletes.create.category_id
    screen: athletes.create
    bound_openapi_property: category_id
    input_type: select
    required_in_contract: true

  - field_id: athletes.create.federation_id
    screen: athletes.create
    bound_openapi_property: federation_id
    input_type: text
    required_in_contract: false

rules:
  - rule_id: UI-RULE-001
    description: Every selector marked required must have data_testid matching selector_id exactly.
  - rule_id: UI-RULE-002
    description: Every input_field must bind to an OpenAPI request property or declare explicit derived_field.
  - rule_id: UI-RULE-003
    description: Every screen with a submit action must declare submitting state with submit_button_policy.
