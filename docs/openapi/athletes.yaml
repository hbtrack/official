        role:
          type: string
          maxLength: 50
          description: Função na equipe

    AthletePaginatedResponse:
      type: object
      description: Resposta paginada de atletas
      required:
        - items
        - page
        - limit
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Athlete'
        page:
          type: integer
          minimum: 1
          description: Página atual
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Itens por página
        total:
          type: integer
          minimum: 0
          description: Total de itens

    ErrorResponse:
      type: object
      description: Resposta de erro padrão
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Código do erro
        message:
          type: string
          description: Mensagem descritiva
        details:
          type: object
          nullable: true
          description: Detalhes adicionais (ex. regra violada)
          additionalProperties: true

  responses:
    UnauthorizedError:
      description: Token inválido ou ausente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "unauthorized"
            message: "Token inválido ou ausente"
            details: null

    ForbiddenError:
      description: Permissão insuficiente (R25/R26)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "permission_denied"
            message: "Permissão insuficiente"
            details:
              regra: "R25"

    NotFoundError:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "not_found"
            message: "Recurso não encontrado"
            details: null

    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "validation_error"
            message: "Erro de validação no payload"
            details:
              field: "full_name"
              error: "Campo obrigatório"
