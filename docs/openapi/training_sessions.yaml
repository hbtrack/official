components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token de autenticação

  parameters:
    pageParam:
      name: page
      in: query
      description: Número da página (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    limitParam:
      name: limit
      in: query
      description: Itens por página (máximo 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    trainingSessionIdParam:
      name: training_session_id
      in: path
      required: true
      description: ID da sessão de treino
      schema:
        type: string
        format: uuid

    attendanceIdParam:
      name: attendance_id
      in: path
      required: true
      description: ID do registro de presença
      schema:
        type: string
        format: uuid

    wellnessPreIdParam:
      name: wellness_pre_id
      in: path
      required: true
      description: ID do registro de wellness pré-treino
      schema:
        type: string
        format: uuid

    wellnessPostIdParam:
      name: wellness_post_id
      in: path
      required: true
      description: ID do registro de wellness pós-treino
      schema:
        type: string
        format: uuid

  schemas:
    # --------------------------------------------------------------------------
    # Training Session
    # --------------------------------------------------------------------------
    TrainingSession:
      type: object
      description: Sessão de treino
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization_id:
          type: string
          format: uuid
        created_by_membership_id:
          type: string
          format: uuid
        session_at:
          type: string
          format: date-time
          description: Data/hora da sessão de treino
        main_objective:
          type: string
          nullable: true
          description: Objetivo principal do treino
        planned_load:
          type: integer
          nullable: true
          description: Carga planejada (escala 0-10)
        actual_load_avg:
          type: integer
          nullable: true
          description: Média de carga realizada
        group_climate:
          type: integer
          nullable: true
          description: Clima do grupo (escala 1-5)
        highlight:
          type: string
          nullable: true
          description: Destaques do treino
        next_corrections:
          type: string
          nullable: true
          description: Correções para próximas sessões
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - id
        - organization_id
        - created_by_membership_id
        - session_at
        - created_at
        - updated_at

    TrainingSessionCreate:
      type: object
      description: Payload para criação de sessão de treino
      properties:
        organization_id:
          type: string
          format: uuid
        created_by_membership_id:
          type: string
          format: uuid
        session_at:
          type: string
          format: date-time
        main_objective:
          type: string
          nullable: true
        planned_load:
          type: integer
          nullable: true
        group_climate:
          type: integer
          nullable: true
        highlight:
          type: string
          nullable: true
        next_corrections:
          type: string
          nullable: true
      required:
        - organization_id
        - created_by_membership_id
        - session_at

    TrainingSessionUpdate:
      type: object
      description: Payload para atualização de sessão de treino
      properties:
        session_at:
          type: string
          format: date-time
        main_objective:
          type: string
          nullable: true
        planned_load:
          type: integer
          nullable: true
        actual_load_avg:
          type: integer
          nullable: true
        group_climate:
          type: integer
          nullable: true
        highlight:
          type: string
          nullable: true
        next_corrections:
          type: string
          nullable: true

    TrainingSessionPaginatedResponse:
      type: object
      description: Resposta paginada de sessões de treino
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrainingSession'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - limit
        - total

    # --------------------------------------------------------------------------
    # Attendance
    # --------------------------------------------------------------------------
    Attendance:
      type: object
