openapi: 3.1.0
info:
  title: Training Sessions API
  description: |
    API para gerenciamento de sessões de treino, presenças e wellness (pré/pós).
    
    ## Regras Aplicáveis
    - **R18**: Treinos são eventos operacionais, editáveis dentro dos limites do sistema.
    - **R22**: Dados de treino são métricas operacionais e não substituem estatísticas primárias de jogo.
    - **R40**: Limite temporal de edição (10min autor; até 24h perfil superior; >24h somente leitura).
    - **R41**: Conflitos de edição simultânea exigem decisão explícita.
    - **R25/R26**: Permissões por papel e escopo.
    - **RF5.2**: Temporada interrompida bloqueia criação/edição.
    - **R37**: Edição pós-encerramento apenas via ação administrativa auditada.
    - **R29/R33**: Sem DELETE físico; histórico com rastro.
  version: 1.0.0
  contact:
    name: Handball Tracking System
  license:
    name: Proprietary

servers:
  - url: /v1
    description: API v1

security:
  - bearerAuth: []

tags:
  - name: training_sessions
    description: Sessões de treino
  - name: attendance
    description: Presenças por sessão de treino
  - name: wellness_pre
    description: Wellness pré-treino por sessão
  - name: wellness_post
    description: Wellness pós-treino por sessão

paths:
  # ============================================================================
  # TRAINING SESSIONS
  # ============================================================================
  /training_sessions:
    get:
      tags:
        - training_sessions
      operationId: listTrainingSessions
      summary: Lista sessões de treino
      description: |
        Retorna lista paginada de sessões de treino.
        
        **Regras**: R25/R26 (permissões por papel), R42 (usuários sem vínculo não operam).
      x-rule-ids:
        - R25
        - R26
        - R42
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - name: order_by
          in: query
          schema:
            type: string
            enum: [created_at, session_at, updated_at]
            default: session_at
        - name: order_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: date_range_start
          in: query
          description: Filtro de data inicial (session_at >=)
          schema:
            type: string
            format: date
        - name: date_range_end
          in: query
          description: Filtro de data final (session_at <=)
          schema:
            type: string
            format: date
        - name: organization_id
          in: query
          description: Filtrar por organização
          schema:
            type: string
            format: uuid
        - name: created_by_membership_id
          in: query
          description: Filtrar por membership que criou
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          description: Busca em main_objective e highlight (ILIKE)
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          description: Lista paginada de sessões
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSessionPaginatedResponse'
              example:
                items:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    organization_id: "org-uuid-here"
                    created_by_membership_id: "membership-uuid"
                    session_at: "2025-01-15T10:00:00Z"
                    main_objective: "Trabalho tático ofensivo"
                    planned_load: 7
                    actual_load_avg: 6
                    group_climate: 4
                    highlight: "Boa intensidade geral"
                    next_corrections: "Melhorar transição defesa-ataque"
                    created_at: "2025-01-15T08:00:00Z"
                    updated_at: "2025-01-15T12:30:00Z"
                page: 1
                limit: 50
                total: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'

    post:
      tags:
        - training_sessions
      operationId: createTrainingSession
      summary: Cria sessão de treino
      description: |
        Cria uma nova sessão de treino (evento operacional).
        
        **Regras**: R18 (treinos são eventos operacionais), R22 (métricas operacionais),
        RF5.2 (temporada interrompida bloqueia criação), R25/R26 (permissões).
      x-rule-ids:
        - R18
        - R22
        - RF5.2
        - R25
        - R26
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingSessionCreate'
            example:
              organization_id: "org-uuid-here"
              created_by_membership_id: "membership-uuid"
              session_at: "2025-01-20T10:00:00Z"
              main_objective: "Preparação física e técnica"
              planned_load: 8
              group_climate: 4
      responses:
        '201':
          description: Sessão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '409':
          description: Temporada bloqueada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "season_locked"
                message: "Temporada interrompida/encerrada: criação bloqueada"
                details:
                  regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /training_sessions/{training_session_id}:
    get:
      tags:
        - training_sessions
      operationId: getTrainingSessionById
      summary: Obtém sessão de treino por ID
      description: |
        Retorna detalhes de uma sessão de treino específica.
        
        **Regras**: R25/R26 (permissões por papel e escopo).
      x-rule-ids:
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      responses:
        '200':
          description: Detalhes da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - training_sessions
      operationId: updateTrainingSession
      summary: Atualiza sessão de treino
      description: |
        Atualiza campos editáveis de uma sessão de treino.
        
        **Regras de edição (R40)**:
        - ≤10 minutos: autor pode editar livremente
        - >10 min e ≤24h: exige perfil superior ou aprovação
        - >24h: somente leitura, exceto ação administrativa auditada
        
        **Regras**: R40 (janela de edição), R41 (conflito de edição),
        RF5.2/R37 (temporada bloqueada), R25/R26 (permissões), R31/R32 (auditoria).
      x-rule-ids:
        - R40
        - R41
        - RF5.2
        - R37
        - R25
        - R26
        - R31
        - R32
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingSessionUpdate'
            example:
              actual_load_avg: 7
              highlight: "Treino intenso, boa recuperação"
              next_corrections: "Ajustar carga no próximo ciclo"
      responses:
        '200':
          description: Sessão atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Permissão insuficiente (inclui >10min e ≤24h sem perfil superior)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                permission_denied:
                  summary: Permissão insuficiente
                  value:
                    code: "permission_denied"
                    message: "Permissão insuficiente para editar após 10 minutos"
                    details:
                      regra: "R40"
                      requires: "perfil superior ou aprovação"
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflito de estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                edit_window_expired:
                  summary: Janela de edição expirada (>24h)
                  value:
                    code: "edit_window_expired"
                    message: "Janela de edição expirada para treino"
                    details:
                      regra: "R40"
                      elapsed_hours: 48
                edit_conflict:
                  summary: Conflito de edição simultânea
                  value:
                    code: "edit_conflict"
                    message: "Conflito de edição detectado; decisão explícita requerida"
                    details:
                      regra: "R41"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: edição bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  # ============================================================================
  # ATTENDANCE (Subrecurso por sessão)
  # ============================================================================
  /training_sessions/{training_session_id}/attendance:
    get:
      tags:
        - attendance
      operationId: listAttendanceBySession
      summary: Lista presenças da sessão
      description: |
        Retorna lista de registros de presença para uma sessão de treino.
        
        **Regras**: R22 (métricas operacionais), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
        - name: athlete_id
          in: query
          description: Filtrar por atleta específico
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filtrar por status de presença
          schema:
            type: string
            enum: [presente, ausente, medico, lesionada]
      responses:
        '200':
          description: Lista de presenças
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
              example:
                - id: "att-uuid-1"
                  session_id: "session-uuid"
                  athlete_id: "athlete-uuid-1"
                  organization_id: "org-uuid"
                  created_by_membership_id: "membership-uuid"
                  status: "presente"
                  rpe: 7
                  internal_load: 420
                  notes: null
                  created_at: "2025-01-15T10:00:00Z"
                  updated_at: "2025-01-15T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - attendance
      operationId: addAttendanceToSession
      summary: Registra presença na sessão
      description: |
        Cria registro de presença para um atleta em uma sessão de treino.
        Apenas 1 presença por atleta por sessão (UNIQUE session_id + athlete_id).
        
        **Regras**: R22 (métricas operacionais), RF5.2 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - RF5.2
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCreate'
            example:
              athlete_id: "athlete-uuid"
              organization_id: "org-uuid"
              created_by_membership_id: "membership-uuid"
              status: "presente"
              rpe: 7
              notes: "Atleta participou normalmente"
      responses:
        '201':
          description: Presença registrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Sessão de treino não encontrada"
                details: null
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict_unique:
                  summary: Presença já registrada para este atleta
                  value:
                    code: "conflict_unique"
                    message: "Violação de unicidade"
                    details:
                      constraint: "session_id+athlete_id"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: criação bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /attendance/{attendance_id}:
    patch:
      tags:
        - attendance
      operationId: updateAttendance
      summary: Atualiza registro de presença
      description: |
        Atualiza status, rpe, internal_load ou notes de um registro de presença.
        
        **Regras**: R40 (janela de edição), RF5.2/R37 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R40
        - RF5.2
        - R37
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/attendanceIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceUpdate'
            example:
              status: "presente"
              rpe: 8
              notes: "Atualizado após revisão"
      responses:
        '200':
          description: Presença atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflito de estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                edit_window_expired:
                  summary: Janela de edição expirada
                  value:
                    code: "edit_window_expired"
                    message: "Janela de edição expirada para presença"
                    details:
                      regra: "R40"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: edição bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  # ============================================================================
  # WELLNESS PRE (Subrecurso por sessão)
  # ============================================================================
  /training_sessions/{training_session_id}/wellness_pre:
    get:
      tags:
        - wellness_pre
      operationId: listWellnessPreBySession
      summary: Lista wellness pré-treino da sessão
      description: |
        Retorna lista de registros de wellness pré-treino para uma sessão.
        
        **Regras**: R22 (métricas operacionais), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
        - name: athlete_id
          in: query
          description: Filtrar por atleta específico
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de wellness pré-treino
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WellnessPre'
              example:
                - id: "wp-uuid-1"
                  session_id: "session-uuid"
                  athlete_id: "athlete-uuid"
                  organization_id: "org-uuid"
                  created_by_membership_id: "membership-uuid"
                  sleep_hours: 7.5
                  sleep_quality: 4
                  fatigue: 3
                  stress: 2
                  muscle_soreness: 4
                  pain: false
                  pain_level: null
                  pain_location: null
                  notes: null
                  created_at: "2025-01-15T09:30:00Z"
                  updated_at: "2025-01-15T09:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - wellness_pre
      operationId: addWellnessPreToSession
      summary: Registra wellness pré-treino
      description: |
        Cria registro de wellness pré-treino para um atleta (1 por atleta por sessão).
        
        **Regras**: R22 (métricas operacionais), RF5.2 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - RF5.2
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPreCreate'
            example:
              athlete_id: "athlete-uuid"
              organization_id: "org-uuid"
              created_by_membership_id: "membership-uuid"
              sleep_hours: 7.5
              sleep_quality: 4
              fatigue: 3
              stress: 2
              muscle_soreness: 4
              pain: false
      responses:
        '201':
          description: Wellness pré-treino registrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPre'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Sessão de treino não encontrada"
                details: null
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict_unique:
                  summary: Wellness pré já registrado para este atleta
                  value:
                    code: "conflict_unique"
                    message: "Violação de unicidade"
                    details:
                      constraint: "session_id+athlete_id"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: criação bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /wellness_pre/{wellness_pre_id}:
    patch:
      tags:
        - wellness_pre
      operationId: updateWellnessPre
      summary: Atualiza wellness pré-treino
      description: |
        Atualiza campos de wellness pré-treino.
        
        **Regras**: R40 (janela de edição), R25/R26 (permissões).
      x-rule-ids:
        - R40
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPreIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPreUpdate'
            example:
              fatigue: 4
              stress: 3
              notes: "Ajustado após revisão"
      responses:
        '200':
          description: Wellness pré-treino atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPre'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Janela de edição expirada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "edit_window_expired"
                message: "Janela de edição expirada para wellness pré"
                details:
                  regra: "R40"
        '422':
          $ref: '#/components/responses/ValidationError'

  # ============================================================================
  # WELLNESS POST (Subrecurso por sessão)
  # ============================================================================
  /training_sessions/{training_session_id}/wellness_post:
    get:
      tags:
        - wellness_post
      operationId: listWellnessPostBySession
      summary: Lista wellness pós-treino da sessão
      description: |
        Retorna lista de registros de wellness pós-treino para uma sessão.
        
        **Regras**: R22 (métricas operacionais), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
        - name: athlete_id
          in: query
          description: Filtrar por atleta específico
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de wellness pós-treino
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WellnessPost'
              example:
                - id: "wpo-uuid-1"
                  session_id: "session-uuid"
                  athlete_id: "athlete-uuid"
                  organization_id: "org-uuid"
                  created_by_membership_id: "membership-uuid"
                  minutes: 60
                  rpe: 7
                  internal_load: 420
                  fatigue_after: 6
                  mood_after: 7
                  notes: null
                  created_at: "2025-01-15T12:00:00Z"
                  updated_at: "2025-01-15T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - wellness_post
      operationId: addWellnessPostToSession
      summary: Registra wellness pós-treino
      description: |
        Cria registro de wellness pós-treino para um atleta.
        O campo `internal_load` é calculado automaticamente: `minutes × rpe`.
        
        **Regras**: R22 (métricas operacionais), RF5.2 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - RF5.2
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPostCreate'
            example:
              athlete_id: "athlete-uuid"
              organization_id: "org-uuid"
              created_by_membership_id: "membership-uuid"
              minutes: 60
              rpe: 7
              fatigue_after: 6
              mood_after: 7
      responses:
        '201':
          description: Wellness pós-treino registrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPost'
              example:
                id: "wpo-uuid-new"
                session_id: "session-uuid"
                athlete_id: "athlete-uuid"
                organization_id: "org-uuid"
                created_by_membership_id: "membership-uuid"
                minutes: 60
                rpe: 7
                internal_load: 420
                fatigue_after: 6
                mood_after: 7
                notes: null
                created_at: "2025-01-15T12:00:00Z"
                updated_at: "2025-01-15T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Sessão de treino não encontrada"
                details: null
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict_unique:
                  summary: Wellness pós já registrado para este atleta
                  value:
                    code: "conflict_unique"
                    message: "Violação de unicidade"
                    details:
                      constraint: "session_id+athlete_id"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: criação bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /wellness_post/{wellness_post_id}:
    patch:
      tags:
        - wellness_post
      operationId: updateWellnessPost
      summary: Atualiza wellness pós-treino
      description: |
        Atualiza campos de wellness pós-treino.
        O campo `internal_load` é recalculado automaticamente quando `minutes` ou `rpe` são alterados.
        
        **Regras**: R40 (janela de edição), R22 (métricas operacionais), R25/R26 (permissões).
      x-rule-ids:
        - R40
        - R22
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPostIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPostUpdate'
            example:
              minutes: 75
              rpe: 8
              notes: "Treino estendido"
      responses:
        '200':
          description: Wellness pós-treino atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPost'
              example:
                id: "wpo-uuid"
                session_id: "session-uuid"
                athlete_id: "athlete-uuid"
                organization_id: "org-uuid"
                created_by_membership_id: "membership-uuid"
                minutes: 75
                rpe: 8
                internal_load: 600
                fatigue_after: 6
                mood_after: 7
                notes: "Treino estendido"
                created_at: "2025-01-15T12:00:00Z"
                updated_at: "2025-01-15T14:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Janela de edição expirada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "edit_window_expired"
                message: "Janela de edição expirada para wellness pós"
                details:
                  regra: "R40"
        '422':
          $ref: '#/components/responses/ValidationError'

