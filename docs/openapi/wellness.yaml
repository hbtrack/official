openapi: 3.1.0
info:
  title: Wellness API
  description: |
    API para gerenciamento de wellness pré e pós-treino.
    
    ## Regras Aplicáveis
    - **R22**: Dados de treino são métricas operacionais e não substituem estatísticas primárias de jogo.
    - **R25/R26**: Permissões por papel e escopo.
    - **R40**: Limite temporal de edição (10min autor; até 24h perfil superior; >24h somente leitura).
    - **R41**: Conflitos de edição simultânea exigem decisão explícita.
    - **R42**: Usuários sem vínculo ativo não operam; atletas têm acesso somente leitura.
    - **RF5.2**: Temporada interrompida bloqueia criação/edição.
    - **R37**: Edição pós-encerramento apenas via ação administrativa auditada.
    - **R29/R33**: Sem DELETE físico; histórico com rastro.
    - **R31/R32**: Ações críticas auditadas com quem/quando/o quê/contexto.
    
    ## Constraints
    - UNIQUE (session_id, athlete_id): 1 registro por atleta por sessão (wellness_pre e wellness_post).
    
    ## Regra Técnica
    - `internal_load = minutes × rpe` (calculado por trigger `set_internal_load_wellness_post()`).
  version: 1.0.0
  contact:
    name: Handball Tracking System
  license:
    name: Proprietary

servers:
  - url: /v1
    description: API v1

security:
  - bearerAuth: []

tags:
  - name: wellness_pre
    description: Wellness pré-treino por atleta
  - name: wellness_post
    description: Wellness pós-treino por atleta (com cálculo de carga interna)

paths:
  # ============================================================================
  # WELLNESS PRE
  # ============================================================================
  /training_sessions/{training_session_id}/wellness_pre:
    get:
      tags:
        - wellness_pre
      operationId: listWellnessPreBySession
      summary: Lista wellness pré-treino da sessão
      description: |
        Retorna lista de registros de wellness pré-treino para uma sessão.
        
        **Regras**: R22 (métricas operacionais), R25/R26 (permissões), R42 (acesso).
      x-rule-ids:
        - R22
        - R25
        - R26
        - R42
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/athleteIdQueryParam'
      responses:
        '200':
          description: Lista de wellness pré-treino
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WellnessPre'
              example:
                - id: "wp-uuid-1"
                  session_id: "session-uuid"
                  athlete_id: "athlete-uuid"
                  organization_id: "org-uuid"
                  created_by_membership_id: "membership-uuid"
                  sleep_hours: 7.5
                  sleep_quality: 4
                  fatigue: 3
                  stress: 2
                  muscle_soreness: 4
                  pain: false
                  pain_level: null
                  pain_location: null
                  notes: null
                  created_at: "2025-01-15T09:30:00Z"
                  updated_at: "2025-01-15T09:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - wellness_pre
      operationId: addWellnessPreToSession
      summary: Registra wellness pré-treino
      description: |
        Cria registro de wellness pré-treino para um atleta.
        Apenas 1 registro por atleta por sessão (UNIQUE session_id + athlete_id).
        
        **Regras**: R22 (métricas operacionais), RF5.2 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - RF5.2
        - R25
        - R26
        - R29
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPreCreate'
            example:
              athlete_id: "athlete-uuid"
              organization_id: "org-uuid"
              created_by_membership_id: "membership-uuid"
              sleep_hours: 7.5
              sleep_quality: 4
              fatigue: 3
              stress: 2
              muscle_soreness: 4
              pain: false
      responses:
        '201':
          description: Wellness pré-treino registrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPre'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Sessão de treino não encontrada"
                details: null
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict_unique:
                  summary: Wellness pré já registrado para este atleta
                  value:
                    code: "conflict_unique"
                    message: "Violação de unicidade"
                    details:
                      constraint: "session_id+athlete_id"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: criação bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /wellness_pre/{wellness_pre_id}:
    get:
      tags:
        - wellness_pre
      operationId: getWellnessPreById
      summary: Obtém wellness pré-treino por ID
      description: |
        Retorna detalhes de um registro de wellness pré-treino específico.
        
        **Regras**: R25/R26 (permissões por papel e escopo).
      x-rule-ids:
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPreIdParam'
      responses:
        '200':
          description: Detalhes do wellness pré-treino
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPre'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - wellness_pre
      operationId: updateWellnessPre
      summary: Atualiza wellness pré-treino
      description: |
        Atualiza campos de wellness pré-treino.
        Não é possível alterar session_id, athlete_id, organization_id ou created_by_membership_id.
        
        **Regras de edição (R40)**:
        - ≤10 minutos: autor pode editar livremente
        - >10 min e ≤24h: exige perfil superior ou aprovação
        - >24h: somente leitura, exceto ação administrativa auditada
        
        **Outras regras**: R41 (conflito de edição), RF5.2/R37 (temporada), R25/R26 (permissões).
      x-rule-ids:
        - R40
        - R41
        - RF5.2
        - R37
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPreIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPreUpdate'
            example:
              fatigue: 4
              stress: 3
              notes: "Ajustado após revisão"
      responses:
        '200':
          description: Wellness pré-treino atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPre'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Permissão insuficiente (inclui >10min e ≤24h sem perfil superior)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "permission_denied"
                message: "Permissão insuficiente para editar após 10 minutos"
                details:
                  regra: "R40"
                  requires: "perfil superior ou aprovação"
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflito de estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                edit_window_expired:
                  summary: Janela de edição expirada (>24h)
                  value:
                    code: "edit_window_expired"
                    message: "Janela de edição expirada"
                    details:
                      regra: "R40"
                edit_conflict:
                  summary: Conflito de edição simultânea
                  value:
                    code: "edit_conflict"
                    message: "Conflito de edição detectado; decisão explícita requerida"
                    details:
                      regra: "R41"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: edição bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  # ============================================================================
  # WELLNESS POST
  # ============================================================================
  /training_sessions/{training_session_id}/wellness_post:
    get:
      tags:
        - wellness_post
      operationId: listWellnessPostBySession
      summary: Lista wellness pós-treino da sessão
      description: |
        Retorna lista de registros de wellness pós-treino para uma sessão.
        
        **Regras**: R22 (métricas operacionais), R25/R26 (permissões), R42 (acesso).
      x-rule-ids:
        - R22
        - R25
        - R26
        - R42
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/athleteIdQueryParam'
      responses:
        '200':
          description: Lista de wellness pós-treino
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WellnessPost'
              example:
                - id: "wpo-uuid-1"
                  session_id: "session-uuid"
                  athlete_id: "athlete-uuid"
                  organization_id: "org-uuid"
                  created_by_membership_id: "membership-uuid"
                  minutes: 60
                  rpe: 7
                  internal_load: 420
                  fatigue_after: 6
                  mood_after: 7
                  notes: null
                  created_at: "2025-01-15T12:00:00Z"
                  updated_at: "2025-01-15T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - wellness_post
      operationId: addWellnessPostToSession
      summary: Registra wellness pós-treino
      description: |
        Cria registro de wellness pós-treino para um atleta.
        O campo `internal_load` é calculado automaticamente: `minutes × rpe`.
        Apenas 1 registro por atleta por sessão (UNIQUE session_id + athlete_id).
        
        **Regra técnica**: O trigger `set_internal_load_wellness_post()` calcula
        `internal_load = minutes * rpe` automaticamente no INSERT.
        
        **Regras**: R22 (métricas operacionais), RF5.2 (temporada bloqueada), R25/R26 (permissões).
      x-rule-ids:
        - R22
        - RF5.2
        - R25
        - R26
        - R29
      parameters:
        - $ref: '#/components/parameters/trainingSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPostCreate'
            example:
              athlete_id: "athlete-uuid"
              organization_id: "org-uuid"
              created_by_membership_id: "membership-uuid"
              minutes: 60
              rpe: 7
              fatigue_after: 6
              mood_after: 7
      responses:
        '201':
          description: Wellness pós-treino registrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPost'
              example:
                id: "wpo-uuid-new"
                session_id: "session-uuid"
                athlete_id: "athlete-uuid"
                organization_id: "org-uuid"
                created_by_membership_id: "membership-uuid"
                minutes: 60
                rpe: 7
                internal_load: 420
                fatigue_after: 6
                mood_after: 7
                notes: null
                created_at: "2025-01-15T12:00:00Z"
                updated_at: "2025-01-15T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Sessão de treino não encontrada"
                details: null
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict_unique:
                  summary: Wellness pós já registrado para este atleta
                  value:
                    code: "conflict_unique"
                    message: "Violação de unicidade"
                    details:
                      constraint: "session_id+athlete_id"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: criação bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

  /wellness_post/{wellness_post_id}:
    get:
      tags:
        - wellness_post
      operationId: getWellnessPostById
      summary: Obtém wellness pós-treino por ID
      description: |
        Retorna detalhes de um registro de wellness pós-treino específico.
        
        **Regras**: R25/R26 (permissões por papel e escopo).
      x-rule-ids:
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPostIdParam'
      responses:
        '200':
          description: Detalhes do wellness pós-treino
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - wellness_post
      operationId: updateWellnessPost
      summary: Atualiza wellness pós-treino
      description: |
        Atualiza campos de wellness pós-treino.
        O campo `internal_load` é recalculado automaticamente quando `minutes` ou `rpe` são alterados.
        Não é possível alterar session_id, athlete_id, organization_id ou created_by_membership_id.
        
        **Regra técnica**: O trigger `set_internal_load_wellness_post()` recalcula
        `internal_load = minutes * rpe` automaticamente no UPDATE.
        
        **Regras de edição (R40)**:
        - ≤10 minutos: autor pode editar livremente
        - >10 min e ≤24h: exige perfil superior ou aprovação
        - >24h: somente leitura, exceto ação administrativa auditada
        
        **Outras regras**: R41 (conflito de edição), RF5.2/R37 (temporada), R25/R26 (permissões).
      x-rule-ids:
        - R40
        - R41
        - RF5.2
        - R37
        - R25
        - R26
      parameters:
        - $ref: '#/components/parameters/wellnessPostIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WellnessPostUpdate'
            example:
              minutes: 75
              rpe: 8
              notes: "Treino estendido"
      responses:
        '200':
          description: Wellness pós-treino atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessPost'
              example:
                id: "wpo-uuid"
                session_id: "session-uuid"
                athlete_id: "athlete-uuid"
                organization_id: "org-uuid"
                created_by_membership_id: "membership-uuid"
                minutes: 75
                rpe: 8
                internal_load: 600
                fatigue_after: 6
                mood_after: 7
                notes: "Treino estendido"
                created_at: "2025-01-15T12:00:00Z"
                updated_at: "2025-01-15T14:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Permissão insuficiente (inclui >10min e ≤24h sem perfil superior)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "permission_denied"
                message: "Permissão insuficiente para editar após 10 minutos"
                details:
                  regra: "R40"
                  requires: "perfil superior ou aprovação"
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflito de estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                edit_window_expired:
                  summary: Janela de edição expirada (>24h)
                  value:
                    code: "edit_window_expired"
                    message: "Janela de edição expirada"
                    details:
                      regra: "R40"
                edit_conflict:
                  summary: Conflito de edição simultânea
                  value:
                    code: "edit_conflict"
                    message: "Conflito de edição detectado; decisão explícita requerida"
                    details:
                      regra: "R41"
                season_locked:
                  summary: Temporada bloqueada
                  value:
                    code: "season_locked"
                    message: "Temporada interrompida/encerrada: edição bloqueada"
                    details:
                      regra: "RF5.2"
        '422':
          $ref: '#/components/responses/ValidationError'

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token de autenticação

  parameters:
    pageParam:
      name: page
      in: query
      description: Número da página (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    limitParam:
      name: limit
      in: query
      description: Itens por página (máximo 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    trainingSessionIdParam:
      name: training_session_id
      in: path
      required: true
      description: ID da sessão de treino
      schema:
        type: string
        format: uuid

    wellnessPreIdParam:
      name: wellness_pre_id
      in: path
      required: true
      description: ID do registro de wellness pré-treino
      schema:
        type: string
        format: uuid

    wellnessPostIdParam:
      name: wellness_post_id
      in: path
      required: true
      description: ID do registro de wellness pós-treino
      schema:
        type: string
        format: uuid

    athleteIdQueryParam:
      name: athlete_id
      in: query
      description: Filtrar por atleta específico
      schema:
        type: string
        format: uuid

  schemas:
    # --------------------------------------------------------------------------
    # Wellness Pre
    # --------------------------------------------------------------------------
    WellnessPre:
      type: object
      description: Registro de wellness pré-treino
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        session_id:
          type: string
          format: uuid
        athlete_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        created_by_membership_id:
          type: string
          format: uuid
        sleep_hours:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 24
          description: Horas de sono
        sleep_quality:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Qualidade do sono (1-5)
        fatigue:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: Nível de fadiga (0-10)
        stress:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: Nível de estresse (0-10)
        muscle_soreness:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: Dor muscular (0-10)
        pain:
          type: boolean
          default: false
          description: Indica presença de dor
        pain_level:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: Nível de dor (0-10)
        pain_location:
          type: string
          nullable: true
          description: Localização da dor
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - id
        - session_id
        - athlete_id
        - organization_id
        - created_by_membership_id
        - created_at
        - updated_at

    WellnessPreCreate:
      type: object
      description: Payload para criação de wellness pré-treino
      properties:
        athlete_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        created_by_membership_id:
          type: string
          format: uuid
        sleep_hours:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 24
        sleep_quality:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        fatigue:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        stress:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        muscle_soreness:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        pain:
          type: boolean
          default: false
        pain_level:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        pain_location:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - athlete_id
        - organization_id
        - created_by_membership_id

    WellnessPreUpdate:
      type: object
      description: Payload para atualização de wellness pré-treino
      properties:
        sleep_hours:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 24
        sleep_quality:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        fatigue:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        stress:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        muscle_soreness:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        pain:
          type: boolean
        pain_level:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        pain_location:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    # --------------------------------------------------------------------------
    # Wellness Post
    # --------------------------------------------------------------------------
    WellnessPost:
      type: object
      description: Registro de wellness pós-treino
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        session_id:
          type: string
          format: uuid
        athlete_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        created_by_membership_id:
          type: string
          format: uuid
        minutes:
          type: integer
          nullable: true
          minimum: 0
          maximum: 300
          description: Duração do treino em minutos
        rpe:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: RPE (Rating of Perceived Exertion) - escala 0-10
        internal_load:
          type: integer
          nullable: true
          minimum: 0
          description: Carga interna (minutes × rpe) - calculada por trigger
        fatigue_after:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
          description: Fadiga após treino (0-10)
        mood_after:
          type: integer
          nullable: true
          minimum: 0
