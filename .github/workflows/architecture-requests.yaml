# AGENT_ARCH_REQUEST_INTAKE_AND_EXECUTOR_PROTOCOL.yaml
meta:
  id: "AGENT_ARCH_REQUEST_INTAKE_AND_EXECUTOR_PROTOCOL"
  status: "CANONICAL"
  version: "1.0.0"
  last_updated: "2026-02-17"
  applies_to:
    - "AI Architect"
    - "AI Executor"
  authority_level: "LEVEL_1"
  purpose:
    - "Garantir determinismo no intake de pedidos de arquitetura (ARCH_REQUEST) e na transição para execução (EXEC_TASK)."
    - "Impedir execução quando faltar contexto, campos obrigatórios, SSOT, ou evidências verificáveis."
  references:
    active_plan_path: "docs/execution_tasks/ACTIVE_PLAN.md"
    ars_folder: "docs/execution_tasks/ARs/"
    task_reports_root: "docs/_generated/_reports/tasks/"
    templates:
      evidence_pack: "templates.evidence_pack_template"
      exec_task: "templates.exec_task_template"

normative_keywords:
  MUST: "obrigatório"
  MUST_NOT: "proibido"
  SHOULD: "recomendado"
  PASS: "validação aprovada"
  FAIL: "validação reprovada"
  LOOP: "aguardar correção e reprocessar"

roles:
  architect:
    responsibilities:
      - "Validar pedidos de arquitetura e estruturas (ACTIVE_PLAN + backlog de ARs)."
      - "Atualizar ACTIVE_PLAN.md somente quando validação PASS."
      - "Solicitar correções quando validação FAIL (LOOP)."
      - "Preparar/Preencher EVIDENCE_PACK sem executar comandos para coletar evidências."
      - "Criar/emitir TASK_BRIEF quando necessário (fora do escopo deste arquivo, mas requerido para execução)."
    prohibitions:
      - "MUST_NOT executar comandos para coletar evidências."
      - "MUST_NOT alterar código/estado do repositório com o objetivo de coletar evidências."
      - "MUST_NOT inferir campos ausentes (não inventar DoD, gates, ACs, etc.)."
  executor:
    responsibilities:
      - "Executar somente após aprovação explícita e com EXEC_TASK determinística."
      - "Executar exatamente os comandos e ordem definidos em EXEC_TASK."
      - "Coletar evidências durante a execução (stdout/stderr/exit codes/diffs) conforme evidence_requirements."
      - "Emitir EVIDENCE_PACK final após execução."
    prohibitions:
      - "MUST_NOT tomar decisões arquiteturais."
      - "MUST_NOT executar sem aprovação explícita."
      - "MUST_NOT executar fora do escopo (read/write/prohibited) definido."
      - "MUST_NOT usar comandos não aprovados/não listados no EXEC_TASK."

state_machine:
  states:
    - "WAITING_FOR_ARCH_REQUEST"
    - "VALIDATING_ARCH_REQUEST"
    - "WAITING_FOR_CORRECTION"
    - "ACTIVE_PLAN_UPDATED"
    - "WAITING_FOR_EVIDENCE_CONFIRMATION"
    - "AR_SAVED_AND_TASKS_DRAFTED"
    - "WAITING_FOR_APPROVAL"
    - "READY_TO_EXECUTE"
    - "EXECUTING"
    - "COMPLETED"
    - "BLOCKED"
  transitions:
    - from: "WAITING_FOR_ARCH_REQUEST"
      on_event: "ARCH_REQUEST_RECEIVED"
      to: "VALIDATING_ARCH_REQUEST"
    - from: "VALIDATING_ARCH_REQUEST"
      on_result: "FAIL"
      to: "WAITING_FOR_CORRECTION"
    - from: "VALIDATING_ARCH_REQUEST"
      on_result: "PASS"
      to: "ACTIVE_PLAN_UPDATED"
    - from: "ACTIVE_PLAN_UPDATED"
      on_event: "EVIDENCE_CONFIRMATION_REQUIRED"
      to: "WAITING_FOR_EVIDENCE_CONFIRMATION"
    - from: "WAITING_FOR_EVIDENCE_CONFIRMATION"
      on_event: "EVIDENCE_CONFIRMED"
      to: "AR_SAVED_AND_TASKS_DRAFTED"
    - from: "AR_SAVED_AND_TASKS_DRAFTED"
      on_event: "REQUEST_APPROVAL"
      to: "WAITING_FOR_APPROVAL"
    - from: "WAITING_FOR_APPROVAL"
      on_event: "APPROVED"
      to: "READY_TO_EXECUTE"
    - from: "READY_TO_EXECUTE"
      on_event: "EXECUTE"
      to: "EXECUTING"
    - from: "EXECUTING"
      on_result: "SUCCESS"
      to: "COMPLETED"
    - from: "EXECUTING"
      on_result: "FAIL"
      to: "BLOCKED"

input_contracts:
  arch_request_required_structure:
    required_sections:
      - "ACTIVE_PLAN"
      - "AR_BACKLOG"
    active_plan_required_fields:
      - "objetivo_final"
      - "definition_of_done"
      - "invariantes_globais"
      - "gates_obrigatorios"
    active_plan_minimum_context_required:
      - "evidencias_necessarias_por_gate"
      - "status_atual_do_sistema_ou_componente"
      - "dependencias_ou_prerequisitos_conhecidos"
    ar_backlog_required_fields_per_item:
      - "id"
      - "status"
      - "version"
      - "priority"
      - "depends_on"
      - "read"
      - "write"
      - "forbidden"
      - "sources_of_truth"
      - "acceptance_criteria_binary"
      - "stop_conditions"
      - "test_plan"
      - "rollback"

validation_rules:
  arch_request_validation:
    - rule_id: "ARV-001"
      keyword: "MUST"
      description: "ACTIVE_PLAN deve conter todos os campos obrigatórios preenchidos."
      pass_condition:
        all_fields_present_and_non_empty:
          - "objetivo_final"
          - "definition_of_done"
          - "invariantes_globais"
          - "gates_obrigatorios"
      fail_action:
        decision: "FAIL"
        response: "REQUEST_CORRECTION"
        loop: true

    - rule_id: "ARV-002"
      keyword: "MUST"
      description: "ACTIVE_PLAN deve conter contexto mínimo para determinismo."
      pass_condition:
        all_fields_present_and_non_empty:
          - "evidencias_necessarias_por_gate"
          - "status_atual_do_sistema_ou_componente"
          - "dependencias_ou_prerequisitos_conhecidos"
      fail_action:
        decision: "FAIL"
        response: "REQUEST_CORRECTION"
        loop: true

    - rule_id: "ARV-003"
      keyword: "MUST"
      description: "Backlog ordenado de ARs deve conter, por AR, todos os campos obrigatórios e valores válidos."
      pass_condition:
        for_each_ar_item:
          fields_present_and_non_empty:
            - "id"
            - "status"
            - "version"
            - "priority"
            - "depends_on"
            - "read"
            - "write"
            - "forbidden"
            - "sources_of_truth"
            - "acceptance_criteria_binary"
            - "stop_conditions"
            - "test_plan"
            - "rollback"
          enums_valid:
            status: ["DRAFT", "IN_PROGRESS", "APPROVED", "REJECTED", "COMPLETED"]
            priority: ["ALTA", "MEDIA", "BAIXA"]
      fail_action:
        decision: "FAIL"
        response: "REQUEST_CORRECTION"
        loop: true

    - rule_id: "ARV-004"
      keyword: "MUST"
      description: "IDs de AR devem seguir padrão determinístico."
      pass_condition:
        for_each_ar_item:
          id_matches_regex: "^AR-\\d{4}-\\d{2}-\\d{2}-[A-Z0-9_-]+$"
      fail_action:
        decision: "FAIL"
        response: "REQUEST_CORRECTION"
        loop: true

    - rule_id: "ARV-005"
      keyword: "MUST"
      description: "Se houver inconsistência interna (ex.: depends_on inválido ou campos contraditórios), FAIL e LOOP."
      pass_condition:
        no_internal_inconsistencies: true
        examples_of_inconsistencies:
          - "depends_on referencia AR inexistente e não marcada como externa"
          - "forbidden intersecta write_allowlist"
          - "sources_of_truth vazio ou contradiz SSOT declarado"
      fail_action:
        decision: "FAIL"
        response: "REQUEST_CORRECTION"
        loop: true

post_validation_actions:
  on_pass:
    - action_id: "PVA-001"
      keyword: "MUST"
      description: "Atualizar ACTIVE_PLAN em docs/execution_tasks/ACTIVE_PLAN.md."
      constraints:
        - "MUST_NOT inferir conteúdo ausente; somente serializar o que foi recebido e validado."
        - "MUST manter ordem do backlog conforme recebido (ordenado)."
      result: "PASS"

  evidence_template_workflow:
    - action_id: "ETW-001"
      keyword: "SHOULD"
      description: "Preencher template de evidências com o que já existe (sem executar comandos)."
    - action_id: "ETW-002"
      keyword: "MUST_NOT"
      description: "Não alterar código/estado do repositório para coletar evidências."
      clarification:
        allowed_repo_writes_for_planning:
          - "docs/execution_tasks/ACTIVE_PLAN.md"
          - "docs/execution_tasks/ARs/**"
          - "docs/execution_tasks/** (somente artefatos de planejamento)"
        forbidden_for_evidence_collection:
          - "executar gates/tests para 'gerar evidência'"
          - "modificar código para 'forçar log'"
    - action_id: "ETW-003"
      keyword: "MUST"
      description: "Preencher o template de evidências (EVIDENCE_PACK) no mínimo com status DRAFT e campos conhecidos."
    - action_id: "ETW-004"
      keyword: "MUST"
      description: "Revisar o template preenchido e marcar campos ausentes como bloqueio."
      blocked_if_missing:
        - "commit_before"
        - "branch"
        - "logs/outputs para gates citados"

evidence_confirmation_flow:
  trigger: "EVIDENCE_CONFIRMED"
  required_conditions:
    - "EVIDENCE_PACK preenchido com referências verificáveis (paths/arquivos/logs já existentes)."
    - "Nenhuma evidência depende de execução não autorizada."
  actions:
    - action_id: "ECF-001"
      keyword: "MUST"
      description: "Salvar cada AR em /docs/execution_tasks/ARs/AR-<ID>.md."
      file_naming:
        pattern: "docs/execution_tasks/ARs/AR-<AR_ID>.md"
      constraints:
        - "MUST manter o conteúdo fiel ao AR validado (sem adicionar requisitos novos)."
    - action_id: "ECF-002"
      keyword: "MUST"
      description: "Criar EXEC_TASK (DRAFT) para cada AR executável e linkar ao pedido de arquitetura + evidências."
      linkage_required_fields:
        - "related.arch_request_id"
        - "related.task_brief_id (se existir)"
        - "related.evidence_pack_id"

approval_and_execution_flow:
  approval_rules:
    - rule_id: "APR-001"
      keyword: "SHOULD"
      description: "Aguardar aprovação explícita antes de execução."
    - rule_id: "APR-002"
      keyword: "MUST"
      description: "Após aprovação explícita, executar a task exatamente como definido."
      approval_token_required: "APPROVED"
      executor_action_on_approval:
        - "transition_to: READY_TO_EXECUTE"
        - "execute: EXEC_TASK"
  execution_constraints:
    - "MUST respeitar scope_enforcement (read/write/prohibited)."
    - "MUST capturar evidências conforme evidence_requirements."
    - "MUST parar em stop_conditions."
    - "MUST emitir EVIDENCE_PACK final."

templates:
  evidence_pack_template:
    meta:
      kind: "EVIDENCE_PACK"
      id: "EVID-XXXX"
      status: "DRAFT" # DRAFT | FINAL
      version: "1.0.0"
      created: "YYYY-MM-DDTHH:MM:SS"
      environment:
        os: "windows" # windows | linux
        shell: "pwsh" # pwsh | bash | zsh
        repo_root: "<repo_root>"
        branch: "<branch_name>"
        commit_before: "<sha>"
        commit_after: "<sha_or_empty_if_none>"
      related:
        task_brief_id: "TASK-XXXX"
        exec_task_id: "EXEC-XXXX"
        arch_request_id: "<optional>"

    summary:
      determinism_score: 5
      overall_status: "BLOCKED" # SUCCESS | FAIL | PARTIAL | BLOCKED
      notes: []

    commands_executed:
      - cmd_id: "P1.S1"
        run: "git status --porcelain"
        cwd: "<repo_root>"
        start: "YYYY-MM-DDTHH:MM:SS"
        end: "YYYY-MM-DDTHH:MM:SS"
        exit_code: 0
        outputs:
          stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/P1.S1.stdout.txt"
          stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/P1.S1.stderr.txt"

    gate_results:
      - gate_id: "<gate_name>"
        command_ref: "P3.S1"
        exit_code: 0
        meaning: "PASS"
        artifacts:
          - "<gate_output_path>"

    artifacts_generated:
      - path: "docs/_generated/_reports/tasks/EXEC-XXXX/"
        type: "report_dir"
        checksum: "<optional_sha256_or_manifest_ref>"
      - path: "<file_created_or_modified>"
        type: "file"
        checksum: "<optional_sha256_or_manifest_ref>"

    git_state:
      diff_name_only:
        path: "docs/_generated/_reports/tasks/EXEC-XXXX/git_diff_name_only.txt"
      diff_patch:
        path: "docs/_generated/_reports/tasks/EXEC-XXXX/git_diff.patch"
        present: true
      status_porcelain_final:
        path: "docs/_generated/_reports/tasks/EXEC-XXXX/git_status_final.txt"

    acceptance_criteria_results:
      - ac_id: "AC1"
        pass: true
        evidence_ref: "P3.S1"
      - ac_id: "AC2"
        pass: true
        evidence_ref: "git_status_final"

    tests:
      executed: true
      command: "pytest -q"
      exit_code: 0
      outputs:
        stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/pytest.stdout.txt"
        stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/pytest.stderr.txt"
      collected_tests: 12

    violations:
      scope_violation: false
      prohibited_paths_touched: []
      unapproved_commands_used: []
      ssot_conflict_detected: false

    stop_conditions_triggered: []

    final_statement:
      result: "All ACs PASS. Repo state matches expected changes. Evidence complete."
      next_actions: []

  exec_task_template:
    meta:
      kind: "EXEC_TASK"
      id: "EXEC-XXXX"
      title: "<short_title>"
      status: "DRAFT" # DRAFT | IN_PROGRESS | BLOCKED | COMPLETED
      version: "1.0.0"
      created: "YYYY-MM-DD"
      last_updated: "YYYY-MM-DD"
      priority: "MEDIUM" # HIGH | MEDIUM | LOW
      estimate_hours: 1.0
      assignee: "<executor_or_human>"
      related:
        arch_request_id: "<AR-YYYY-MM-DD-XXX|optional>"
        task_brief_id: "TASK-XXXX"
        evidence_pack_id: "EVID-XXXX"

    objective_executable: "<what_will_be_true_after_completion>"

    prerequisites:
      - pr_id: "PR1"
        check: "git status --porcelain is empty (or matches expected baseline)"
        command: "git status --porcelain"
        expected_exit: 0
      - pr_id: "PR2"
        check: "python available"
        command: "python --version"
        expected_exit: 0

    scope_enforcement:
      read_allowlist:
        - "<path_or_glob>"
      write_allowlist:
        - "<path_or_glob>"
      prohibited:
        - "<path_or_glob>"
      ssot_anchors:
        - "docs/ssot/schema.sql"
        - "docs/ssot/openapi.json"

    exit_code_semantics:
      "0": "PASS"
      "2": "DIFF_OR_REVIEW_REQUIRED"
      "3": "GUARD_VIOLATION"
      "4": "REQUIREMENTS_FAIL"

    phases:
      - phase_id: "P1"
        name: "Preflight"
        steps:
          - step_id: "P1.S1"
            run: "git status --porcelain"
            cwd: "<repo_root>"
            expected_exit_codes: [0]
            evidence:
              stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/P1.S1.stdout.txt"
              stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/P1.S1.stderr.txt"

      - phase_id: "P2"
        name: "Execution"
        steps:
          - step_id: "P2.S1"
            run: "<exact_command_1>"
            cwd: "<repo_root>"
            expected_exit_codes: [0, 2, 3]
            outputs_expected:
              - "<file_or_dir_expected>"
            evidence:
              stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/P2.S1.stdout.txt"
              stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/P2.S1.stderr.txt"
          - step_id: "P2.S2"
            run: "<exact_command_2>"
            cwd: "<repo_root>"
            expected_exit_codes: [0]
            evidence:
              stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/P2.S2.stdout.txt"
              stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/P2.S2.stderr.txt"

      - phase_id: "P3"
        name: "Verification"
        steps:
          - step_id: "P3.S1"
            run: "<gate_or_test_command>"
            cwd: "<repo_root>"
            expected_exit_codes: [0]
            evidence:
              stdout: "docs/_generated/_reports/tasks/EXEC-XXXX/P3.S1.stdout.txt"
              stderr: "docs/_generated/_reports/tasks/EXEC-XXXX/P3.S1.stderr.txt"

    evidence_requirements:
      must_capture:
        - "all_command_stdout_stderr"
        - "exit_codes"
        - "git_diff_name_only"
        - "git_diff_patch_if_any"
        - "final_git_status_porcelain"
      locations:
        root: "docs/_generated/_reports/tasks/EXEC-XXXX/"
        command_logs_glob: "docs/_generated/_reports/tasks/EXEC-XXXX/**/*.txt"

    acceptance_criteria_binary:
      - ac_id: "AC1"
        description: "<gate returns 0>"
        method: "command_exit"
        command_ref: "P3.S1"
        expected_exit: 0
      - ac_id: "AC2"
        description: "Repo state matches expected changes"
        method: "git_porcelain_matches"
        allowed_changes:
          - "<path_or_glob>"

    stop_conditions:
      - sc_id: "SC1"
        condition: "exit_code_not_allowed"
        action: "ABORT"
      - sc_id: "SC2"
        condition: "scope_violation_detected"
        action: "ABORT_AND_REPORT"
      - sc_id: "SC3"
        condition: "ssot_conflict_detected"
        action: "ABORT_AND_REQUEST_ARCHITECT"

    rollback:
      steps:
        - rb_id: "RB1"
          run: "git restore ."
        - rb_id: "RB2"
          run: "git clean -fd"
          requires_explicit_authorization: true

deterministic_output_rules:
  - rule_id: "DOR-001"
    keyword: "MUST"
    description: "Para o mesmo input (ARCH_REQUEST + backlog), o output (PASS/FAIL + lista de faltas) deve ser idêntico."
  - rule_id: "DOR-002"
    keyword: "MUST"
    description: "Em FAIL, retornar apenas campos ausentes/inconsistentes e pedir correção; não produzir execução parcial."
  - rule_id: "DOR-003"
    keyword: "MUST_NOT"
    description: "Não criar requisitos novos, não inferir objetivos, não inventar gates, não inventar evidências."
  - rule_id: "DOR-004"
    keyword: "MUST"
    description: "Somente avançar estado após evento explícito correspondente (EVIDENCE_CONFIRMED, APPROVED)."
