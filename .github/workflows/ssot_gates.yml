name: SSOT Generation + Gates

on:
  push:
    branches:
      - main
      - dev
      - dev-*
  pull_request:
    branches:
      - main
      - dev

jobs:
  ssot-gates:
    name: Generate SSOT + Run Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based gates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd "Hb Track - Backend"
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate SSOT artifacts
        id: generate_ssot
        run: |
          echo "::group::Generating SSOT"
          python scripts/ssot/gen_docs_ssot.py --all
          echo "::endgroup::"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://hbtrack:pass@localhost:5432/hbtrack_test' }}
          BASE_URL: http://localhost:8000

      - name: Check for uncommitted SSOT changes (dirty-tree guard)
        run: |
          echo "::group::Checking for uncommitted changes in docs/ssot"
          git diff --exit-code -- docs/ssot/ || {
            echo "::error::SSOT artifacts changed after generation. Commit these changes:"
            git diff -- docs/ssot/
            exit 1
          }
          echo "No uncommitted changes in docs/ssot - PASS"
          echo "::endgroup::"

      - name: Run SSOT Gate - Profile Validation
        run: |
          echo "::group::Gate: Profile Validation (L0/L1)"
          pwsh scripts/gates/SSOT/check_hb_profile.ps1
          echo "::endgroup::"

      - name: Run SSOT Gate - UDS Consistency (L2)
        run: |
          echo "::group::Gate: UDS Consistency (L2)"
          python scripts/gates/SSOT/check_uds_consistency.py
          echo "::endgroup::"

      - name: Upload gate logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gate-logs
          path: docs/_generated/_reports/gates/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "### SSOT Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == "success" ]; then
            echo "✅ All SSOT gates passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ SSOT gates failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi
