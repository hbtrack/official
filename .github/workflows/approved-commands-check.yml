name: Approved Commands Check

on:
  push:
    paths:
      - '**/*.py'
      - '**/*.ps1'

jobs:
  check_commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r docs/scripts/_ia/requirements.txt
      - name: TODO - Validate approved commands
        run: python docs/scripts/_ia/validators/validate-approved-commands.py
        shell: bash
