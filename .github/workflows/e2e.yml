name: E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # Variáveis de ambiente para testes
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Hb Track - Fronted/package-lock.json'

      - name: Install dependencies
        working-directory: ./Hb Track - Fronted
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./Hb Track - Fronted
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: ./Hb Track - Fronted
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start Backend (Docker)
        working-directory: ./Hb Track - Backend
        run: |
          # Se houver docker-compose, usar
          # docker-compose up -d
          # Ou iniciar manualmente
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        continue-on-error: true

      - name: Wait for Backend
        run: |
          npx wait-on http://localhost:8000/health --timeout 60000 || true

      - name: Start Frontend
        working-directory: ./Hb Track - Fronted
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for Frontend
        run: |
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        working-directory: ./Hb Track - Fronted
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./Hb Track - Fronted/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            ./Hb Track - Fronted/test-results/
            ./Hb Track - Fronted/playwright/.auth/
          retention-days: 7

  # Job separado para testes visuais (opcional)
  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Hb Track - Fronted/package-lock.json'

      - name: Install dependencies
        working-directory: ./Hb Track - Fronted
        run: npm ci

      - name: Install Playwright
        working-directory: ./Hb Track - Fronted
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        working-directory: ./Hb Track - Fronted
        run: npx playwright test --project=chromium --grep @visual
        continue-on-error: true
