name: human-visibility-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  hv_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Human Visibility Layer — check
        working-directory: "Hb Track - Backend"
        run: |
          python scripts/compact_exec_logs.py --check
