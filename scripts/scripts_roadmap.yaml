meta:
  title: "Scripts Inventory — HB Track"
  description: |
    Inventário operacional completo. Cada script documentado com interface operacional: entradas, saídas/evidência e pré-requisitos.
    Este arquivo serve para o humano nunca esquecer o que cada script faz e como executá-lo corretamente.

conventions:
  exit_codes: "0 = OK, 2 = VIOLATION/DRIFT, 3 = HARNESS_ERROR, 4 = BLOCKED_INPUT"
  side_effects: "Declarados por script: DB_READ, DB_WRITE, FS_READ, FS_WRITE, ENV_WRITE, PROC_START_STOP, DESTRUCTIVE"
  prefixos: "check_ (validação), diag_ (diagnóstico), fix_ (correção), gen_ (geração), mig_ (migração), ops_ (operação), run_ (orquestrador), seed_ (dados), reset_ (reset)"
  headers: "Todo script deve ter header padronizado; templates em <pasta>/templates/header_template.* (um por pasta)"
  policy: "Todos os scripts validados contra _policy/scripts.policy.yaml"
  python_runtime: "Python 3.11.9 — pinado em Hb Track - Backend/.python-version (local e VPS)"

inventory:
  - section: "1. _policy/"
    description: "Sistema de policy que garante que todos os scripts seguem convenções de naming, placement, headers e side-effects. Fonte de verdade (SSOT) é o arquivo scripts.policy.yaml."
    subsections:
      - title: "1.1 Scripts executáveis"
        files:
          - name: "policy_lib.py"
            description: "Biblioteca central de governança: valida scripts contra regras HB001-HB014, gera/valida manifests SHA256, renderiza MD derivado"
            side_effects: "FS_READ; FS_WRITE (quando chamado via generate/render)"
            inputs: "Nenhum arg CLI como __main__; lê scripts.policy.yaml e side_effects_heuristics.yaml"
            outputs: "stdout: relatório de violações; exit 0/2/3"
            prerequisites: "scripts.policy.yaml e side_effects_heuristics.yaml existentes"
          - name: "check_path_constants.py"
            description: "Imprime constantes canônicas de paths como JSON para consumo por PowerShell"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI"
            outputs: "stdout: JSON com SSOT_YAML, DERIVED_MD, MANIFEST_JSON, HEURISTICS_YAML; exit 0/3"
            prerequisites: "Nenhum (paths derivados de __file__)"
          - name: "check_python_layout.py"
            description: "Valida que todos os arquivos .py rastreados pelo git estão em roots aprovados"
            side_effects: "FS_READ"
            inputs: "--policy <path> (default: python_layout.policy.yaml)"
            outputs: "stdout: lista de violações ou 'OK'; exit 0/2/3"
            prerequisites: "git no PATH; python_layout.policy.yaml existente"
          - name: "generate_manifest.py"
            description: "Gera policy.manifest.json com hashes SHA256 dos arquivos SSOT"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Nenhum arg CLI"
            outputs: "scripts/_policy/policy.manifest.json; exit 0/3"
            prerequisites: "scripts.policy.yaml, side_effects_heuristics.yaml, SCRIPTS_classification.md existentes"
          - name: "render_policy_md.py"
            description: "Gerador canônico SSOT→DERIVED: lê scripts.policy.yaml e escreve SCRIPTS_classification.md"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--out <path> (opcional, override destino)"
            outputs: "docs/_canon/_agent/SCRIPTS_classification.md; exit 0/2/3"
            prerequisites: "scripts/_policy/scripts.policy.yaml existente"
          - name: "check_scripts_policy.ps1"
            description: "Gate principal de governança: valida todos os scripts em scripts/ contra a Scripts Policy SSOT (HB001-HB009)"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento; -Verbose opcional"
            outputs: "stdout: violations ou OK; exit 0/2/3"
            prerequisites: "policy_lib.py existente; Python 3.11.9 disponível"
          - name: "check_policy_manifest.ps1"
            description: "Valida hashes SHA256 do policy.manifest.json contra arquivos SSOT canônicos"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento; -Verbose opcional; lê policy.manifest.json"
            outputs: "stdout: OK ou MISMATCH com detalhes; exit 0/2/3"
            prerequisites: "policy.manifest.json e os 3 arquivos referenciados existentes"
          - name: "check_policy_md_is_derived.ps1"
            description: "Gate anti-drift: verifica que SCRIPTS_classification.md é idêntico ao gerado por render_policy_md.py"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento; -Verbose opcional"
            outputs: "stdout: OK ou DRIFT_DETECTED com diff; exit 0/2/3"
            prerequisites: "render_policy_md.py, SCRIPTS_classification.md existentes; Python disponível"
      - title: "1.2 Arquivos de dados/config"
        files:
          - name: "scripts.policy.yaml"
            description: "**SSOT**: definição de todos os scripts, categorias, side-effects e regras"
            side_effects: null
          - name: "scripts.policy.schema.json"
            description: "JSON Schema para validar scripts.policy.yaml"
            side_effects: null
          - name: "python_layout.policy.yaml"
            description: "Policy de layout: define roots aprovados para arquivos Python"
            side_effects: null
          - name: "side_effects_heuristics.yaml"
            description: "Heurísticas para detecção automática de side-effects em scripts"
            side_effects: null
          - name: "policy.manifest.json"
            description: "Manifest gerado com hashes SHA256 para detecção de drift"
            side_effects: null
          - name: "CONTRACT.md"
            description: "Contrato normativo da policy de scripts"
            side_effects: null
          - name: "requirements.txt"
            description: "Dependências Python da policy (PyYAML, jsonschema)"
            side_effects: null
          - name: "README.md"
            description: "Documentação da pasta"
            side_effects: null

  - section: "2. _lib/"
    description: "Módulos Python reutilizáveis por múltiplos scripts."
    subsections:
      - title: "Arquivos"
        files:
          - name: "docs_index_lib.py"
            description: "Biblioteca + executável: valida docs/_INDEX.yaml contra JSON Schema, IDs únicos, existência de paths e enum de categorias"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI (paths hardcoded); pode ser importado como lib"
            outputs: "stdout: lista de erros ou 'VALID'; exit 0/2/3"
            prerequisites: "docs/_INDEX.yaml; docs/_canon/SCHEMAS/index.schema.json existentes"
          - name: "README.md"
            description: "Documentação da pasta"
            side_effects: null

  - section: "3. audit/"
    description: "Scripts para orquestração e execução de gates de auditoria baseados em capabilities. Geram Evidence Packs estruturados em _reports/audit/<RUN_ID>/."
    subsections:
      - title: "Arquivos"
        files:
          - name: "audit_runner.py"
            description: "Orquestrador mestre de audit packs: lê registry de gates, verifica env vars obrigatórias por gate, executa cada gate via subprocess, normaliza exit codes e consolida resultados"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Posicionais: <RUN_ID> <GATE_ID>...; --root <path> (default: _reports); env HB_AUDIT_BASE_URL (opcional)"
            outputs: "_reports/audit/<RUN_ID>/context.json; .../summary.json; .../checks/<GATE_ID>/{stdout.log, stderr.log, result.json}; exit 0/2/3/4"
            prerequisites: "docs/_canon/_agent/GATES_REGISTRY.yaml existente e válido; RUN_ID e ao menos 1 GATE_ID fornecidos; env vars exigidas pelo gate presentes"
          - name: "gate_stub_blocked.py"
            description: "Stub de gate placeholder: retorna exit 4 (BLOCKED_INPUT) para gates ainda não implementados"
            side_effects: "nenhum"
            inputs: "Posicional: <GATE_ID> (opcional, para mensagem)"
            outputs: "stdout: BLOCKED_INPUT: gate '<ID>' not implemented; exit 4"
            prerequisites: "Nenhum"
          - name: "run_gate_via_capability.py"
            description: "Wrapper que executa um gate específico por capability e RUN_ID, lendo resultado de result.json gerado"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Posicionais: <GATE_ID> <CAPABILITY> <RUN_ID>; config.py opcional para REPORTS_ROOT"
            outputs: "_reports/audit/<RUN_ID>/checks/<GATE_ID>/result.json (via delegação); stdout: erros se result.json ausente; exit 0/2/3/4"
            prerequisites: "scripts/gates/run_capability_gates.py executável; _reports/audit/<RUN_ID>/ criável"

  - section: "4. checks/"
    description: "Validações (não destrutivas, read-only). Todos retornam exit code 0 (OK) ou 2/4 (VIOLATION/BLOCKED)."
    subsections:
      - title: "4.1 checks/db/ — Checks de banco de dados"
        files:
          - name: "check_agent_guard.py"
            description: "Guardião de integridade via SHA256: cria baselines (snapshot) e compara contra baseline (check) para detectar mudanças não autorizadas"
            side_effects: "FS_READ; FS_WRITE (subcomando snapshot)"
            inputs: "Subcomandos: snapshot (--root, --out, --exclude) | check (--root, --baseline, --allow, --forbid-new, --forbid-delete); env HB_DOCS_GENERATED_DIR"
            outputs: "baseline JSON (snapshot); stdout: diff report (check); exit 0/3"
            prerequisites: "Diretório --root existente; baseline JSON existente para subcomando check"
          - name: "check_athletes_columns.py"
            description: "Consulta information_schema.columns para tabela athletes e lista colunas e tipos"
            side_effects: "DB_READ; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL (ou .env em backend/)"
            outputs: "stdout: column_name + data_type; exit 0/1"
            prerequisites: "PostgreSQL rodando; tabela athletes existente; DATABASE_URL configurado"
          - name: "check_coord_train.py"
            description: "Verifica se e2e.coordenador e e2e.treinador pertencem à mesma organização via memberships"
            side_effects: "DB_READ"
            inputs: "Nenhum arg CLI; DB URL hardcoded (localhost:5433/hb_track_dev)"
            outputs: "stdout: rows de membership + resultado do check; exit 0/1"
            prerequisites: "PostgreSQL local na porta 5433; seed E2E executado"
          - name: "check_coordenador.py"
            description: "Exibe resumo do time E2E-Equipe-Coordenador (atletas, treinos, partidas)"
            side_effects: "DB_READ; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL (ou .env)"
            outputs: "stdout: relatório formatado com contagens por categoria; exit 0/1"
            prerequisites: "PostgreSQL rodando; seed E2E executado; time E2E-Equipe-Coordenador existente"
          - name: "check_exercises_data.py"
            description: "Conta exercise_tags e exercises via async SQLAlchemy usando engine da aplicação"
            side_effects: "DB_READ"
            inputs: "Nenhum arg CLI; executado a partir do backend root"
            outputs: "stdout: contagens + sample de tags; exit 0/1"
            prerequisites: "PostgreSQL rodando; venv backend ativado; app.core.db importável"
          - name: "check_membr_perms.py"
            description: "Lê ROLE_PERMISSIONS['membro'] de permissions_map.py e imprime lista de permissões habilitadas"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; importa app.core.permissions_map (sem DB)"
            outputs: "stdout: lista numerada de permissões do papel membro; exit 0/1"
            prerequisites: "venv backend ativado; app.core.permissions_map importável"
          - name: "check_migration.py"
            description: "Lê versão atual do Alembic (alembic_version) do banco de dados local"
            side_effects: "DB_READ"
            inputs: "Nenhum arg CLI; DB URL hardcoded (localhost:5433/hb_track_dev)"
            outputs: "stdout: string da versão Alembic atual; exit 0/1"
            prerequisites: "PostgreSQL local na porta 5433; tabela alembic_version existente"
          - name: "check_schema_drift.py"
            description: "Compara docs/ssot/schema.sql contra banco live (pg_dump) para detectar drift; suporta --fix para regenerar"
            side_effects: "DB_READ; FS_READ; FS_WRITE (--fix); PROC_START_STOP"
            inputs: "--verbose (flag); --fix (flag); env DATABASE_URL (ou .env)"
            outputs: "stdout: linhas de diff ou 'No drift'; docs/ssot/schema.sql (se --fix); exit 0/5/3"
            prerequisites: "PostgreSQL rodando; pg_dump no PATH; docs/ssot/schema.sql existente; DATABASE_URL configurado"
          - name: "check_seed_data.py"
            description: "Verifica presença de UUIDs específicos de seed E2E (memberships, orgs, usuários) no banco"
            side_effects: "DB_READ"
            inputs: "Nenhum arg CLI; DB URL hardcoded (localhost:5433/hb_track_dev)"
            outputs: "stdout: rows encontrados por tabela + status; exit 0/1"
            prerequisites: "PostgreSQL local na porta 5433; seed E2E executado com UUIDs hardcoded"
          - name: "check_team_registrations_columns.py"
            description: "Consulta information_schema.columns para tabela team_registrations e lista colunas e tipos"
            side_effects: "DB_READ; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL (ou .env)"
            outputs: "stdout: column_name + data_type; exit 0/1"
            prerequisites: "PostgreSQL rodando; tabela team_registrations existente; DATABASE_URL configurado"
          - name: "check_users_temp.py"
            description: "Lista os primeiros 10 usuários não-deletados com email, superadmin status e roles"
            side_effects: "DB_READ"
            inputs: "Nenhum arg CLI; executado a partir do backend root"
            outputs: "stdout: email + nome + role/superadmin por usuário; exit 0/1"
            prerequisites: "PostgreSQL rodando; venv backend ativado; app.core.db importável"
      - title: "4.2 checks/docs/ — Checks de documentação"
        files:
          - name: "check_docs_index.ps1"
            description: "Valida docs/_INDEX.yaml contra index.schema.json delegando para docs_index_lib.py"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento"
            outputs: "stdout; exit 0/2/3"
            prerequisites: "scripts/_lib/docs_index_lib.py existente; Python disponível"
          - name: "check_policy_determinism.ps1"
            description: "Valida determinismo do gate check_scripts_policy.ps1 executando-o 3 vezes e comparando outputs em memória"
            side_effects: "NONE"
            inputs: "Nenhum argumento; caminho do gate hardcoded"
            outputs: "stdout: DETERMINISMO PROVADO ou FAIL; exit 0/2/3"
            prerequisites: "scripts/_policy/check_scripts_policy.ps1 executável"
      - title: "4.3 checks/lint/ — Checks de layout e lint"
        files:
          - name: "check_python_layout.ps1"
            description: "Valida que arquivos Python só existem em roots aprovados; delega para _policy/check_python_layout.py"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento; usa python_layout.policy.yaml como config"
            outputs: "stdout: OK, violações ou erro; exit 0/2/3"
            prerequisites: "check_python_layout.py e python_layout.policy.yaml existentes; Python disponível"
      - title: "4.4 checks/models/ — Checks de modelos ORM"
        files:
          - name: "check_models_requirements.py"
            description: "Valida FKs, colunas e constraints de modelos SQLAlchemy contra docs/_generated/schema.sql em 3 perfis"
            side_effects: "FS_READ"
            inputs: "--table <nome> (obrigatório); --profile fk|strict|lenient (default: fk); lê model_requirements_exceptions.json"
            outputs: "stdout: lista de violações ou 'OK'; exit 0/4"
            prerequisites: "docs/_generated/schema.sql existente; modelo SQLAlchemy importável; venv backend ativado"
      - title: "4.5 checks/openapi/ — Checks de contrato API"
        files:
          - name: "check_contract_drift.py"
            description: "Compara docs/ssot/openapi.json contra app.openapi() live para detectar drift de contrato; suporta --fix"
            side_effects: "FS_READ; FS_WRITE (--fix)"
            inputs: "--verbose (flag); --fix (flag); env JWT_SECRET, DATABASE_URL (ou .env)"
            outputs: "stdout: diff de paths/schemas ou 'No drift'; docs/ssot/openapi.json (se --fix); exit 0/20/3"
            prerequisites: "venv backend ativado; app.main importável; docs/ssot/openapi.json existente; JWT_SECRET configurado"
      - title: "4.6 checks/policy/ — Checks de policy compliance"
        files:
          - name: "check_policy_manifest.ps1"
            description: "Wrapper de integridade: delega para scripts/_policy/check_policy_manifest.ps1"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento"
            outputs: "stdout; exit 0/2/3"
            prerequisites: "scripts/_policy/check_policy_manifest.ps1 existente"
          - name: "check_policy_md_is_derived.ps1"
            description: "Wrapper anti-drift: delega para scripts/_policy/check_policy_md_is_derived.ps1"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento"
            outputs: "stdout; exit 0/2/3"
            prerequisites: "scripts/_policy/check_policy_md_is_derived.ps1 existente"
          - name: "check_scripts_policy.ps1"
            description: "Wrapper de governança: delega para scripts/_policy/check_scripts_policy.ps1"
            side_effects: "FS_READ"
            inputs: "Nenhum argumento"
            outputs: "stdout; exit 0/2/3"
            prerequisites: "scripts/_policy/check_scripts_policy.ps1 existente"
      - title: "4.7 checks/schema/ — Checks de dados canônicos"
        files:
          - name: "check_canonical_data.py"
            description: "Conta registros de tabelas canônicas (roles, permissions, positions) e compara counts com valores esperados hardcoded"
            side_effects: "DB_READ; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL_SYNC (ou .env)"
            outputs: "stdout: status por tabela (OK/FAIL) com contagem real vs esperada; exit 0/1"
            prerequisites: "PostgreSQL rodando; tabelas canônicas populadas (seed executado); DATABASE_URL_SYNC configurado"
          - name: "check_routes_list.py"
            description: "Importa app.api.v1.routers.exercises e lista todas as rotas registradas"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; executado a partir do backend root"
            outputs: "stdout: path + métodos HTTP por rota; exit 0/1"
            prerequisites: "venv backend ativado; app.api.v1.routers.exercises importável"
      - title: "4.8 Raiz de checks/ — Validação de audit packs e protocolo de correção"
        files:
          - name: "check_audit_pack.py"
            description: "Valida estrutura completa de audit pack: summary.json, context.json, checks/<GATE_ID>/, campos obrigatórios e coerência de exit_code vs status"
            side_effects: "FS_READ"
            inputs: "Posicionais: <RUN_ID>; --root <path> (default: _reports)"
            outputs: "stdout: 'SUCCESS: audit pack verified' ou 'ERROR: <motivo>'; exit 0/4"
            prerequisites: "_reports/audit/<RUN_ID>/summary.json existente; checks/ com ≥1 gate folder; result.json por gate com campos id, command, exit_code, status, duration_ms, artifacts"
          - name: "check_audit_pack_env.py"
            description: "Wrapper de check_audit_pack.py via variáveis de ambiente"
            side_effects: "FS_READ"
            inputs: "env HB_AUDIT_RUN_ID (obrigatório); HB_REPORTS_ROOT (default: _reports)"
            outputs: "stdout: delegado de check_audit_pack.py; exit propagado ou 4 se RUN_ID ausente"
            prerequisites: "HB_AUDIT_RUN_ID definido; audit pack existente"
          - name: "check_correction_protocol.py"
            description: "Valida protocolo de correção: gates obrigatórios por capability (FAILURE_TO_GATES + BUILD_LOCK_INTEGRITY), estado YAML de case files, e integridade dos audit packs referenciados"
            side_effects: "FS_READ"
            inputs: "Posicionais: <CORR_ID>; --root <path> (default: _reports)"
            outputs: "stdout: 'SUCCESS: protocol compliant' ou 'ERROR: <motivo>'; exit 0/4"
            prerequisites: "PyYAML instalado; docs/_canon/_agent/GATES_REGISTRY.yaml e FAILURE_TO_GATES.yaml existentes; _reports/cases/<CORR_ID>/ com state.yaml, facts.yaml, repro.yaml, patch_plan.yaml, evidence_manifest.json, links.yaml"
          - name: "test_check_correction_protocol.py"
            description: "Suíte de testes unitários (pytest) para check_correction_protocol.py"
            side_effects: "nenhum"
            inputs: "Executado via pytest scripts/checks/test_check_correction_protocol.py"
            outputs: "stdout: pytest report; exit 0 (pass) / 1 (fail)"
            prerequisites: "Python 3.11.9 + pytest instalado"
      - title: "4.9 Pastas reservadas"
        description: "checks/auth/, checks/security/ — reservadas para futuros checks."

  - section: "5. diagnostics/"
    description: "Diagnóstico (read-only, sem side-effects destrutivos). Apenas leem dados e emitem relatórios."
    subsections:
      - title: "5.1 diagnostics/auth/ — Diagnóstico de autenticação"
        files:
          - name: "diag_analyze_permissions.py"
            description: "Analisa ROLE_PERMISSIONS de permissions_map.py e compara contagens por papel contra valores esperados hardcoded"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; importa app.core.permissions_map (sem DB)"
            outputs: "stdout: matriz de permissões por papel + tabela expected vs actual; exit 0/1"
            prerequisites: "venv backend ativado; app.core.permissions_map importável"
      - title: "5.2 diagnostics/db/ — Diagnóstico de banco"
        files:
          - name: "diag_check_alembic_version.py"
            description: "Lê alembic_version via SQLAlchemy síncrono e emite versão atual ou exit code 2/3 se erro"
            side_effects: "DB_READ; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL_SYNC (ou .env)"
            outputs: "stdout: string da versão Alembic; exit 0/2/3"
            prerequisites: "PostgreSQL rodando; tabela alembic_version existente; DATABASE_URL_SYNC configurado"
          - name: "diag_decode_token.py"
            description: "Decodifica JWT do arquivo de autenticação Playwright (coordenador.json) sem verificar assinatura, usando PyJWT"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; path hardcoded (Hb Track - Frontend/playwright/.auth/coordenador.json)"
            outputs: "stdout: payload JWT decodificado como JSON; exit 0/1"
            prerequisites: "PyJWT instalado; coordenador.json existente (gerado pelo Playwright após login)"
          - name: "diag_decode_token_manual.py"
            description: "Decodifica JWT do arquivo Playwright manualmente via base64, sem biblioteca jwt"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; path hardcoded (Hb Track - Frontend/playwright/.auth/coordenador.json)"
            outputs: "stdout: payload JWT decodificado como JSON; exit 0/1"
            prerequisites: "coordenador.json existente (gerado pelo Playwright após login)"
          - name: "diag_parity_classify.py"
            description: "Parseia log do Alembic autogenerate e classifica mudanças em categorias (table/column/type/etc.); emite relatório JSON"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--log <path> (obrigatório, arquivo de log Alembic); --out <path> (obrigatório, destino JSON)"
            outputs: "<path>.json com classificação por categoria; exit 0/1"
            prerequisites: "Arquivo de log Alembic existente (gerado por alembic autogenerate ou check)"
      - title: "5.3 diagnostics/runtime/ — Diagnóstico de runtime Python"
        files:
          - name: "diag_vps_python_runtime.sh"
            description: "Verifica objetivamente qual Python a VPS está usando e compatibilidade do código HB Track (5 níveis: venv, systemd, /proc, compile, import)"
            side_effects: "FS_READ; DB_READ (teste de conexão postgres)"
            inputs: "Nenhum arg CLI; service name hardcoded (hbtrack-backend.service); venv path hardcoded (/home/deploy/hbtrack-backend/current/venv)"
            outputs: "stdout: resultado por nível de verificação com cores; exit 0/1/2"
            prerequisites: "Executar na VPS via scp + chmod +x; systemctl disponível"
          - name: "README.md"
            description: "Documentação completa com instruções de uso e troubleshooting"
            side_effects: null
      - title: "5.4 Pastas reservadas"
        description: "diagnostics/mail/, diagnostics/perf/, diagnostics/routes/ — reservadas para futuros diagnósticos."

  - section: "6. fixes/"
    description: "Correções pontuais (DB_WRITE). Usar com cuidado — fazem escrita."
    subsections:
      - title: "6.1 fixes/db/ — Correções de banco"
        files:
          - name: "fix_migrations.py"
            description: "Reescreve revision e down_revision em arquivos de migração Alembic para corresponder ao prefixo numérico do nome do arquivo"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Nenhum arg CLI; path hardcoded para diretório de versions Alembic em Hb Track - Backend/"
            outputs: "arquivos .py de migração com revision/down_revision corrigidos; stdout: log de alterações; exit 0/1"
            prerequisites: "Diretório de versions Alembic existente; arquivos .py com prefixo numérico no nome"
          - name: "fix_superadmin_pwd.py"
            description: "Gera novo hash bcrypt para Admin@123! e atualiza password_hash do superadmin no banco"
            side_effects: "DB_READ; DB_WRITE; FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL_SYNC (ou .env)"
            outputs: "stdout: confirmação de atualização; DB: users.password_hash atualizado para adm@handballtrack.app; exit 0/1"
            prerequisites: "PostgreSQL rodando; usuário adm@handballtrack.app existente; bcrypt instalado; DATABASE_URL_SYNC configurado"
          - name: "fix_validate_hash.py"
            description: "Valida hash bcrypt do superadmin; se inválido, gera novo hash e atualiza o banco"
            side_effects: "DB_READ; DB_WRITE (condicional); FS_READ"
            inputs: "Nenhum arg CLI; env DATABASE_URL_SYNC (ou .env)"
            outputs: "stdout: VALID/INVALID + ação tomada; DB: users.password_hash (se inválido); exit 0/1"
            prerequisites: "PostgreSQL rodando; usuário adm@handballtrack.app existente; bcrypt instalado; DATABASE_URL_SYNC configurado"
      - title: "6.2 Pastas reservadas"
        description: "fixes/auth/, fixes/docs/, fixes/models/, fixes/openapi/ — reservadas para futuros fixes."

  - section: "7. gates/"
    description: "Gates de CI (orquestradores de checks). Orquestram múltiplos checks e emitem resultado consolidado."
    subsections:
      - title: "7.1 gates/SSOT/ — Gates de SSOT e governança"
        files:
          - name: "check_hb_profile.ps1"
            description: "Wrapper PS1: executa check_hb_track_profile.py e grava log em _reports/gates/"
            side_effects: "FS_WRITE"
            inputs: "-ProfilePath (default: docs/_canon/HB_TRACK_PROFILE.yaml); -OutDir (default: docs/_generated/_reports/gates)"
            outputs: "docs/_generated/_reports/gates/gate_profile.log; exit propagado do Python"
            prerequisites: "check_hb_track_profile.py; Python disponível; arquivo de profile YAML"
          - name: "check_hb_track_profile.py"
            description: "Gate L0/L1/L2: valida parse, chaves obrigatórias e existência de todos os artefatos SSOT listados em HB_TRACK_PROFILE.yaml"
            side_effects: "FS_READ"
            inputs: "--profile <path> (default: docs/_canon/HB_TRACK_PROFILE.yaml)"
            outputs: "stdout: resultado de cada check com PASS/FAIL; exit 0/1"
            prerequisites: "HB_TRACK_PROFILE.yaml existente e válido YAML; PyYAML instalado"
          - name: "check_uds_consistency.py"
            description: "Gate L2: valida consistência cross-referencial (root index, runtime index, profile refs, diretório _generated/)"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI"
            outputs: "stdout: resultado de cada cross-ref com PASS/FAIL; exit 0/1"
            prerequisites: "docs/_INDEX.yaml; docs/product/runtime/_INDEX.yaml; docs/_canon/HB_TRACK_PROFILE.yaml; dirs docs/_generated/ e docs/ssot/ existentes"
          - name: "check_ci_gates_local.ps1"
            description: "Orquestrador master: roda 8 gates de CI local (policy, language, manifest, drift, path constants, schema, contract, docs index) replicando GitHub Actions"
            side_effects: "FS_READ"
            inputs: "Switches: -SkipScriptsPolicy, -SkipLanguageLinter, -SkipManifest, -SkipDrift, -SkipPathConstants, -SkipSchemaDrift, -SkipContractDrift, -SkipDocsIndex, -FailFast"
            outputs: "stdout: tabela de resultados (PASS/FAIL/SKIP por gate); exit 0/1/3"
            prerequisites: "Python disponível; DATABASE_URL (para Schema Drift); FastAPI importável (para Contract Drift); todos os sub-gates existentes"
      - title: "7.2 Raiz de gates/ — Geração de Evidence Packs por capability"
        files:
          - name: "run_capability_gates.py"
            description: "Orquestrador de gates por capability: executa suites pytest/alembic para AUTH/RBAC/ATHLETES/TEAMS/TRAINING/DB_MIGRATIONS e gera Evidence Packs estruturados"
            side_effects: "DB_READ; FS_WRITE; PROC_START_STOP"
            inputs: "--capability ALL|AUTH|RBAC|ATHLETES|TEAMS|TRAINING|DB_MIGRATIONS (default: ALL); --run-id <id> (opcional, auto-gerado se omitido); lê Hb Track - Backend/.env para FRONTEND_URL"
            outputs: "docs/_generated/_reports/audit/<RUN_ID>/<CAPABILITY>/{context.json, summary.json, *_stdout.log, *_stderr.log}; stdout: tabela de resultados; exit 0/2/3"
            prerequisites: "venv backend ativado; PostgreSQL rodando; pytest e alembic disponíveis; Hb Track - Backend/.env configurado"
      - title: "7.3 Pastas reservadas"
        description: "gates/auth/, gates/db/, gates/docs/, gates/models/, gates/openapi/, gates/security/, gates/schema/ — reservadas para futuros gates."

  - section: "8. generate/"
    description: "Geradores de artefatos derivados a partir de fontes canônicas. Output é sempre em docs/ ou _generated/."
    subsections:
      - title: "8.1 generate/docs/ — Geradores de documentação"
        files:
          - name: "gen_archive_task.py"
            description: "Cria pacote de artefatos de tarefa em docs/execution_tasks/artifacts/<task_id>/ com summary.json, execution_log.txt e evidence_index.md"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--task-id (obrigatório); --status PASS|FAIL|DRIFT (obrigatório); --description (max 120 chars); --timestamp; --commit; --log-file <path> (opcional)"
            outputs: "docs/execution_tasks/artifacts/<task_id>/summary.json; .../execution_log.txt; .../evidence_index.md; exit 0/1"
            prerequisites: "docs/execution_tasks/artifacts/ existente ou criável"
          - name: "gen_from_approved_commands_registry.py"
            description: "Renderiza docs/_canon/08_APPROVED_COMMANDS.md a partir de approved_commands_registry.yaml"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--check (valida sem escrever); --dry-run; --verbose"
            outputs: "docs/_canon/08_APPROVED_COMMANDS.md; exit 0/2/3"
            prerequisites: "docs/_ai/_specs/approved_commands_registry.yaml existente"
          - name: "gen_from_exit_codes_registry.py"
            description: "Renderiza docs/references/exit_codes.md e troubleshooting-map.json a partir de exit_codes_registry.yaml"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--check; --dry-run; --verbose"
            outputs: "docs/references/exit_codes.md; docs/_ai/_maps/troubleshooting-map.json; exit 0/2/3"
            prerequisites: "docs/_ai/_specs/exit_codes_registry.yaml existente"
          - name: "gen_refresh_task_index.py"
            description: "Lê todos os artefatos de tarefas (event.json ou summary.json) e gera INDEX.md e TIMELINE.md consolidados"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Nenhum arg CLI; usa Path.cwd() como base (executar da raiz do workspace)"
            outputs: "docs/execution_tasks/INDEX.md; docs/execution_tasks/TIMELINE.md; exit 0/2/3"
            prerequisites: "docs/execution_tasks/artifacts/ existente com subdiretórios"
          - name: "gen_scripts_policy_md.py"
            description: "DEPRECATED — wrapper que delega para scripts/_policy/render_policy_md.py via subprocess"
            side_effects: "FS_READ; FS_WRITE (--write)"
            inputs: "--check (verifica sem escrever) | --write (gera o MD)"
            outputs: "docs/_canon/_agent/SCRIPTS_classification.md (via render_policy_md.py); exit 0/2/3"
            prerequisites: "scripts/_policy/render_policy_md.py existente; scripts.policy.yaml existente"
          - name: "gen_sync_exit_codes.py"
            description: "Sincronização bidirecional: extrai exit codes de exit_codes.md e 09_TROUBLESHOOTING_GUARD_PARITY.md, mescla e gera troubleshooting-map.json"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "--check; --dry-run; --verbose"
            outputs: "docs/_ai/_maps/troubleshooting-map.json; exit 0/2/3"
            prerequisites: "docs/references/exit_codes.md; docs/_canon/09_TROUBLESHOOTING_GUARD_PARITY.md existentes"
      - title: "8.2 generate/schema/ — Geradores de schema e modelos"
        files:
          - name: "gen_autogen_model_from_db.py"
            description: "Auto-gera blocos HB-AUTOGEN em arquivos de modelo SQLAlchemy a partir do schema live do DB via Inspector, preservando customizações"
            side_effects: "DB_READ; FS_READ; FS_WRITE (subcomando apply)"
            inputs: "Subcomandos: preview | apply; --table (obrigatório); --schema (default: public); --db-env; --models-dir; --out; --create; --model-file; --class-name; lê docs/ssot/schema.sql para FK ondelete"
            outputs: "stdout (preview) ou modelo SQLAlchemy com bloco HB-AUTOGEN atualizado (apply); exit 0/1/2/3"
            prerequisites: "PostgreSQL rodando; DATABASE_URL_SYNC configurado; docs/ssot/schema.sql existente; venv backend ativado"
          - name: "gen_migration_0041.py"
            description: "Gera statements SQL INSERT para permissions e role_permissions lendo ROLE_PERMISSIONS de permissions_map.py"
            side_effects: "FS_READ"
            inputs: "Nenhum arg CLI; importa app.core.permissions_map (sem DB)"
            outputs: "stdout: SQL INSERT statements prontos para uso em migração Alembic; exit 0/1"
            prerequisites: "venv backend ativado; app.core.permissions_map importável"
          - name: "gen_migration_hash.py"
            description: "Gera hash bcrypt para a senha Admin@123! usando salt aleatório e verifica o resultado"
            side_effects: "NONE"
            inputs: "Nenhum arg CLI; sem DB; sem env vars"
            outputs: "stdout: hash bcrypt gerado + resultado de verificação; exit 0/1"
            prerequisites: "bcrypt instalado no ambiente Python"
          - name: "gen_models_gate.ps1"
            description: "Gate completo de autogeneration: PRE-parity check → autogen model a partir do DB → POST-parity check → validação de requirements"
            side_effects: "DB_READ; FS_WRITE"
            inputs: "-Table (obrigatório); -Create (switch); -Profile fk|strict|lenient; -AllowCycleWarning; -ModelFile; -ClassName; -Allow; -DbUrl"
            outputs: "model file gerado/atualizado em app/models/; .hb_guard/baseline.json (se -Create); stdout; exit 0 ou exit code do sub-gate que falhou"
            prerequisites: "DATABASE_URL_SYNC ou DATABASE_URL ou .env; venv Python; gen_autogen_model_from_db.py; ops_parity_gate.ps1; check_agent_guard.py; check_models_requirements.py"

  - section: "9. migrate/"
    description: "Migrações e backfills de dados. Scripts one-off executados uma vez e mantidos como registro."
    subsections:
      - title: "Arquivos"
        files:
          - name: "migrate_audit_pack_to_canonical.py"
            description: "Migra audit packs do formato capability-based (AUTH/, RBAC/, etc.) para estrutura canônica SSOT com checks/ e result.json por gate"
            side_effects: "FS_READ; FS_WRITE"
            inputs: "Posicional: <RUN_ID> (ex: HB-AUDIT-20260218-005); --dry-run (flag); --root <path> (default: docs/_generated/_reports/audit/)"
            outputs: "<audit_dir>/checks/<gate_id>/{result.json, stdout.log, stderr.log}; <audit_dir>/context.json; <audit_dir>/summary.json; <audit_dir>/_backup_capability_structure/; exit 0/2/3/4"
            prerequisites: "docs/_generated/_reports/audit/<RUN_ID>/ existente com pastas de capability; NÃO idempotente"
          - name: "mig_backfill_training_season_team.py"
            description: "Backfill de season_id (via membership) e team_id (via team_registrations) em training_sessions em batches"
            side_effects: "DB_READ; DB_WRITE"
            inputs: "--database-url <url> (obrigatório); --batch-size (default: 100); --dry-run; --only-season; --only-team"
            outputs: "stdout: progresso por batch + contagem de registros atualizados; exit 0/1"
            prerequisites: "PostgreSQL rodando; tabelas training_sessions, memberships, team_registrations existentes; NÃO idempotente"
          - name: "mig_backfill_training_simple.py"
            description: "Versão simplificada do backfill de training_sessions (passagem única sem offsets de batch)"
            side_effects: "DB_READ; DB_WRITE"
            inputs: "--database-url <url> (obrigatório); --batch-size (default: 100); --dry-run"
            outputs: "stdout: contagem de registros atualizados; exit 0/1"
            prerequisites: "PostgreSQL rodando; tabelas existentes; NÃO idempotente"
          - name: "mig_import_legacy_training.py"
            description: "Importa dados legados de treino de CSVs (sessions.csv + attendance.csv) para o banco via async SQLAlchemy"
            side_effects: "DB_READ; DB_WRITE; FS_READ; FS_WRITE"
            inputs: "--sessions <path> (obrigatório); --org-id <uuid> (obrigatório); --attendance <path> (opcional); --output <path> (default: import_summary.json)"
            outputs: "import_summary.json com estatísticas de importação; DB: registros em training_sessions e training_attendances; exit 0/1"
            prerequisites: "PostgreSQL rodando; venv backend ativado; arquivos CSV existentes; org-id válido no DB; NÃO idempotente"
          - name: "README.md"
            description: "Documentação da pasta"
            side_effects: null

  - section: "10. ops/"
    description: "Operações de infraestrutura para o dia-a-dia: start de serviços, scans de paridade, carga de env."
    subsections:
      - title: "Raiz ops/"
        files:
          - name: "ops_inv.ps1"
            description: "Wrapper unificado para invariantes: gate (individual), all (todos), drift (WhatIf), promote (bulk), refresh/ssot (artefatos canônicos)"
            side_effects: "PROC_START_STOP; FS_WRITE (refresh)"
            inputs: "$Command posicional (gate/all/drift/promote/refresh/ssot); $InvId posicional (obrigatório para 'gate')"
            outputs: "stdout; artefatos em docs/_generated/ e docs/ssot/; exit propagado"
            prerequisites: "AGENTS.md na raiz; run_invariant_gate.ps1; run_invariant_gate_all.ps1; gen_docs_ssot.py (para refresh)"
          - name: "README.md"
            description: "Documentação da pasta"
            side_effects: null
      - title: "10.1 ops/db/ — Operações de banco"
        files:
          - name: "ops_parity_scan.ps1"
            description: "Executa Alembic --autogenerate em modo scan-only para detectar diffs entre models e DB; gera parity_report.json"
            side_effects: "DB_READ; FS_WRITE"
            inputs: "-RepoRoot; -ScriptsRoot; -Message; -TableFilter; -FailOnStructuralDiffs; -SkipDocsRegeneration"
            outputs: "docs/_generated/parity-scan.log; docs/_generated/parity_report.json; exit 0/1/2"
            prerequisites: "Python/venv; DATABASE_URL no .env; Alembic instalado; docs/_generated/ criável"
          - name: "refresh/ops_load_env.ps1"
            description: "dot-source: carrega variáveis de um arquivo .env para o processo PowerShell atual, removendo aspas"
            side_effects: "ENV_WRITE"
            inputs: "-EnvPath (default: .env no CWD)"
            outputs: "variáveis de ambiente injetadas no processo atual; nenhum arquivo escrito"
            prerequisites: "arquivo .env deve existir"
      - title: "10.2 ops/infra/ — Operações de infraestrutura"
        files:
          - name: "ops_models_autogen_gate.ps1"
            description: "Gate de autogeneration para uso a partir de ops/: PRE-parity → autogen model → POST-parity → requirements validation"
            side_effects: "FS_WRITE; DB_READ"
            inputs: "-Table (obrigatório); -Create; -Profile; -AllowCycleWarning; -ModelFile; -ClassName; -Allow; -DbUrl"
            outputs: "model file gerado/atualizado; .hb_guard/baseline.json (se -Create); exit propagado"
            prerequisites: "app/models/ localizável; DATABASE_URL_SYNC ou .env; venv Python; scripts de geração e parity existentes"
          - name: "ops_models_batch.ps1"
            description: "Batch runner: refresh SSOT → extrai tabelas do schema.sql → requirements scan em lote → gate apenas nas FAIL"
            side_effects: "DB_READ; FS_READ; FS_WRITE"
            inputs: "-AutoTables FromSSOT|None; -ExcludeTables; -Tables; -TablesFile; -DefaultProfile; -SkipRefresh; -SkipGate; -DryRun; -NoFailFast; -AllowBaselineSnapshot; CWD deve ser backend root"
            outputs: "log em %TEMP%; CSV em %TEMP%; model files modificados; exit 0 ou exit code da falha"
            prerequisites: "CWD = 'Hb Track - Backend'; venv; check_models_requirements.py; ops_models_autogen_gate.ps1; docs/ssot/schema.sql; .hb_guard/baseline.json"
          - name: "ops_parity_gate.ps1"
            description: "Gate de paridade para uma tabela: verifica agent_guard (baseline vs estado atual) → parity_scan → valida ciclos FK"
            side_effects: "DB_READ; FS_READ"
            inputs: "-Table (obrigatório); -Allow; -AllowEnvPy; -AllowCycleWarning; -ParityReportPath; -SkipDocsRegeneration"
            outputs: "stdout; lê/valida parity_report.json; exit 0/2"
            prerequisites: ".hb_guard/baseline.json; check_agent_guard.py; venv Python; parity_report.json"
          - name: "ops_start_celery_beat.ps1"
            description: "Inicia Celery Beat scheduler para jobs periódicos (weekly overload, wellness, cleanup), verificando/iniciando Redis antes"
            side_effects: "PROC_START_STOP"
            inputs: "Nenhum argumento; usa app.core.celery_app"
            outputs: "processo Celery Beat em foreground (bloqueante); stdout"
            prerequisites: "CWD em backend ou raiz; Python + Celery instalados; Redis rodando (ou Docker)"
          - name: "ops_start_celery_beat_backup.ps1"
            description: "Cópia de backup de ops_start_celery_beat.ps1; usa binário celery direto (legacy/backup)"
            side_effects: "PROC_START_STOP"
            inputs: "Nenhum argumento; CWD deve ser raiz do repo"
            outputs: "processo Celery Beat em foreground; stdout"
            prerequisites: "subpasta 'Hb Track - Backend' no CWD; binário celery no PATH; Redis disponível"
          - name: "ops_start_celery_worker.ps1"
            description: "Inicia Celery Worker (pool=solo, concurrency=4) para processar tasks assíncronas, verificando/iniciando Redis"
            side_effects: "PROC_START_STOP"
            inputs: "Nenhum argumento; usa app.core.celery_app"
            outputs: "processo Celery Worker em foreground; stdout"
            prerequisites: "CWD em backend ou raiz; Python + Celery instalados; Redis rodando (ou Docker)"
          - name: "ops_start_flower.ps1"
            description: "Inicia Flower (UI de monitoramento do Celery) na porta 5555 com basic auth admin:hbtrack2026"
            side_effects: "PROC_START_STOP"
            inputs: "Nenhum argumento; usa app.core.celery_app"
            outputs: "processo Flower em foreground em http://localhost:5555; stdout"
            prerequisites: "CWD em backend ou raiz; Flower instalado; Redis rodando (ou Docker)"

  - section: "11. plans/"
    description: "Sistema de execução de planos com suporte a DAG, locks, snapshots de contexto e métricas. Usado para orquestrar tarefas complexas de forma controlada."
    extra_details:
      subpastas_de_dados: ["docs/context/", "docs/implemented/", "docs/metrics/", "docs/plans/"]
      configs: ["docs/context_snapshot_schema.yaml", "docs/fase-5-3-dag.yaml", "docs/file_locks.yaml"]
    subsections:
      - title: "Arquivos"
        files:
          - name: "config.py"
            description: "Configuração centralizada de paths absolutos (via pathlib.Path); exporta constantes para todos os scripts do subsistema"
            side_effects: "nenhum"
            inputs: "Nenhum arg CLI (módulo importável)"
            outputs: "Constantes: SCRIPTS_PLANS_ROOT, PROJECT_ROOT, DOCS_ROOT, PLANS_DIR, IMPLEMENTED_DIR, LOCKS_FILE, METRICS_FILE, HB_BACKEND_DIR"
            prerequisites: "Nenhum"
          - name: "check_locks.py"
            description: "Gerencia file locks para Plans: verifica/adquire/libera locks exclusivos e compartilhados em locks.yaml para evitar conflitos entre Plans paralelos"
            side_effects: "FS_WRITE"
            inputs: "Posicional: path do Plan .md; flags --acquire, --release, --list"
            outputs: "scripts/plans/locks.yaml criado/atualizado; stdout: conflitos ou locks ativos; exit 0/1"
            prerequisites: "config.py em scripts/plans/; yaml instalado; arquivo Plan .md existente"
          - name: "executor_workflow.py"
            description: "Orquestrador interativo do fluxo Architect-Executor: pré-checks → dry-run → execução com locks → validação pós (pytest/ruff/mypy/invariants) → homologação manual → finalização"
            side_effects: "FS_WRITE; ENV_WRITE"
            inputs: "Posicional: path do Plan .md; --dry-run; --skip-dry-run; interação via input() em cada fase"
            outputs: "Plan movido para implemented/; locks gerenciados; stdout com progresso; exit 0/1"
            prerequisites: "generate_context_snapshot.py, validate_plan_adherence.py, check_locks.py, plan_status.py em scripts/plans/; pytest, ruff, mypy no PATH ou venv; Plan com TASK-ID, Status, Contrato de Entrada, Critérios de Conclusão"
          - name: "generate_context_snapshot.py"
            description: "Gera snapshot do estado atual do repo para o Architect AI: git state, backend health, schema DB, estrutura de diretórios, estatísticas de testes, dependências, invariantes, migrações recentes"
            side_effects: "DB_READ (alembic current)"
            inputs: "Nenhum arg CLI; saída para stdout; lê config.py para paths"
            outputs: "stdout: snapshot formatado por seções ##; inclui SNAPSHOT DIAGNOSTICS com ERRORS/WARNINGS/BLOCKING CONDITIONS; exit 0"
            prerequisites: "config.py em scripts/plans/; Alembic e pytest opcionais (graceful degradation); backend em 'Hb Track - Backend/'"
          - name: "plan_status.py"
            description: "Gerencia ciclo de vida dos Plans: lê/define status (RASCUNHO/EM_REVISAO/APROVADO/EXECUTADO/OBSOLETO), move Plan para implemented/ ao executar"
            side_effects: "FS_WRITE"
            inputs: "Posicional: path do Plan .md; flags --set STATUS, --executed, --list"
            outputs: "stdout: status e elegibilidade; arquivo .md atualizado com Status: e timestamp; Plan movido para implemented/ se --executed; exit 0/1"
            prerequisites: "config.py (PLANS_DIR, IMPLEMENTED_DIR); Plan .md com campos TASK-ID e Status:"
          - name: "record_metrics.py"
            description: "Coleta e reporta métricas de ROI do fluxo Architect-Executor: tempo planejamento/execução/homologação, bugs, rollbacks, rework"
            side_effects: "FS_WRITE"
            inputs: "Posicional: TASK-ID; flags --plan-time, --exec-time, --homolog-time, --bugs, --rollbacks, --rework, --baseline, --report, --compare"
            outputs: "config.METRICS_FILE (JSON) criado/atualizado; stdout: métricas/relatório/comparação; exit 0/1"
            prerequisites: "config.py (METRICS_FILE); nenhum DB necessário"
          - name: "validate_context_snapshot.py"
            description: "Valida arquivo de snapshot gerado por generate_context_snapshot.py contra schema v2.0: seções obrigatórias, campos requeridos, valores enum"
            side_effects: "FS_READ"
            inputs: "Posicional: path do arquivo snapshot .txt"
            outputs: "stdout: PASS com detalhes ou FAIL com lista de erros; exit 0 (PASS) / 1 (FAIL)"
            prerequisites: "config.py; arquivo snapshot existente gerado por generate_context_snapshot.py"
          - name: "validate_dag.py"
            description: "Valida DAG de dependências entre Plans (YAML): detecta ciclos, ordena topologicamente (Kahn), verifica executabilidade"
            side_effects: "FS_READ"
            inputs: "Posicional: path do arquivo DAG .yaml; flags --order, --can-execute PLAN-ID"
            outputs: "stdout: validação / ordem de execução / elegibilidade; exit 0/1"
            prerequisites: "config.py (IMPLEMENTED_DIR); yaml instalado; arquivo DAG com chave plans[]"
          - name: "validate_plan_adherence.py"
            description: "Verifica se o Executor seguiu o Plan exatamente: compara arquivos e test IDs implementados (via git diff) contra especificado no Plan"
            side_effects: "FS_READ"
            inputs: "Posicional: path do Plan .md; opcional: base_branch (default: main)"
            outputs: "stdout: relatório de conformidade (arquivos/testes extras ou faltando); exit 0 (compliant) / 1 (deviations)"
            prerequisites: "config.py (PROJECT_ROOT, BACKEND_TESTS_DIR); git no PATH; Plan .md com seções 2.4.1, 2.4.2, 2.7"
          - name: "test_snapshot_negative.py"
            description: "Testes negativos (pytest) para validação de snapshots"
            side_effects: "nenhum"
            inputs: "Executado via pytest scripts/plans/test_snapshot_negative.py"
