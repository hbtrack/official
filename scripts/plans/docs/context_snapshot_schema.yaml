---
# Schema do Context Snapshot para HB Track Architect AI
# ========================================================
# Define o contrato rigoroso dos campos do snapshot para evitar:
# - Ambiguidade na leitura (ex: "collected" vs "found")
# - Regressão (campos renomeados sem aviso)
# - Interpretação errada de números (amostra vs total)
#
# Versão: 2.0.0
# Data: 2026-02-17
# Autor: Executor Workflow System

version: "2.0.0"
generated_at: "ISO 8601 timestamp"

sections:
  git_state:
    description: "Estado atual do repositório Git"
    fields:
      branch:
        type: string
        description: "Nome do branch atual"
        example: "dev-changes"
      
      last_commit:
        type: string
        description: "Hash curto + mensagem do último commit"
        example: "5503f7c gates: add L2 consistency gate"
      
      uncommitted_files:
        type: string
        description: "Lista de arquivos modificados/staged/untracked (git status --short)"
        example: "M app/main.py\n?? new_file.py"
  
  backend_health_check:
    description: "Smoke test do backend (import app)"
    fields:
      import_smoke_test:
        type: string
        values:
          - "OK (app module imports successfully)"
          - "FAIL (import error: <first line of stderr>)"
          - "TIMEOUT (import took >5s)"
          - "ERROR (<exception message>)"
        critical: true
        interpretation:
          OK: "Backend pode ser importado sem erros - safe para refactoring"
          FAIL: "Backend tem erros de import - BLOQUEIA planos que mexem em imports"
          TIMEOUT: "Backend demora >5s para importar - possível import circular"
          ERROR: "Erro inesperado - verificar Python/environment"
  
  database_schema:
    description: "Estado do schema e migrations"
    fields:
      current_migration:
        type: string
        description: "Hash da migration atual aplicada (alembic)"
        nullable: true
        example: "'a3f2b1c4d5e6' ou 'N/A'"
      
      pending_migrations:
        type: string
        description: "Número de migrations pendentes"
        example: "'0' ou 'N/A'"
      
      model_files:
        type: array
        item_type: string
        description: "Lista de arquivos .py em app/models (alfabética, determinística)"
        deterministic: true
        example: ["athlete.py", "team.py", "user.py"]
  
  file_structure:
    description: "Estrutura de diretórios relevantes (amostra limitada)"
    format: "key-value map"
    deterministic_order: true
    
    directories:
      "app/models":
        type: string
        format: "{total} Python files (showing first {limit}):\n  - file1.py\n  - file2.py"
        or: "(directory does not exist)"
        interpretation:
          exists: "Total é factual, amostra é {limit} primeiros (alfabético)"
          missing: "Diretório não existe - pode indicar drift ou path errado"
      
      "app/api":
        type: string
        format: "Idem app/models"
        note: "Nome pode variar (api/routers/routes) - ajustar no config.py"
      
      "app/schemas":
        type: string
        format: "Idem app/models"
      
      "app/services":
        type: string
        format: "Idem app/models"
      
      "tests":
        type: string
        format: "{total} files (recursive) (showing first {limit}):\n  - path/to/test.py"
        note: "Busca recursiva, caminhos relativos ao BACKEND_TESTS_DIR"
  
  test_statistics:
    description: "Estatísticas factuais sobre testes (NÃO roda pytest por padrão)"
    critical_interpretation: |
      - test_files_found: contagem via pathlib.rglob("test_*.py") - FACTUAL
      - pytest_collect_only_status: validação OPCIONAL via pytest --collect-only
      - Se status=FAIL com import error: backend pode ter import errors (bloqueia planos)
      - Se status=SKIPPED: pytest não disponível (não bloqueia)
      - Se status=TIMEOUT: test suite grande ou imports lentos (não bloqueia, WARN)
    
    fields:
      test_files_found:
        type: integer
        description: "Número de arquivos test_*.py encontrados (rglob, determinístico)"
        factual: true
        deterministic: true
        example: 122
        interpretation: "Total real de arquivos - NÃO é resultado de pytest collect"
      
      pytest_collect_only_status:
        type: string
        enum: ["OK", "FAIL", "SKIPPED", "TIMEOUT", "ERROR"]
        required: true
        interpretation:
          OK: "Pytest consegue coletar testes sem erros de import"
          FAIL: "Erro na coleta - verificar reason para determinar se bloqueia"
          SKIPPED: "Pytest não instalado ou dir inexistente - não bloqueia"
          TIMEOUT: "Coleta demorou >30s - test suite grande - não bloqueia"
          ERROR: "Erro inesperado - verificar reason"
      
      pytest_collect_only_reason:
        type: string
        required: true
        description: "Motivo detalhado do status (primeira linha de erro, sanitizada)"
        examples:
          - "122 tests collected in 2.5s"
          - "import error: ModuleNotFoundError: No module named 'foo'"
          - "pytest not installed in current environment"
          - "collection took >30s (likely slow imports or large test suite)"
        max_length: 200
        sanitized: true
      
      pytest_collect_only_cmd:
        type: string
        required: true
        description: "Comando executado para coletar testes"
        example: "python -m pytest --collect-only -q"
      
      recent_tests:
        type: string
        description: "5 arquivos test_*.py mais recentemente modificados (ordenados por mtime)"
        format: "  - path/relative/to/tests.py\n  - another_test.py"
        deterministic: false
        note: "Ordem pode variar entre execuções (depende de mtime)"
  
  dependencies:
    description: "Dependências instaladas/documentadas"
    fields:
      requirements:
        type: array
        item_type: string
        description: "Primeiras 20 linhas de requirements.txt (alfabético, sem comentários)"
        deterministic: true
        limit: 20
        example: ["alembic==1.17.2", "fastapi==0.115.0"]
      
      pyproject_exists:
        type: boolean
        description: "Se pyproject.toml existe"
        example: true
  
  invariants:
    description: "Invariantes documentados em docs/invariants.md"
    fields:
      invariants_list:
        type: array
        item_type: string
        description: "IDs de invariantes (INV-XXX-YYY) - alfabético, primeiros 20"
        deterministic: true
        limit: 20
        example: ["INV-AUTH-001", "INV-DB-002"]
  
  recent_migrations:
    description: "Últimas migrations criadas"
    fields:
      migrations:
        type: array
        item_type: string
        description: "3 arquivos .py mais recentes em alembic/versions (ordenados por mtime)"
        deterministic: false
        limit: 3
        example: ["a3f2b1c_add_user_table.py", "b4c5d2e_add_team.py"]
  
  required_env_vars:
    description: "Variáveis de ambiente necessárias (de .env.example)"
    fields:
      env_var_names:
        type: array
        item_type: string
        description: "Nomes das variáveis (sem valores)"
        example: ["DATABASE_URL", "SECRET_KEY", "SMTP_HOST"]
  
  snapshot_diagnostics:
    description: "Seção estruturada de erros, warnings e condições de bloqueio"
    required: true
    critical: true
    
    subsections:
      errors:
        type: array
        description: "Erros críticos que bloqueiam planos"
        item_schema:
          code:
            type: string
            pattern: "SNAP-[A-Z]+-\\d{3}"
            example: "SNAP-BACKEND-001"
          severity:
            type: string
            enum: ["ERROR"]
          message:
            type: string
            max_length: 200
          action:
            type: string
            description: "Ação recomendada para resolver"
        
        error_codes:
          "SNAP-BACKEND-001": "Backend import failed"
          "SNAP-PYTEST-002": "Test collection failed due to import error"
          "SNAP-PYTEST-003": "Test collection failed (other reason)"
      
      warnings:
        type: array
        description: "Avisos que não bloqueiam, mas requerem atenção"
        item_schema:
          code:
            type: string
            pattern: "SNAP-[A-Z]+-\\d{3}"
            example: "SNAP-PYTEST-001"
          severity:
            type: string
            enum: ["WARN"]
          message:
            type: string
            max_length: 200
          action:
            type: string
        
        warning_codes:
          "SNAP-BACKEND-002": "Backend import timeout >5s"
          "SNAP-PYTEST-001": "pytest not installed"
          "SNAP-PYTEST-004": "pytest collection timeout >30s"
      
      blocking_conditions:
        type: string
        description: "Summary of blocking conditions for quick reference"
        format: |
          ⛔ Backend import FAIL → BLOCKS plans modifying imports/core modules
          ⛔ Pytest collection FAIL (import error) → BLOCKS test refactoring
          ✅ No blocking conditions detected
        interpretation:
          "⛔": "Blocking condition present - Executor should HALT"
          "✅": "Safe to proceed with plans"

determinism_guarantees:
  description: "Garantias de determinismo para estabilidade do snapshot"
  
  deterministic_sections:
    - database_schema.model_files (alfabético)
    - file_structure.* (alfabético dentro de cada dir)
    - test_statistics.test_files_found (contagem fixa)
    - dependencies.requirements (alfabético)
    - invariants.invariants_list (alfabético)
  
  non_deterministic_sections:
    - git_state.uncommitted_files (ordem do git status)
    - test_statistics.recent_tests (depende de mtime)
    - recent_migrations (depende de mtime)
  
  ordering_rules:
    file_listings: "sorted(files, key=lambda p: p.name.lower())"
    dependencies: "sorted(lines) após remover comentários"
    invariants: "sorted(ids) alfabético"

length_limits:
  description: "Limites explícitos para evitar snapshots gigantes"
  
  limits:
    file_structure_sample_per_dir: 20
    dependencies_requirements: 20
    invariants_list: 20
    recent_tests: 5
    recent_migrations: 3
    error_messages: 80
  
  overflow_indication:
    format: "{total} items (showing first {limit})"
    example: "62 Python files (showing first 20)"

error_handling:
  description: "Como erros são reportados (sem crashar o snapshot)"
  
  principles:
    - "Snapshot NUNCA deve crashar - capturar exceções e reportar como string"
    - "Erros devem ser explícitos: 'FAIL (reason)' não 'collected: 0'"
    - "Diretórios faltantes: '(directory does not exist)' não stacktrace"
    - "Timeouts: indicar claramente 'TIMEOUT (>5s)'"
  
  error_formats:
    command_failure: "FAIL (<first stderr line truncated to 80 chars>)"
    timeout: "TIMEOUT (>{n}s)"
    exception: "ERROR (<exception type: message truncated>)"
    missing_dir: "(directory does not exist)"
    no_data: "(no items found)" ou "(none)"

critical_fields:
  description: "Campos que determinam se um plano é SAFE ou BLOCKED"
  
  blocking_conditions:
    backend_health_check.import_smoke_test:
      - value: "FAIL"
        blocks: "Planos que modificam imports, models, core modules"
        reason: "Backend não importa - modificações podem piorar"
        error_code: "SNAP-BACKEND-001"
      
      - value: "TIMEOUT"
        blocks: "Planos que adicionam imports complexos"
        reason: "Já há problema de import circular ou lento"
        severity: "WARN"
        error_code: "SNAP-BACKEND-002"
    
    test_statistics.pytest_collect_only_status:
      - value: "FAIL"
        blocks: "Refactorings que movem arquivos de teste (se reason indica import error)"
        reason: "Testes com erros de import - refactoring pode mascarar problema"
        conditional: "Bloqueia APENAS se pytest_collect_only_reason contém 'import' ou 'module'"
        error_code: "SNAP-PYTEST-002"
      
      - value: "FAIL"
        blocks: "Não bloqueia se reason não indica import"
        reason: "Pode ser erro de configuração, não estrutural"
        conditional: "Não bloqueia se reason não contém 'import' ou 'module'"
        error_code: "SNAP-PYTEST-003"
      
      - value: "SKIPPED"
        blocks: "Não bloqueia"
        reason: "pytest não instalado - não é erro do código"
        error_code: "SNAP-PYTEST-001"
      
      - value: "TIMEOUT"
        blocks: "Não bloqueia"
        reason: "Test suite grande ou ambiente lento - não é erro"
        severity: "WARN"
        error_code: "SNAP-PYTEST-004"
    
    database_schema.pending_migrations:
      - value: "> 0"
        blocks: "Planos que mexem em models sem aplicar migrations primeiro"
        reason: "Schema drift - migrations devem ser aplicadas antes"

usage_guidelines:
  for_architect_ai:
    - "Sempre verificar backend_health_check ANTES de propor refactoring"
    - "Se pytest_collect_only=FAIL, incluir 'fix import errors' como pre-requisito"
    - "Checar file_structure para confirmar que diretórios existem antes de propor mudanças"
    - "Respeitar limites: se vê 'showing first 20', assumir que há mais arquivos"
    - "Nunca assumir que 'test_files_found=0' significa 'sem testes' - pode ser path errado"
  
  for_executor:
    - "Sempre rodar snapshot ANTES de iniciar execução de plano"
    - "Se backend_health_check=FAIL, retornar BLOCKED e exigir correção manual"
    - "Log do snapshot deve estar em evidence/snapshots/ do plano"
    - "Comparar snapshots before/after para validar que mudanças foram aplicadas"

changelog:
  "2.1.0":
    date: "2026-02-17"
    changes:
      - "BREAKING: pytest_collect_only → pytest_collect_only_status/reason/cmd (structured)"
      - "Added: SNAPSHOT DIAGNOSTICS section with ERRORS/WARNINGS/BLOCKING CONDITIONS"
      - "Added: Error codes (SNAP-XXX-NNN) para rastreabilidade"
      - "Added: sanitize_stderr() para remover secrets de outputs"
      - "Changed: pytest timeout 5s → 30s (test suites grandes)"
      - "Added: Distinção FAIL vs SKIPPED vs TIMEOUT no pytest"
      - "Added: Blocking rules condicionais (bloqueia apenas se import error)"
      - "Added: validate_context_snapshot.py para validar schema compliance"
      - "Fixed: Regras de bloqueio mais precisas (não bloqueia por 'pytest não instalado')"
  
  "2.0.0":
    date: "2026-02-17"
    changes:
      - "Renomeado: pytest_collection → test_files_found (factual)"
      - "Adicionado: pytest_collect_only (validação opcional)"
      - "Adicionado: backend_health_check (import smoke test)"
      - "Adicionado: limites explícitos (showing first N of M)"
      - "Adicionado: ordenação determinística (sorted by name.lower())"
      - "Corrigido: Unix commands (tree/find) → pathlib (cross-platform)"
      - "Adicionado: error handling sem crashar"
      - "Adicionado: interpretação clara (FAIL/OK/SKIP)"
  
  "1.0.0":
    date: "2026-02-15"
    changes:
      - "Versão inicial com Unix commands"
      - "Campos ambíguos (pytest_collection sem distinção)"
