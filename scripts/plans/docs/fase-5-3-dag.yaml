# Example DAG for Phase 5.3 — Athlete Registration Feature
# This DAG breaks down the feature into executable Plans with dependencies

plans:
  # Step 1: Create database models first (no dependencies)
  - id: FASE-5-3-A-MODELS
    depends_on: []
    provides:
      - athlete_model
      - team_model
      - membership_model
    description: "Create SQLAlchemy models for athletes, teams, and memberships"
  
  # Step 2: Create Pydantic schemas (depends on models)
  - id: FASE-5-3-B-SCHEMAS
    depends_on:
      - FASE-5-3-A-MODELS
    provides:
      - athlete_schemas
      - team_schemas
      - membership_schemas
    description: "Create request/response schemas for API endpoints"
  
  # Step 3: Create service layer (depends on models and schemas)
  - id: FASE-5-3-C-SERVICES
    depends_on:
      - FASE-5-3-A-MODELS
      - FASE-5-3-B-SCHEMAS
    provides:
      - athlete_service
      - team_service
      - membership_service
    description: "Implement business logic with invariants validation"
  
  # Step 4: Create API routers (depends on services)
  - id: FASE-5-3-D-ROUTERS
    depends_on:
      - FASE-5-3-C-SERVICES
    provides:
      - POST /athletes/register
      - GET /athletes
      - GET /teams
    description: "Create FastAPI routers with authentication"
  
  # Step 5: Add comprehensive tests (depends on everything)
  - id: FASE-5-3-E-TESTS
    depends_on:
      - FASE-5-3-A-MODELS
      - FASE-5-3-B-SCHEMAS
      - FASE-5-3-C-SERVICES
      - FASE-5-3-D-ROUTERS
    provides:
      - test_athlete_registration
      - test_team_management
      - test_membership_invariants
    description: "Create test suite covering all scenarios"

# Execution notes:
# - FASE-5-3-A can start immediately
# - FASE-5-3-B and FASE-5-3-C can run in PARALLEL after A completes
# - FASE-5-3-D must wait for C
# - FASE-5-3-E must wait for everything
#
# To validate this DAG:
#   python scripts/validate_dag.py docs/plans/fase-5-3-dag.yaml
#
# To get execution order:
#   python scripts/validate_dag.py docs/plans/fase-5-3-dag.yaml --order
