# Path items for module: training
# Source of truth: contracts/openapi/openapi.yaml
# Canonical API rules: .contract_driven/templates/API_RULES/API_RULES.yaml
# Related docs:
# - docs/_canon/SYSTEM_SCOPE.md
# - docs/hbtrack/modulos/training/MODULE_SCOPE_TRAINING.md
# - docs/hbtrack/modulos/training/DOMAIN_RULES_TRAINING.md
# - docs/hbtrack/modulos/training/INVARIANTS_TRAINING.md
#
# Each path must belong exclusively to this module (LAYOUT §6).
# Naming conventions (api_rules.yaml canonical_conventions):
#   - path segments: kebab-case (no /api, no /v1)
#   - query params: camelCase
#   - JSON fields: camelCase
#   - OWASP API Security Top 10 (2023) compliance mandatory

/training-sessions:
  get:
    tags: [training]
    summary: List training sessions
    description: >
      Lista sessões de treino com paginação cursor-based.

      Regras aplicadas:
      - Paginação obrigatória (api_rules.yaml design_rules.google_aip_core.pagination)
      - Filtros por organizationId, teamId, seasonId quando aplicável
      - OWASP API1:2023 (BOLA): authz em nível de objeto validado server-side
      - OWASP API4:2023: pageSize limitado (max: 100)
    operationId: listTrainingSessions
    parameters:
      - $ref: ../components/parameters/pageSize.yaml
      - $ref: ../components/parameters/pageToken.yaml
      - name: organizationId
        in: query
        required: false
        description: Filter by organization
        schema:
          type: string
          format: uuid
      - name: teamId
        in: query
        required: false
        description: Filter by team
        schema:
          type: string
          format: uuid
      - name: seasonId
        in: query
        required: false
        description: Filter by season
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        description: Filter by status (e.g., DRAFT, SCHEDULED, IN_PROGRESS, PENDING_REVIEW, READONLY)
        schema:
          type: string
    responses:
      "200":
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              required: [items]
              additionalProperties: false
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas/training/training_session.yaml
                nextPageToken:
                  type: string
                  description: Omit when no further pages.
      "400":
        description: Invalid request (e.g., invalid pageSize)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden (insufficient permissions)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA: definir security scheme quando identity_access estiver contratado

  post:
    tags: [training]
    summary: Create training session
    description: >
      Cria nova sessão de treino.

      Regras aplicadas:
      - OWASP API3:2023 (BOPLA): allowlist de propriedades (additionalProperties: false)
      - OWASP API5:2023 (BFLA): apenas treinador/coordenador (RBAC validado)
      - DOMAIN_RULES_TRAINING DR-TRAIN-001: requer papel treinador ou coordenador
      - DOMAIN_RULES_TRAINING DR-TRAIN-002: soma focus_*_pct ≤ 120
      - DOMAIN_RULES_TRAINING DR-TRAIN-003: valores individuais ∈ [0..100]
    operationId: createTrainingSession
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - organizationId
              - sessionAt
              - sessionType
            properties:
              organizationId:
                type: string
                format: uuid
              teamId:
                type: string
                format: uuid
              seasonId:
                type: string
                format: uuid
              microcycleId:
                type: string
                format: uuid
              sessionAt:
                type: string
                format: date-time
                description: RFC-3339 UTC timestamp
              durationPlannedMinutes:
                type: integer
                minimum: 1
                maximum: 1440
              location:
                type: string
                maxLength: 120
              sessionType:
                type: string
                minLength: 1
                maxLength: 32
              mainObjective:
                type: string
                maxLength: 255
              secondaryObjective:
                type: string
              plannedLoad:
                type: integer
                minimum: 0
                maximum: 32767
              intensityTarget:
                type: integer
                minimum: 1
                maximum: 5
              sessionBlock:
                type: string
                maxLength: 32
              focusAttackPositionalPct:
                type: number
                minimum: 0
                maximum: 100
              focusDefensePositionalPct:
                type: number
                minimum: 0
                maximum: 100
              focusTransitionOffensePct:
                type: number
                minimum: 0
                maximum: 100
              focusTransitionDefensePct:
                type: number
                minimum: 0
                maximum: 100
              focusAttackTechnicalPct:
                type: number
                minimum: 0
                maximum: 100
              focusDefenseTechnicalPct:
                type: number
                minimum: 0
                maximum: 100
              focusPhysicalPct:
                type: number
                minimum: 0
                maximum: 100
              phaseFocusDefense:
                type: boolean
              phaseFocusAttack:
                type: boolean
              phaseFocusTransitionOffense:
                type: boolean
              phaseFocusTransitionDefense:
                type: boolean
              standalone:
                type: boolean
    responses:
      "201":
        description: Created
        headers:
          Location:
            description: URI of the created resource
            schema:
              type: string
              format: uri
        content:
          application/json:
            schema:
              $ref: ../components/schemas/training/training_session.yaml
      "400":
        description: Validation error (e.g., DR-TRAIN-002 violation - soma focus > 120)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden (DR-TRAIN-001 - requires treinador or coordenador role)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "404":
        description: Referenced resource not found (e.g., teamId, seasonId)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA: definir security scheme quando identity_access estiver contratado

/training-sessions/{id}:
  get:
    tags: [training]
    summary: Get training session by ID
    description: >
      Retorna detalhes de uma sessão de treino.

      Regras aplicadas:
      - OWASP API1:2023 (BOLA): authz validada server-side antes de retornar dados
      - Unpredictable IDs (UUID) para reduzir enumeração (não substitui authz)
    operationId: getTrainingSessionById
    parameters:
      - name: id
        in: path
        required: true
        description: Stable identifier of the training session
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Successful response
        content:
          application/json:
            schema:
              $ref: ../components/schemas/training/training_session.yaml
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden (permission checked before confirming existence per OWASP BOLA)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "404":
        description: Not found
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA

  patch:
    tags: [training]
    summary: Update training session
    description: >
      Atualiza sessão de treino (atualização parcial).

      Regras aplicadas:
      - PATCH (não PUT) por convenção Google AIP + Adidas
      - OWASP API3:2023 (BOPLA): allowlist de propriedades
      - OWASP API1:2023 (BOLA): authz validada
      - DOMAIN_RULES_TRAINING DR-TRAIN-007: janela de edição por papel
      - INVARIANTS_TRAINING INV-TRAIN-004: autor até 10min antes; superior até 24h após
      - INVARIANTS_TRAINING INV-TRAIN-005: sessões > 60 dias somente leitura
    operationId: updateTrainingSession
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              sessionAt:
                type: string
                format: date-time
              durationPlannedMinutes:
                type: integer
                minimum: 1
                maximum: 1440
              location:
                type: string
                maxLength: 120
              sessionType:
                type: string
                maxLength: 32
              mainObjective:
                type: string
                maxLength: 255
              secondaryObjective:
                type: string
              plannedLoad:
                type: integer
                minimum: 0
                maximum: 32767
              intensityTarget:
                type: integer
                minimum: 1
                maximum: 5
              focusAttackPositionalPct:
                type: number
                minimum: 0
                maximum: 100
              focusDefensePositionalPct:
                type: number
                minimum: 0
                maximum: 100
              focusTransitionOffensePct:
                type: number
                minimum: 0
                maximum: 100
              focusTransitionDefensePct:
                type: number
                minimum: 0
                maximum: 100
              focusAttackTechnicalPct:
                type: number
                minimum: 0
                maximum: 100
              focusDefenseTechnicalPct:
                type: number
                minimum: 0
                maximum: 100
              focusPhysicalPct:
                type: number
                minimum: 0
                maximum: 100
              notes:
                type: string
              deviationJustification:
                type: string
              status:
                type: string
                pattern: "^[A-Z0-9]+(?:_[A-Z0-9]+)*$"
    responses:
      "200":
        description: Updated
        content:
          application/json:
            schema:
              $ref: ../components/schemas/training/training_session.yaml
      "400":
        description: Validation error
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden (INV-TRAIN-004 temporal window or INV-TRAIN-005 readonly)
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "404":
        description: Not found
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA

  delete:
    tags: [training]
    summary: Delete training session
    description: >
      Remove sessão de treino (soft-delete por padrão).

      Regras aplicadas:
      - OWASP API1:2023 (BOLA): authz validada
      - OWASP API5:2023 (BFLA): requer permissão explícita
    operationId: deleteTrainingSession
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Deleted (no content)
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "404":
        description: Not found
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA

/training-sessions/{id}/attendance:
  post:
    tags: [training]
    summary: Register athlete attendance
    description: >
      Registra presença de atleta em sessão de treino.

      Regras aplicadas:
      - OWASP API1:2023 (BOLA): validar que athleteId pertence à equipe/sessão
      - OWASP API6:2023: proteger contra abuso (rate limit recomendado)
    operationId: registerTrainingAttendance
    parameters:
      - name: id
        in: path
        required: true
        description: Training session ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - athleteId
              - present
            properties:
              athleteId:
                type: string
                format: uuid
                x-semantic-id: users.athlete.id.v1
              present:
                type: boolean
              arrivalTime:
                type: string
                format: date-time
              notes:
                type: string
                maxLength: 500
    responses:
      "201":
        description: Attendance registered
        content:
          application/json:
            schema:
              type: object
              properties:
                attendanceId:
                  type: string
                  format: uuid
                athleteId:
                  type: string
                  format: uuid
                  x-semantic-id: users.athlete.id.v1
                trainingSessionId:
                  type: string
                  format: uuid
                  x-semantic-id: training.session.id.v1
                present:
                  type: boolean
                arrivalTime:
                  type: string
                  format: date-time
                notes:
                  type: string
                createdAt:
                  type: string
                  format: date-time
      "400":
        description: Validation error
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "401":
        description: Unauthenticated
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "403":
        description: Forbidden
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "404":
        description: Training session or athlete not found
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
      "409":
        description: Attendance already registered
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/shared/problem.yaml
    security:
      - {} # OWASP API5:2023 BFLA
