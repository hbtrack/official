name: CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RDB tests
        run: |
          pytest -m rdb

      - name: Run FASE 8 tests
        run: |
          pytest -m fase8

      - name: Run coverage
        run: |
          pytest --cov --cov-fail-under=80
