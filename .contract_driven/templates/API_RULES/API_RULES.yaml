# SSOT: API HTTP rules/validation/templates
# SOURCE: .contract_driven/templates/api/api_rules.yaml
# NOTE: Este arquivo é normativo para convenções/validação/templates de API HTTP (ver CONTRACT_SYSTEM_RULES.md).

hbtrack_api_rules:
  ssot: true
  ssot_path: ".contract_driven/templates/api/api_rules.yaml"
  system: "HB Track"
  last_updated: "2026-03-11"
  language:
    docs: "pt-BR"
    technical_identifiers: "en-US"

  purpose:
    - "Fonte canônica e determinística para agentes criarem/alterarem contratos de APIs."
    - "Reduzir alucinação: regras explícitas, templates e validações obrigatórias."
    - "Estabelecer desempate entre guias (HB Track / OWASP / Google / Adidas)."

  sources:
    hbtrack_domain_invariants:
      description: "Invariantes e regras de negócio do HB Track (docs/_canon e docs de módulo)."
    owasp_api_security_top10_2023_ptpt:
      path: ".contract_driven/templates/api/OWASPAPI.md"
    google_api_design_aip:
      path: ".contract_driven/templates/api/GoogleAPI.md"
    adidas_api_guidelines:
      path: ".contract_driven/templates/api/AddidasAPI.md"
    legacy_restful_api_guidelines_external_v1:
      from: ".contract_driven/CONTRACT_SYSTEM_RULES.md#3B (migrado)"
      baseline_snapshot_date: "2026-03-11"
      note: "Registry preservado para numeração estável; regras podem ser sobrescritas por precedência."

  agent_operating_mode:
    strict_no_inference: true
    missing_rule_behavior:
      block_code: "BLOCKED_MISSING_API_CONVENTION"
      instruction: "Bloquear em vez de improvisar. Criar ADR/regra explícita antes de prosseguir."

  contract_creation_protocol:
    goal: "Criar/alterar contratos OpenAPI com determinismo e segurança."
    required_steps:
      - "Ler `.contract_driven/templates/api/api_rules.yaml` e aplicar conflict_resolution."
      - "Ler docs do módulo (MODULE_SCOPE / DOMAIN_RULES / INVARIANTS / PERMISSIONS quando aplicável)."
      - "Modelar recursos (nouns) e operações padrão (Get/List/Create/Patch/Delete)."
      - "Definir schemas de request/response com allowlists e `additionalProperties: false` em requests."
      - "Aplicar OWASP (BOLA/BOPLA/BFLA) e limites de consumo (rate limit/quota/pagination)."
      - "Aplicar validações (lint/semantic) antes de aceitar o contrato como pronto."
    blocking_rules:
      - "Se o módulo não existir na taxonomia canônica: `BLOCKED_MISSING_MODULE`."
      - "Se a convenção necessária não estiver em `api_rules.yaml`: `BLOCKED_MISSING_API_CONVENTION`."
      - "Se houver conflito entre fontes no mesmo nível: `BLOCKED_CONTRACT_CONFLICT`."

  conflict_resolution:
    precedence_order:
      - level: 1
        authority: "HB Track domain invariants"
        rule: "Regras de negócio específicas do handebol e do sistema são soberanas."
      - level: 2
        authority: "OWASP API Security Top 10 (2023)"
        rule: "Segurança e proteção de dados de atletas/comissão têm prioridade técnica."
      - level: 3
        authority: "Google API Design (AIPs)"
        rule: "Define semântica de recursos e métodos padrão (Get/List/Create/Update/Delete), paginação e erros."
      - level: 4
        authority: "Adidas API Guidelines"
        rule: "Define estilo (URI/JSON/query/header) e evolução; prevalece em conflitos de grafia/estética."

    tie_break_summary_table:
      - conflict: "Segurança vs. Design"
        decision: "Segurança sempre vence"
        authority: "OWASP"
      - conflict: "snake_case vs. camelCase (campos JSON)"
        decision: "Usar camelCase em JSON"
        authority: "Adidas"
      - conflict: "PUT vs. PATCH"
        decision: "Usar PATCH para atualização parcial"
        authority: "Google/Adidas"
      - conflict: "Versão na URI vs. versionamento por media-type"
        decision: "Proibido versão na URI"
        authority: "Adidas"

  # Matriz de compatibilidade cross-set (GATE-004)
  # Objetivo: reportar causa raiz determinística (unsat_core) quando combinações são insatisfatíveis.
  # Nota: Cada entrada deve declarar explicitamente `rules_involved` para evitar explosão combinatória.
  compatibility_matrix:
    - id: "COMP-001"
      set_a: "sensitive_overlay"
      set_b: "architecture_matrix"
      relation: "conditional"
      rules_involved:
        - "HB-PROFILE-OVERLAY-001"
        - "HB-ARCH-SENSITIVE-001"
      rule:
        if:
          all:
            - var: "sensitive_overlay_active"
              equals: true
        then:
          require:
            - var: "arch_sensitive"
              equals: true

  canonical_conventions:
    naming:
      uri_paths:
        path_segments: "kebab-case"
        trailing_slash: "MUST_NOT"
        base_path:
          must_not_use: ["/api"]
      path_template_variables:
        style: "camelCase"
        must_not_include: ["-"]
      query_parameters:
        style: "camelCase"
        reserved_names_policy: "MUST_NOT collide with reserved identifiers (Adidas)"
      json_fields:
        style: "camelCase"
        note: "Inclui request/response bodies e erros (Problem+JSON extensions)."
      headers:
        custom_header_policy:
          must_not_prefix: ["X-"]
        casing_note: "HTTP header names são case-insensitive; use Title-Case por legibilidade."

    identifiers:
      resource_ids:
        guessability: "SHOULD use unpredictable identifiers (e.g., UUID) to reduce enumeration"
        note: "Não substitui autorização (BOLA)."

    versioning_and_compatibility:
      uri_versioning: "MUST_NOT"
      openapi_info_version: "MUST follow semver"
      breaking_changes:
        resource_identifier_changes: "MUST create new resource variant and preserve old"
        representation_breaking_changes: "MUST use content negotiation / media-type versioning"

  security_rules:
    owasp_top10_2023:
      - id: "API1:2023"
        name: "Broken Object Level Authorization (BOLA)"
        rules:
          - "MUST enforce authorization at object level per request."
          - "MUST validate access server-side; MUST NOT trust client-supplied IDs."
          - "SHOULD use unpredictable IDs to reduce enumeration (not a substitute for authz)."
      - id: "API2:2023"
        name: "Broken Authentication"
        rules:
          - "MUST document all auth flows (login/refresh/logout/recovery/MFA/etc.)."
          - "SHOULD use standard auth solutions (OAuth2/OIDC) when applicable; MUST NOT roll-your-own cryptography."
          - "SHOULD protect auth endpoints against brute force (rate limit/backoff/detection) and alert on anomalies."
          - "SHOULD apply step-up auth/MFA for sensitive operations."
      - id: "API3:2023"
        name: "Broken Object Property Level Authorization"
        rules:
          - "MUST use allowlists for writable properties (prevent mass assignment)."
          - "MUST filter readable properties by role/context; MUST NOT expose sensitive fields by default."
      - id: "API4:2023"
        name: "Unrestricted Resource Consumption"
        rules:
          - "MUST enforce timeouts, payload limits, concurrency limits, and per-consumer quotas/rate limits."
          - "MUST bound parameters that amplify cost (pageSize, filters, sorts, expansions)."
      - id: "API5:2023"
        name: "Broken Function Level Authorization (BFLA)"
        rules:
          - "MUST default-deny per endpoint; require explicit authz policy for every operation."
          - "MUST test endpoint-level permissions, especially admin/maintenance endpoints."
      - id: "API6:2023"
        name: "Unrestricted Access to Sensitive Business Flows"
        rules:
          - "MUST identify sensitive business flows and implement abuse protections (quotas/cooldowns/step-up)."
          - "SHOULD add anti-automation controls when risk justifies."
      - id: "API7:2023"
        name: "Server Side Request Forgery (SSRF)"
        rules:
          - "MUST restrict egress and validate destinations with robust parsing; prefer allowlists."
          - "MUST restrict/disable redirects; MUST NOT proxy raw responses to clients."
      - id: "API8:2023"
        name: "Security Misconfiguration"
        rules:
          - "MUST use hardened, versioned config (IaC) and continuous misconfig detection."
          - "MUST require TLS; MUST restrict methods/content-types; MUST avoid verbose error leakage."
      - id: "API9:2023"
        name: "Improper Inventory Management"
        rules:
          - "MUST maintain API inventory (hosts/envs/versions/owners) and keep documentation current."
          - "MUST protect internal/admin docs and endpoints."
      - id: "API10:2023"
        name: "Unsafe Consumption of APIs"
        rules:
          - "MUST validate/sanitize third-party API data; MUST use TLS and restrict redirects."

    authz_specifics:
      existence_vs_permission:
        rule: "MUST check permission before confirming existence when disclosure risk exists."
        source: "Google AIP error guidance (AIP-193 summary) + OWASP BOLA"

  design_rules:
    google_aip_core:
      standard_methods:
        get:
          - "MUST provide Get for resources when applicable."
        list:
          - "MUST design pagination from day 1."
        create:
          - "MUST use POST to create resources in collections."
        update:
          - "MUST use PATCH (not PUT) for updates."
          - "SHOULD support field masks/partial updates where applicable."
        delete:
          - "MUST use DELETE for deletion; define soft-delete explicitly if used."

      pagination:
        preferred: "cursor"
        request_parameters:
          pageSize:
            name: "pageSize"
            type: "integer"
            constraints:
              minimum: 1
              maximum: 100
          pageToken:
            name: "pageToken"
            type: "string"
        response_fields:
          nextPageToken:
            name: "nextPageToken"
            type: "string"
            presence_rule: "Omit when no further pages."

      errors:
        rule: "MUST return RFC7807 Problem+JSON for errors; SHOULD include ErrorInfo-like details."
        error_info_shape:
          reason: "string"
          domain: "string"
          metadata: "object<string,string>"

