      # - docs/_canon/SYSTEM_SCOPE.md
      # - docs/hbtrack/modulos/{{MODULE_NAME}}/MODULE_SCOPE_{{MODULE_NAME_UPPER}}.md
      #
      # Each path must belong exclusively to this module.

      /{{MODULE_NAME}}:
        get:
          tags: [{{MODULE_NAME}}]
          summary: List {{DOMAIN_ENTITY_PLURAL}}
          operationId: list{{DOMAIN_ENTITY_PASCAL}}s
          parameters:
            - $ref: ../components/parameters/pageSize.yaml
            - $ref: ../components/parameters/pageToken.yaml
          responses:
            "200":
              description: Successful response
              content:
                application/json:
                  schema:
                    type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}.yaml
                      nextPageToken:
                        type: string
                        description: Omit when no further pages.
            "400":
              description: Invalid request
              content:
                application/problem+json:
                  schema:
                    $ref: ../components/schemas/shared/problem.yaml

        post:
          tags: [{{MODULE_NAME}}]
          summary: Create {{DOMAIN_ENTITY_SINGULAR}}
          operationId: create{{DOMAIN_ENTITY_PASCAL}}
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}_create_request.yaml
          responses:
            "201":
              description: Created
              content:
                application/json:
                  schema:
                    $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}.yaml
            "400":
              description: Validation error
              content:
                application/problem+json:
                  schema:
                    $ref: ../components/schemas/shared/problem.yaml

      /{{MODULE_NAME}}/{id}:
        get:
          tags: [{{MODULE_NAME}}]
          summary: Get {{DOMAIN_ENTITY_SINGULAR}} by id
          operationId: get{{DOMAIN_ENTITY_PASCAL}}ById
          parameters:
            - name: id
              in: path
              required: true
              description: Stable identifier of the resource
              schema: { type: string }
          responses:
            "200":
              description: Successful response
              content:
                application/json:
                  schema:
                    $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}.yaml
            "404":
              description: Not found
              content:
                application/problem+json:
                  schema:
                    $ref: ../components/schemas/shared/problem.yaml

        patch:
          tags: [{{MODULE_NAME}}]
          summary: Update {{DOMAIN_ENTITY_SINGULAR}}
          operationId: update{{DOMAIN_ENTITY_PASCAL}}
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}_update_request.yaml
          responses:
            "200":
              description: Updated
              content:
                application/json:
                  schema:
                    $ref: ../components/schemas/{{MODULE_NAME}}/{{DOMAIN_ENTITY_SNAKE}}.yaml
            "400":
              description: Validation error
              content:
                application/problem+json:
                  schema:
                    $ref: ../components/schemas/shared/problem.yaml
            "404":
              description: Not found
              content:
                application/problem+json:
                  schema:
                    $ref: ../components/schemas/shared/problem.yaml

        delete:
          tags: [{{MODULE_NAME}}]
          summary: Delete {{DOMAIN_ENTITY_SINGULAR}}
          operationId: delete{{DOMAIN_ENTITY_PASCAL}}
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string }
          responses:
            "204":
              description: Deleted

    openapi_components:
      parameters_pageSize_yaml: |-
        name: pageSize
        in: query
        required: false
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 20

      parameters_pageToken_yaml: |-
        name: pageToken
        in: query
        required: false
        description: Opaque pagination cursor
        schema:
          type: string
        example: "eyJvZmZzZXQiOjIwLCJzaWQiOiJ0cmFpbmluZyJ9"

      schemas_shared_problem_yaml: |-
        # Problem Details for HTTP APIs (RFC 7807)
        type: object
        required: [type, title, status]
        properties:
          type:
            type: string
            format: uri
          title:
            type: string
          status:
            type: integer
          detail:
            type: string
          instance:
            type: string
            format: uri
          code:
            type: string
            description: Application-specific error code
          traceId:
            type: string
            description: Distributed trace identifier
          errors:
            type: array
            items:
              type: object
              properties:
                field: { type: string }
                message: { type: string }
          errorInfo:
            type: object
            description: ErrorInfo-like details (Google AIP-193 inspired)
            properties:
              reason: { type: string }
              domain: { type: string }
              metadata:
                type: object
                additionalProperties: { type: string }

      schemas_module_list_response_yaml: |-
        # Paginated list response wrapper (cursor-based)
        type: object
        required: [items]
        additionalProperties: false
        properties:
          items:
            type: array
            items:
              $ref: ./{{DOMAIN_ENTITY_SNAKE}}.yaml
          nextPageToken:
            type: string
            description: Omit when no further pages.

      schemas_module_create_request_yaml: |-
        # Create request schema (allowlist fields; prevent mass assignment)
        type: object
        additionalProperties: false
        required: [{{REQUIRED_FIELDS_COMMA_SEPARATED}}]
        properties:
          {{FIELD_NAME_1}}:
            {{FIELD_SCHEMA_1}}
          {{FIELD_NAME_2}}:
            {{FIELD_SCHEMA_2}}

      schemas_module_update_request_yaml: |-
        # Update request schema (allowlist fields; prevent mass assignment)
        type: object
        additionalProperties: false
        properties:
          {{FIELD_NAME_1}}:
            {{FIELD_SCHEMA_1}}
          {{FIELD_NAME_2}}:
            {{FIELD_SCHEMA_2}}

      openapi_root_yaml: |-
        # Root OpenAPI document — HB Track
        # Template canônico derivado de .contract_driven/templates/api/api_rules.yaml
        #   → contract_templates.openapi_root_yaml
        # Artefato soberano: contracts/openapi/openapi.yaml
        #
        # Regras embutidas (derivadas deste arquivo):
        #   - OpenAPI 3.1.x obrigatório            → contract_validation.openapi_required
        #   - info.version segue semver             → canonical_conventions.versioning_and_compatibility
        #   - servers não vazio                     → API9:2023 (Improper Inventory Management)
        #   - tags com description (16 módulos)     → CONTRACT_SYSTEM_LAYOUT.md §2 + canonical_conventions
        #   - components.schemas.problem RFC 7807   → design_rules.errors
        #   - components.parameters pageSize/Token  → design_rules.pagination (cursor-based)
        #   - security global como placeholder      → API5:2023 BFLA (default-deny por operação)
        #   - SEM versão na URI                     → canonical_conventions.versioning_and_compatibility.uri_versioning = MUST_NOT
        #   - camelCase em JSON fields              → canonical_conventions.naming.json_fields
        #   - kebab-case em path segments           → canonical_conventions.naming.uri_paths

        openapi: "3.1.0"

        info:
          title: "{{PROJECT_TITLE}}"
          version: "0.1.0"
          description: >
            {{PROJECT_DESCRIPTION}}

            Esta especificação é a fonte primária da verdade para a interface HTTP pública do sistema.

            Referências normativas — consultar antes de implementar:
            - .contract_driven/CONTRACT_SYSTEM_LAYOUT.md   (estrutura canônica de artefatos)
            - .contract_driven/templates/api/api_rules.yaml    (regras, templates e validações de API)
            - docs/_canon/SYSTEM_SCOPE.md                  (escopo e módulos canônicos)
            - docs/_canon/ERROR_MODEL.md                   (convenção de erros RFC 7807)
          contact:
            name: "{{TEAM_NAME}}"
            email: "{{TEAM_EMAIL}}"
          license:
            name: "{{LICENSE_NAME}}"
            identifier: "{{LICENSE_SPDX}}"

        # API9:2023 — Improper Inventory Management: manter inventário de hosts/envs atualizado.
        servers:
          - url: "{{DEV_BASE_URL}}"
            description: "Desenvolvimento local"
          - url: "{{STAGING_BASE_URL}}"
            description: "Staging"

        # Path items são definidos por módulo em contracts/openapi/paths/<module>.yaml.
        # Adicionar referências aqui conforme cada contrato de módulo for estabelecido.
        # Exemplo:
        #   /{{MODULE_NAME}}:
        #     $ref: ./paths/{{MODULE_NAME}}.yaml#/~1{{MODULE_NAME}}
        #   /{{MODULE_NAME}}/{id}:
        #     $ref: ./paths/{{MODULE_NAME}}.yaml#/~1{{MODULE_NAME}}~1{id}
        paths: {}

        components:
          parameters:
            pageSize:
              $ref: ./components/parameters/pageSize.yaml
            pageToken:
              $ref: ./components/parameters/pageToken.yaml
          schemas:
            # RFC 7807 Problem+JSON — shape canônico para todos os erros HTTP.
            # Ver: design_rules.google_aip_core.errors e security_rules.owasp_top10_2023 API8
            problem:
              $ref: ./components/schemas/shared/problem.yaml
          responses: {}
          requestBodies: {}
          # Schemes de segurança definidos quando identity_access for contratado.
          securitySchemes: {}
          examples: {}

        # Segurança global vazia por padrão — placeholder explícito e documentado.
        # API5:2023 BFLA — default-deny: aplicar security requirement em cada operação
        # protegida individualmente, NÃO depender deste global como proteção real.
        # Quando identity_access estiver contratado: adicionar o scheme em securitySchemes
        # e aplicar security requirements por operação.
        security: []

        # Tags canônicas: uma por módulo (CONTRACT_SYSTEM_LAYOUT.md §2).
        # Módulos de domínio funcional (13) + transversais (3) = 16 total.
        tags:
          - name: users
            description: "Pessoa, perfil e dados de identidade funcional pessoal."
          - name: seasons
            description: "Temporadas e ciclos competitivos."
          - name: teams
            description: "Equipes, comissão técnica e composição de elenco."
          - name: training
            description: "Sessões de treino, ciclos, cargas e presença."
          - name: wellness
            description: "Bem-estar, pré-treino e pós-treino conversacional."
          - name: medical
            description: "Saúde, lesões e histórico médico."
          - name: competitions
            description: "Competições, fases e classificações."
          - name: matches
            description: "Partidas, placar e eventos de jogo."
          - name: scout
            description: "Eventos de scout e análise tática."
          - name: exercises
            description: "Banco de exercícios e mídia associada."
          - name: analytics
            description: "Métricas, relatórios e dashboards analíticos."
          - name: reports
            description: "Exportação e relatórios operacionais."
          - name: ai_ingestion
            description: "Ingestão de dados para modelos de IA e coach."
          - name: identity_access
            description: "Autenticação, autorização, credenciais, sessões, MFA, JWT e RBAC."
          - name: audit
            description: "Trilha de auditoria e rastreabilidade de eventos."
          - name: notifications
            description: "Notificações e alertas para usuários."

  contract_validation:
    openapi_required:
      - "MUST be OpenAPI 3.1.x."
      - "MUST not introduce URI versioning (no /v1, /v2, ...)."
      - "MUST keep module boundaries: each paths/<module>.yaml only contains that module."
      - "MUST include security requirements on protected endpoints."
      - "MUST avoid mass assignment by using explicit request schemas with allowlisted fields."
    pagination_required_for_list:
      - "MUST define pagination parameters and nextPageToken semantics from day 1."
    tooling_expectations:
      - "OpenAPI lint: Redocly CLI"
      - "Ruleset lint: Spectral"
      - "Breaking change detection: oasdiff (when baseline exists)"
